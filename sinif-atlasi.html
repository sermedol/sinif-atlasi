    /* Kontrast: istatistik etiketleri AA'nın altındaydı (3.86) → koyulaştır */
    .mini-stat span {
      color: #47536a;
    }
    html[data-theme="dark"] .mini-stat span {
      color: #aeb9cc;
    }

    /* Dokunma hedefleri: mobilde segment/hud butonları 44px altındaydı */
    @media (max-width: 780px) {
      .segment-button { min-height: 44px; }
      .hud-button { min-height: 44px; padding-top: 11px; padding-bottom: 11px; }
      .discovery-open { min-height: 40px; }
      .tab { min-height: 44px; }
      .case-card { animation: none !important; }

      /* iOS Safari, 16px'den küçük yazı boyutlu input/select'e dokununca
         sayfayı OTOMATİK yakınlaştırır (metni okunaklı yapmak için) — bu,
         arama kutusuna veya filtre menülerine her dokunuşta istenmeyen bir
         "zoom in" gibi görünür. 16px'e çıkarmak bu davranışı tamamen keser.
         .global-search input gibi daha spesifik seçicileri de geçmesi için
         aynı özgüllükte tekrar edildi. */
      input, select, textarea,
      .global-search input {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="sinifAtlasiApp" class="sinif-atlasi-root shell">
    <header class="topbar">

":"Saraçhane / İstanbul","Sendika/Dernek/Kurum":"İstanbul Büyükşehir Belediye Çalışanları Derneği ve Bem-Bir-Sen üyesi İBB memurları","İşkolu":"Belediye Hizmetleri","Neden/Talepler":"İBB’de bekleyen toplu sözleşmelerin imzalanması, Sosyal Denge Sözleşmesi ücretinin yükseltilmesi ve yüzde 120 net ödenmesi, kaldırılan Ramazan ve Kurban Bayramı ikramiyeleri, 1 Mayıs ikramiyesi ve yakacak yardımının geri verilmesi isteniyor.","Başlangıç tarihi":"20.01.2026","Zaman/Gün":"20 Ocak 2026 tarihinden beri, 182. gün. Talepler 18 Temmuz 2026’da yeniden gündeme getirildi.","Eylem biçimi":"Saraçhane’de basın açıklamaları ve protesto eylemleri yapılıyor, sosyal medya üzerinden hakların geri verilmesi çağrıları gerçekleştiriliyor.","Durum":"Devam ediyor","Bilgiler":"İBB ile sendikalar arasındaki 2026–2027 Sosyal Denge Sözleşmesi görüşmelerinde dört mali hak konusunda anlaşma sağlanamaması üzerine memurlar Saraçhane’de eylem yaptı. İBB Çalışanları Derneği, temmuz ayında yaptığı açıklamada sözleşmelerin hâlâ imzalanmadığını, SDS ücretlerinin düşük kaldığını ve ikramiyelerin kaldırılması nedeniyle mağduriyetin sürdüğünü belirtti.","Medya":"","Konum":"https://maps.app.goo.gl/VyTj8PY9x3mBRt5t6","Yazı/ Haber/Yayın":""},{"Alan":"Ekoloji Direnişi","Başlık":"İnceğiz taş ocağına karşı yaşam alanı mücadelesi","Yer":"İnceğiz Mahallesi, Gazipaşa / Antalya","Sendika/Dernek/Kurum":"İnceğiz Mahallesi halkı ve mahalle muhtarlığı","İşkolu":"Bağımsız","Neden/Talepler":"İnceğiz halkı, kalker ocağı ve kırma-eleme tesisi projesinin iptal edilmesini, tarım alanlarının, içme ve sulama suyu kaynaklarının, ormanların, doğal yaşamın ve köyün üretim düzeninin korunmasını istiyor.","Başlangıç tarihi":"15.07.2026","Zaman/Gün":"15 Temmuz 2026 tarihinden beri, 6. gün","Eylem biçimi":"Mahallede kitlesel eylem düzenleniyor, pankart ve dövizlerle basın açıklaması yapılıyor, ÇED kararına karşı hukuki süreç hazırlanıyor.","Durum":"Devam ediyor","Bilgiler":"Gazipaşa Belediyesinin İnceğiz Mahallesi’nde yıllık 390 bin ton     // Ücretsiz CORS proxy'leri (rss2json, corsproxy.io, jina.ai vb.) tek seferde
    // onlarca isteğe maruz kalınca 429/403 ile anında reddediyordu; bu da haber ve
    // görsellerin hiç yüklenmemesine yol açıyordu. Tüm dış istekleri tek bir kuyruktan
    // geçirerek aynı anda gidecek istek sayısını sınırlıyoruz.
    const MAX_CONCURRENT_PROXY_FETCHES = 8;
    let activeProxyFetches = 0;
    const proxyFetchQueue = [];
    function drainProxyQueue() {
      while (proxyFetchQueue.length && activeProxyFetches < MAX_CONCURRENT_PROXY_FETCHES) {
        const run = proxyFetchQueue.shift();
        run();
      }
    }
    function gatedFetch(task) {
      return new Promise((resolve, reject) => {
        const run = () => {
          activeProxyFetches += 1;
          Promise.resolve().then(task).then(
            (value) => { activeProxyFetches -= 1; resolve(value); drainProxyQueue(); },
            (error) => { activeProxyFetches -= 1; reject(error); drainProxyQueue(); }
          );
        };
        if (activeProxyFetches < MAX_CONCURRENT_PROXY_FETCHES) run();
        else proxyFetchQueue.push(run);
      });
    }

    // Bir dizi görev fabrikasını küçük dalgalar halinde başlatır; ilk başarılı
    // olan kazanır. Yedi proxy'yi aynı anda ateşlemek yerine önce 2 tanesini
    // dener, kısa bir süre sonra hâlâ sonuç yoksa sıradaki dalgayı ekler.
    function firstSuccessStaggered(factories, { batchSize = 2, staggerMs = 1200 } = {}) {
      return new Promise((resolve, reject) => {
        let index = 0;
        let failures = 0;
        let done = false;
        const total = factories.length;
        if (!total) { reject(new Error("no candidates")); return; }
        const launchNext = () => {
          if (done || index >= total) return;
          const factory = factories[index++];
          Promise.resolve().then(factory).then(
            (value) => { if (!done) { done = true; resolve(value); } },
            () => {
              failures += 1;
              if (failures === total && !done) { done = true; reject(new Error("all failed")); }
            }
          );
        };
        const launchWave = () => {
          if (done) return;
          const count = Math.min(batchSize, total - index);
          for (let i = 0; i < count; i += 1) launchNext();
          if (index < total) window.setTimeout(launchWave, staggerMs);
        };
        launchWave();
      });
    }

    // Leaflet yüklenemediyse (CDN engeli/kesinti) uygulama harita OLMADAN da
    // çalışsın: veri listesi, istatistikler, detay ve keşif kaybolmasın.
    // Harita, Leaflet asenkron yüklendiği için başta "sahte" (no-op) kurulur —
    // böylece veri (liste, istatistik, detay) Leaflet'i beklemeden anında görünür.
    // Leaflet gelirse aşağıda gerçek haritaya yükseltilir; hiç gelmezse mesaj kalır.
    let HAS_LEAFLET = false;
    let map, markerLayer;
    function installStubMap() {
      const noop = function () { return noopLayer; };
      const noopLayer = { addLayers: noop, clearLayers: noop, addLayer: noop, addTo: noop, removeLayer: noop };
      map = {
        setView: function () { return map; }, addLayer: noop, removeLayer: noop,
        on: noop, off: noop, fitBounds: noop, panTo: noop, setMaxBounds: noop,
        invalidateSize: noop, getZoom: function () { return 5; }, flyTo: noop, setZoom: noop

    // Çoklu tile kaynağı: biri erişilemezse (ör. OSM engelli) diğerine geç.
    const TILE_SOURCES = [
      { url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", sub: "abc", attr: '&copy; OpenStreetMap' },
      { url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png", sub: "abcd", attr: '&copy; OpenStreetMap, &copy; CARTO' },
      { url: "https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png", sub: "", attr: '&copy; OpenStreetMap, Wikimedia' }
    ];
    function addResilientTiles(mapObj) {
      // İlk kaynağı ekle; tile hataları çok olursa sıradaki kaynağa geç.
      let idx = 0;
      let layer = null;
      function place() {
        const src = TILE_SOURCES[idx];
        const opts = { maxZoom: 19, attribution: src.attr };
        if (src.sub) opts.subdomains = src.sub;
        layer = L.tileLayer(src.url, opts);
        let errCount = 0;
        layer.on("tileerror", function () {
          errCount += 1;
          // Bu kaynaktan çok tile başarısızsa (erişim engeli) sıradakine geç.
          if (errCount === 6 && idx < TILE_SOURCES.length - 1) {
            idx += 1;
            mapObj.removeLayer(layer);
            place();
          }
        });
        layer.addTo(mapObj);
      }
      place();
    }

    let mobileMapMode = null;
    function syncMapInteractionMode() {
      if (!HAS_LEAFLET || !map) return;

      const setHandler = (handler, enabled) => {
        if (!handler) return;

        if (!enabled && typeof handler.disable === "function") handler.disable();

      // Mobilde harita parmak hareketini sahiplenmesin; sayfa kaydırması her

      setHandler(map.boxZoom, !mobile);

    // Leaflet hazır olunca gerçek haritayı kur ve yeniden çiz.

      if (HAS_LEAFLET) return;

    function keyNorm(text) {
      return String(text || "")
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ı/g, "i")
        .replace(/[^a-z0-9]+/g, "");
    }

    function value(row, key) {
      const aliases = FIELD_ALIASES[key] || [key];
      for (const candidate of [key, ...aliases]) {
        if (row[candidate] != null && String(row[candidate]).trim()) return String(row[candidate]).trim();
      }
      const normalizedAliases = new Set([key, ...aliases].map(keyNorm));
      const target = keyNorm(key);
      const scored = Object.keys(row || {}).map((candidate) => {
        const normalized = keyNorm(candidate);
        const cellValue = row[candidate] == null ? "" : String(row[candidate]).trim();
        if (!cellValue) return { candidate, score: -100 };
        let score = normalizedAliases.has(normalized) ? 100 : 0;
        normalizedAliases.forEach((alias) => {
          if (!alias) return;
          if (normalized.startsWith(alias)) score = Math.max(score, 76);
          else if (normalized.includes(alias)) score = Math.max(score, 48);
        });
        if (normalized.includes("guncel")) score += 12;
        if (normalized.includes("24haz")) score += 10;
        if (normalized.includes("17haz")) score += 4;
        if (normalized.includes("teyit") && !target.includes("teyit")) score -= 55;
        return { candidate, score };
      }).sort((a, b) => b.score - a.score);
      const best = scored[0];
      return best && best.score > 0 ? String(row[best.candidate]).trim() : "";
    }

    function norm(text) {
      return String(text || "")
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ı/g, "i");
    }

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const DAY_MS = 24 * 60 * 60 * 1000;
    const TURKISH_MONTHS = {
      ocak: 1,
      subat: 2,
      mart: 3,
      nisan: 4,
      mayis: 5,
      haziran: 6,
      temmuz: 7,
      agustos: 8,
      eylul: 9,
      ekim: 10,
      kasim: 11,
      aralik: 12
    };

    function validUtcDate(year, month, day) {
      const y = Number(year);
      const m = Number(month);
      const d = Number(day);
      if (!Number.isInteger(y) || !Number.isInteger(m) || !Number.isInteger(d)) return null;
      if (y < 1900 || y > 2200 || m < 1 || m > 12 || d < 1 || d > 31) return null;
      const date = new Date(Date.UTC(y, m - 1, d));
      if (date.getUTCFullYear() !== y || date.getUTCMonth() !== m - 1 || date.getUTCDate() !== d) return null;
      return date;
    }

    function dateKeyInIstanbul(date = new Date()) {
      try {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Europe/Istanbul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).formatToParts(date);
        const byType = Object.fromEntries(parts.map((part) => [part.type, part.value]));
        return `${byType.year}-${byType.month}-${byType.day}`;
      } catch {
        return date.toISOString().slice(0, 10);
      }
    }

    function utcDateFromKey(key) {
      const match = String(key || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return match ? validUtcDate(match[1], match[2], match[3]) : null;
    }

    function todayInIstanbul() {
      const now = new Date();
      return utcDateFromKey(dateKeyInIstanbul(now)) || validUtcDate(now.getFullYear(), now.getMonth() + 1, now.getDate());
    }

    function parseStartDate(text) {
      const raw = String(text || "").replace(/\u00a0/g, " ").trim();
      if (!raw) return null;

      let match = raw.match(/Date\((\d{4})\s*,\s*(\d{1,2})\s*,\s*(\d{1,2})/);
      if (match) return validUtcDate(match[1], Number(match[2]) + 1, match[3]);

      match = raw.match(/\b(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})\b/);
      if (match) return validUtcDate(match[1], match[2], match[3]);

      match = raw.match(/\b(\d{1,2})[./-](\d{1,2})[./-](\d{4})\b/);
      if (match) return validUtcDate(match[3], match[2], match[1]);

      const normalized = norm(raw).replace(/['’]/g, " ");
      match = normalized.match(/\b(\d{1,2})\s+(ocak|subat|mart|nisan|mayis|haziran|temmuz|agustos|eylul|ekim|kasim|aralik)\s+(\d{4})\b/);
      if (match) return validUtcDate(match[3], TURKISH_MONTHS[match[2]], match[1]);

      return null;
    }

    function formatShortDateTR(date) {
      if (!date) return "";
      return date.toLocaleDateString("tr-TR", { timeZone: "UTC", day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function shouldShowDayCounter(row) {
      const kind = row?.statusKind || statusKind(value(row, fields.status));

    }

    function resistanceDuration(row) {
      if (!row || !shouldShowDayCounter(row)) return null;
      const start = parseStartDate(value(row, fields.startDate)) || parseStartDate(value(row, fields.time));
      if (!start) return null;
      const today = todayInIstanbul();
      if (!today) return null;
      const days = Math.floor((today.getTime() - start.getTime()) / DAY_MS) + 1;
      if (!Number.isFinite(days) || days < 1) return null;
      return {
        days,
        label: `${days}. gün`,
        detail: `${days}. gün`,
        startLabel: formatShortDateTR(start)
      };
    }

    function shortText(text, max = 110) {

    function escapeRegExp(text) {

    function newsPreview(item, max = 110) {
      let summary = stripHtml(item.summary || "").replace(/\s+/g, " ").trim();
      [item.title, item.source, item.sourceName].filter(Boolean).forEach((part) => {
        summary = summary.replace(new RegExp(escapeRegExp(part), "gi"), " ");
      });
      summary = summary.replace(/\s*[-–—|]\s*/g, " ").replace(/\s+/g, " ").trim();
      if (!summary || summary.length < 24) return "";
      const titleText = norm(item.title || "");
      const summaryText = norm(summary);
      if (titleText && (summaryText.includes(titleText.slice(0, 42)) || titleText.includes(summaryText.slice(0, 42)))) return "";
      return shortText(summary, max);
    }

    // Sayfa yenilendiğinde haber/görsel taramasını sıfırdan tekrar başlatmamak için

    function loadPersistedMediaCache() {

        const parsed = JSON.parse(localStorage.getItem(MEDIA_CACHE_KEY) || "{}");

    let mediaCachePersistTimer = null;
    function persistMediaCache() {
      if (mediaCachePersistTimer) return;
      mediaCachePersistTimer = window.setTimeout(() => {
        mediaCachePersistTimer = null;
        try {
          const now = Date.now();
          const serializable = {};
          liveCache.forEach((bundle, rowId) => {
            if (bundle && now - (bundle.updatedAt || 0) < MEDIA_CACHE_MAX_AGE_MS) {
              serializable[rowId] = bundle;
            }
          });
          localStorage.setItem(MEDIA_CACHE_KEY, JSON.stringify(serializable));
        } catch {
          // Depolama dolu/erişilemez olabilir; sessizce vazgeç.
        }
      }, 1000);
    }

    function mediaKeyForItem(item) {
      const type = item.mediaType || item.kind || (item.thumb || item.src ? "photo" : "news");
      if (type === "photo" || type === "image") {
        return `photo:${normalizeMediaUrl(item.thumb || item.src || "")}|${normalizeMediaUrl(item.url || item.link || "")}|${norm(item.title || "").slice(0, 80)}`;
      }
      if (type === "video" && item.videoId) return `video:${item.videoId}`;
      return mediaCandidateKey(item);
    }

    function isHiddenMedia(row, item) {
      if (!row || !item) return false;
      return Boolean(hiddenMedia[row.id]?.has(mediaKeyForItem(item)));
    }

    function hideMediaItem(row, item) {
      if (!row || !item) return;
      if (!hiddenMedia[row.id]) hiddenMedia[row.id] = new Set();
      hiddenMedia[row.id].add(mediaKeyForItem(item));
      saveHiddenMedia();
      const cached = mediaCacheFor(row);
      if (cached) renderLiveBundle(row, cached);
    }

    function applyTheme(theme) {
      preferences.theme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = preferences.theme;
      savePreferences();
    }

    function applyDensity(density) {
      preferences.density = density === "compact" ? "compact" : "comfortable";
      document.documentElement.dataset.density = preferences.density;
      savePreferences();
    }

    function applyFocusMode(enabled) {
      preferences.focusMode = Boolean(enabled);
      document.documentElement.dataset.focus = preferences.focusMode ? "map" : "standard";
      window.setTimeout(() => map.invalidateSize(), 220);
      savePreferences();
    }

    function updateOnlineState() {
      return navigator.onLine !== false;
    }

    function slugify(text) {
      return norm(text).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 70) || "case";
    }

    function category(area) {
      const text = norm(area);
      if (text.includes("dunya")) return "dunya";
      if (text.includes("ekoloji")) return "ekoloji";
      if (text.includes("hapishane") || text.includes("kayip") || text.includes("cinayeti") || text.includes("adalet")) return "adalet";
      if (text.includes("isci") || text.includes("emek")) return "emek";
      return text.includes("/") ? "karma" : "karma";
    }

    function scopeKindFor(row) {
      const area = norm(value(row, fields.area));
      const location = norm(value(row, fields.location));
      const title = norm(value(row, fields.title));
      if (row.__discovered && (area.includes("dunya") || location.includes("dunya"))) return "world";
      if (area.includes("dunya") || location.includes("dunya") || title.match(/world|global|international|huelga|grève|greve|streik/)) return "world";
      return "turkey";
    }

    function statusKind(status) {
      const text = norm(status);
      if (text.match(/kazan|won|sonuclandi|sonuclandi|anlasma|bitti|bitirildi|tamamlandi/)) return "won";
      if (text.match(/bekle|baslayacak|oylama|askida|hazirlik|planlanan/)) return "watch";
      if (text.includes("teyit") || text.includes("belirsiz")) return "needs_verification";
      if (text.match(/devam|suruyor|suren|aktif|active|grev|direnis|nobet|takip|kampanya/)) return "active";
      return "unknown";
    }

    function verificationFor(row) {
      const combined = norm([value(row, fields.time), value(row, fields.status), value(row, fields.latest), value(row, fields.location)].join(" "));
      if (combined.includes("teyit") || combined.includes("belirsiz")) {
        return { key: "weak", label: "Teyit bekliyor", score: 38, reason: "Kayıtta teyit bekleyen veya belirsiz alan var." };
      }
      if (combined.includes("devam ediyor") || combined.includes("kazan") || combined.includes("sonuclandi")) {
        return { key: "single", label: "İzleniyor", score: 58, reason: "Kayıt izlenebilir durumda." };
      }
      return { key: "unverified", label: "Bilgi sınırlı", score: 25, reason: "Bilgi düzeyi sınırlı." };
    }

    function priorityFor(row, verification, geoPoints) {
      const combined = norm([value(row, fields.status), value(row, fields.latest), value(row, fields.time), value(row, fields.reason)].join(" "));
      let score = 30;
      const kind = statusKind(value(row, fields.status));
      if (kind === "active") score += 26;
      if (kind === "watch") score += 16;
      if (kind === "needs_verification") score += 18;
      if (verification.key === "weak") score += 12;
      if (value(row, fields.latest)) score += 10;
      if (geoPoints.length > 1) score += 8;
      if (combined.match(/grev|direnis|protesto|nobet|is birak|kampanya|canli|devam/)) score += 8;
      if (combined.match(/kazan|sonuclandi/)) score -= 10;
      return Math.max(10, Math.min(100, score));
    }

    // "Konum" sütununa artık serbest metin (açık adres) de girilebiliyor —
    // regex bir adres parçasını ("No:2, 16170" gibi) yanlışlıkla enlem/boylam
    // sanmasın diye, bulunan değerler makul bir Türkiye kutusuyla (deniz aşırı
    // kayıtlar için biraz toleranslı) doğrulanır; dışındaysa yok sayılır.
    function isPlausibleCoord(lat, lng) {
      return Number.isFinite(lat) && Number.isFinite(lng) &&
        lat >= 30 && lat <= 46 && lng >= 18 && lng <= 50;
    }

    // "Konum" sütununa girilen açık adresleri gerçek koordinata çevirir.
    // Nominatim'in ücretsiz kullanım politikasına uymak için: sonuçlar
    // localStorage'da kalıcı önbelleğe alınır (bir adres bir kez sorgulanır),
    // istekler arka planda ve aralıklı gönderilir, açık kart asla beklemez.
    const geocodeCache = (function loadGeocodeCache() {
      try {
        const raw = localStorage.getItem(GEOCODE_CACHE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    })();

    function saveGeocodeCache() {
      try { localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(geocodeCache)); } catch {}
    }

    // Bazı satırlarda "Konum" hücresine BİRDEN FAZLA link/adres yan yana
    // (boşlukla ayrılmış) yapıştırılıyor — örn. birden fazla şubesi/deposu
    // olan bir direniş. Her "http" başlangıcı yeni bir girdi kabul edilir;
    // link yoksa hücrenin tamamı tek bir girdidir.
    function konumEntriesFor(row) {
      const keys = Object.keys(row).reduce((acc, key) => { acc[norm(key)] = key; return acc; }, {});
      const raw = String(row[keys.konum] || "").trim();
      if (!raw) return [];
      if (/https?:\/\//i.test(raw)) {
        return raw.split(/(?=https?:\/\/)/i).map((s) => s.trim()).filter(Boolean);
      }
      return [raw];
    }

    function konumRawUrlsFor(row) {
      return konumEntriesFor(row).filter((entry) => /^https?:\/\//i.test(entry));
    }

    // Bir "Konum" girdisi bir Google Haritalar arama linkiyse (…/maps/search/
    // ?api=1&query=... veya ...?q=...), linkin kendisini değil, sorgudaki
    // gerçek adres/koordinat metnini döndürür — yoksa ne regex ne de geocode
    // hiçbir zaman eşleşmez.
    function extractAddressFromEntry(entry) {
      const text = String(entry || "").trim();
      if (/^https?:\/\//i.test(text)) {
        try {
          const url = new URL(text);
          const q = url.searchParams.get("query") || url.searchParams.get("q");
          if (q) return q.trim();
        } catch (e) {}
      }
      return text;
    }

    function konumTextFor(row) {
      return extractAddressFromEntry(konumEntriesFor(row)[0] || "");
    }

    // Bir metinde/linkte doğrudan gömülü koordinat varsa (Google'ın çözülmüş
    // "…/@enlem,boylam,…" ya da "…!3denlem!4dboylam…" biçimi, ya da düz
    // "enlem,boylam" metni) ağa hiç gitmeden anında ayrıştırır.
    function parseCoordFromText(text) {
      const s = String(text || "");
      const pinMatch = s.match(/!3d(-?\d{1,3}(?:\.\d+)?)!4d(-?\d{1,3}(?:\.\d+)?)/);
      if (pinMatch) {
        const lat = Number(pinMatch[1]);
        const lng = Number(pinMatch[2]);
        if (isPlausibleCoord(lat, lng)) return { lat, lng };
      }
      const atMatch = s.match(/@(-?\d{1,3}(?:\.\d+)?),(-?\d{1,3}(?:\.\d+)?)/);
      if (atMatch) {
        const lat = Number(atMatch[1]);
        const lng = Number(atMatch[2]);
        if (isPlausibleCoord(lat, lng)) return { lat, lng };
      }
      const plainMatch = s.match(/(-?\d{1,3}(?:[.,]\d+)?)\s*[,;]\s*(-?\d{1,3}(?:[.,]\d+)?)/);
      if (plainMatch) {
        const lat = Number(plainMatch[1].replace(",", "."));
        const lng = Number(plainMatch[2].replace(",", "."));
        if (isPlausibleCoord(lat, lng)) return { lat, lng };
      }
      return null;
    }

    const GEOCODE_RETRY_MS = 24 * 60 * 60 * 1000;
    function isUsableGeocodeEntry(entry) {
      // Başarılı sonuç: {lat,lng} kalıcı olarak güvenilir kabul edilir.
      // Başarısız deneme: 24 saat içinde tekrar denenmesin diye zaman
      // damgasıyla saklanır, ama süre dolunca yeniden denenir (worker
      // güncellenmiş veya geçici bir sorun düzelmiş olabilir).
      if (!entry) return false;
      if (Number.isFinite(entry.lat) && Number.isFinite(entry.lng)) return true;
      return Boolean(entry.failedAt) && (Date.now() - entry.failedAt < GEOCODE_RETRY_MS);
    }

    // Sayfadaki ham "Konum" metni genelde bina/kapı numarası ve posta kodu
    // içeren tam bir açık adres ("Adres: Yenişehir, Millet Cd. No:38, 34912
    // Pendik/İstanbul") — Nominatim bu kadar detaylı sokak adreslerini
    // çoğu zaman bulamıyor. Bu yüzden giderek sadeleşen adaylar üretilir:
    // önce tam metin, sonra bina no/posta kodu silinmiş hali, sonra
    // "İlçe/İl" -> "İlçe, İl" düzeltmesi, en son sadece ilçe+il.
    function geocodeCandidates(rawAddress) {
      const text = rawAddress.trim().replace(/^[^:]{0,60}adres[^:]{0,40}:\s*/i, "");
      const candidates = [text];

      const noBuilding = text
        .replace(/\bNo:?\s*\d+(?:\/\d+)?[a-zçğıöşü]?\b/gi, "")
        .replace(/\b(?:İç Kapı|Ic Kapi|Kat)\s*(?:No:?)?\s*\d+[a-zçğıöşü]?\b/gi, "")
        .replace(/\b\d{5}\b/g, "")
        .replace(/\s{2,}/g, " ")
        .replace(/,\s*,/g, ",")
        .replace(/^,\s*|,\s*$/g, "")
        .trim();
      if (noBuilding && noBuilding !== text) candidates.push(noBuilding);

      const slashFixed = noBuilding
        .replace(/([A-Za-zÇĞİIıÖŞÜçğıöşü]+)\/([A-Za-zÇĞİIıÖŞÜçğıöşü]+)\s*$/, "$1, $2")
        .trim();
      if (slashFixed && slashFixed !== noBuilding) candidates.push(slashFixed);

      const parts = slashFixed.split(",").map((part) => part.trim()).filter(Boolean);
      if (parts.length > 2) candidates.push(parts.slice(-2).join(", "));
      // En agresif son çare: sokak/cadde adı çoğu zaman Nominatim'de yok —
      // sadece son parça (genelde "ilçe il ülke") çoğunlukla bulunabiliyor.
      if (parts.length > 1) candidates.push(parts[parts.length - 1]);

      // Virgülsüz veya az virgüllü adreslerde son çare: kelime bazlı sondan
      // kısaltma (çoğu adres "... İlçe İl Türkiye" ile bitiyor).
      const words = noBuilding.replace(/,/g, " ").split(/\s+/).filter(Boolean);
      if (words.length > 3) candidates.push(words.slice(-3).join(" "));
      if (words.length > 2) candidates.push(words.slice(-2).join(" "));

      return [...new Set(candidates)].filter((candidate) => candidate.length >= 4);
    }

    async function geocodeAddress(address) {
      const key = norm(address);
      if (isUsableGeocodeEntry(geocodeCache[key])) return geocodeCache[key];
      const candidates = geocodeCandidates(address);
      let result = null;
      for (let i = 0; i < candidates.length; i++) {
        try {
          const response = await fetchWithTimeout(
            `https://sinif-atlasi.feyzakayaalti.workers.dev/?geocode=${encodeURIComponent(candidates[i])}`,
            {}, 8000, { background: true }
          );
          const data = await response.json();
          if (data && data.result && isPlausibleCoord(data.result.lat, data.result.lng)) {
            result = data.result;
            break;
          }
        } catch {}
        if (i < candidates.length - 1) {
          await new Promise((resolve) => window.setTimeout(resolve, 400));
        }
      }
      geocodeCache[key] = result || { failedAt: Date.now() };
      saveGeocodeCache();
      return geocodeCache[key];
    }

    function isShortMapsLink(text) {
      return /^https?:\/\/(maps\.app\.goo\.gl|goo\.gl\/maps)\//i.test(String(text || "").trim());
    }

    // Google'ın kısa paylaşım linkini (maps.app.goo.gl/... gibi) worker
    // üzerinden çözer — worker yönlendirmeyi (redirect) takip edip son
    // URL'deki koordinatı çıkarır (bkz. cloudflare-worker.js: handleResolveLink).
    // Tarayıcı bunu CORS yüzünden doğrudan yapamaz.
    async function resolveShortMapsLink(link) {
      try {
        const response = await fetchWithTimeout(
          `https://sinif-atlasi.feyzakayaalti.workers.dev/?resolve=${encodeURIComponent(link)}`,
          {}, 8000, { background: true }
        );
        const data = await response.json();
        if (data && data.result && isPlausibleCoord(data.result.lat, data.result.lng)) {
          return data.result;
        }
      } catch {}
      return null;
    }

    // Tek bir "Konum" girdisini (link ya da düz metin) koordinata çevirir;
    // sonuç girdinin kendi metnine göre önbelleğe alınır.
    async function resolveKonumEntry(entry) {
      const key = norm(entry);
      if (isUsableGeocodeEntry(geocodeCache[key])) return geocodeCache[key];
      const direct = parseCoordFromText(entry);
      if (direct) {
        geocodeCache[key] = direct;
        saveGeocodeCache();
        return direct;
      }
      let result = null;
      if (isShortMapsLink(entry)) {
        result = await resolveShortMapsLink(entry.trim());
      } else {
        const address = extractAddressFromEntry(entry);
        if (address.length >= 4) {
          const geocoded = await geocodeAddress(address);
          if (geocoded && Number.isFinite(geocoded.lat) && Number.isFinite(geocoded.lng)) result = geocoded;
        }
      }
      geocodeCache[key] = result || { failedAt: Date.now() };
      saveGeocodeCache();
      return geocodeCache[key];
    }

    let geocodeQueueRunning = false;
    let geocodeQueueTimer = null;
    function scheduleMissingGeocodeRefresh() {
      if (!HAS_LEAFLET) return;
      if (geocodeQueueTimer) window.clearTimeout(geocodeQueueTimer);
      const delay = isMobileExperience() ? 10000 : 6000;
      geocodeQueueTimer = window.setTimeout(() => {
        geocodeQueueTimer = null;
        geocodeMissingAddressesInBackground();
      }, delay);
    }

    async function geocodeMissingAddressesInBackground() {
      if (isMobileExperience() && !HAS_LEAFLET) return;
      if (geocodeQueueRunning) return;
      geocodeQueueRunning = true;
      try {
        const seen = new Set();
        for (const row of cases) {
          for (const entry of konumEntriesFor(row)) {
            if (entry.length < 4) continue;
            const key = norm(entry);
            if (seen.has(key) || isUsableGeocodeEntry(geocodeCache[key]) || parseCoordFromText(entry)) continue;
            seen.add(key);
            const result = await resolveKonumEntry(entry);
            if (result && isPlausibleCoord(result.lat, result.lng)) {
              rebuildPoints();
              render({ fitBounds: false });
            }
            await new Promise((resolve) => window.setTimeout(resolve, 1100));
          }
        }
      } finally {
        geocodeQueueRunning = false;
      }
    }

    // Her "Konum" girdisi (birden fazla olabilir — bkz. konumEntriesFor)
    // için önbellekte veya metnin kendisinde hazır bir koordinat varsa onu
    // döndürür. Henüz çözülmemiş girdiler atlanır (arka plan kuyruğu onları
    // çözünce rebuildPoints/render ile harita kendiliğinden güncellenir) —
    // bu sayede kısmen çözülmüş satırlar bile o ana kadar bulunanları gösterir.
    function explicitPoint(row) {
      const keys = Object.keys(row).reduce((acc, key) => {
        acc[norm(key)] = key;
        return acc;
      }, {});
      const latKey = keys.enlem || keys.lat || keys.latitude;
      const lngKey = keys.boylam || keys.lng || keys.lon || keys.longitude;
      if (latKey && lngKey) {
        const lat = Number(String(row[latKey]).replace(",", "."));
        const lng = Number(String(row[lngKey]).replace(",", "."));
        if (isPlausibleCoord(lat, lng)) return [{ label: value(row, fields.location), lat, lng }];
      }
      const entries = konumEntriesFor(row);
      if (!entries.length) return null;
      const locationText = value(row, fields.location);
      const resolved = [];
      entries.forEach((entry, index) => {
        const cached = parseCoordFromText(entry) || geocodeCache[norm(entry)];
        if (cached && isPlausibleCoord(cached.lat, cached.lng)) {
          const label = cached.label || (entries.length > 1 ? `${locationText} (${index + 1})` : locationText);
          resolved.push({ label, lat: cached.lat, lng: cached.lng });
        }
      });
      return resolved.length ? resolved : null;
    }

    function fuzzyLocationPoints(locationText) {
      const targetTokens = new Set(norm(locationText).split(/[^a-z0-9]+/i).filter((token) => token.length > 2));
      if (!targetTokens.size) return [];
      let bestKey = null;
      let bestScore = 0;
      Object.keys(LOCATION_POINTS).forEach((key) => {
        const keyTokens = new Set(norm(key).split(/[^a-z0-9]+/i).filter((token) => token.length > 2));
        if (!keyTokens.size) return;
        const overlap = Array.from(keyTokens).filter((token) => targetTokens.has(token)).length;
        const score = overlap / keyTokens.size;
        if (score > bestScore) {
          bestScore = score;
          bestKey = key;
        }
      });
      return bestScore >= 0.5 ? LOCATION_POINTS[bestKey] : [];
    }

    function pointsFor(row) {
      const locationText = value(row, fields.location);
      return explicitPoint(row) || LOCATION_POINTS[locationText] || fuzzyLocationPoints(locationText) || [];
    }

    function organizations(row) {
      const actorText = value(row, fields.actors);
      const parts = actorText
        .split(/,| ve | \/ |;|\|/i)
        .map((part) => part.trim())
        .filter((part) => part.length > 2);
      return Array.from(new Set(parts)).slice(0, 8);
    }

    function decorateRows(rawRows) {
      return rawRows
        .filter((row) => value(row, fields.area) && value(row, fields.title))
        .map((row, index) => {
          const verification = verificationFor(row);
          const geoPoints = pointsFor(row);
          const priorityScore = priorityFor(row, verification, geoPoints);
          const item = {
            ...row,
            id: row.__atlasId || `case-${index + 1}`,
            index: Number(row.__atlasIndex || index + 1),
            slug: slugify(value(row, fields.title)),
            category: category(value(row, fields.area)),
            scopeKind: scopeKindFor(row),
            statusKind: statusKind(value(row, fields.status)),
            verification,
            priorityScore,
            organizations: organizations(row),
            sourceCount: Number(row.__sourceCount || 1),
            isDiscovered: Boolean(row.__discovered),
            pointCount: geoPoints.length,
            searchText: norm(Object.values(row).join(" "))
          };
          return item;
        });
    }

    function rebuildPoints() {
      markerByCase = new Map();
      points = cases.flatMap((row) => pointsFor(row).map((point, index) => ({ id: `${row.id}-p${index}`, row, point })));
    }

    function iconFor(row) {
      return L.divIcon({
        className: "",
        html: `<span class="pin pin-${row.category}" aria-hidden="true"></span>`,
        iconSize: [32, 32],
        iconAnchor: [16, 30],
        popupAnchor: [0, -29]
      });
    }

    function popupFor(entry) {
      return `
        <article class="popup-mini">
          <h3>${esc(value(entry.row, fields.title))}</h3>
          <div class="tag-row">
            <span class="tag">${esc(value(entry.row, fields.area))}</span>
            <span class="tag">${esc(value(entry.row, fields.status))}</span>
          </div>
          <p>${esc(entry.point.label || value(entry.row, fields.location))}</p>
          <button type="button" data-open-case="${esc(entry.row.id)}">Detaylar</button>
        </article>
      `;
    }

    function buildMarker(entry) {
      const marker = L.marker([entry.point.lat, entry.point.lng], {
        icon: iconFor(entry.row),
        title: value(entry.row, fields.title)
      }).bindPopup(popupFor(entry), {
        // Haritanın üstündeki HUD düğmeleri Leaflet'ten bağımsız konumlanır.
        // sabit konumlu — Leaflet bunların yerini bilmediği için, üstteki
        // bir marker'ın popup'ı otomatik kaydırma (autoPan) sırasında
        // düğmelerin ARKASINDA kalabiliyordu. Bu boşluk, popup'ın her zaman
        // HUD'un altında/görünür kalmasını sağlar (özellikle mobilde, HUD
        // düğmeleri iki satıra sarabildiği için üst boşluk geniş tutuldu).
        autoPanPaddingTopLeft: [12, 96],
        autoPanPaddingBottomRight: [12, 12]
      });
      marker.on("popupopen", () => {
        const button = document.querySelector(`[data-open-case="${entry.row.id}"]`);
        if (button) button.addEventListener("click", () => selectCase(entry.row.id, { focusMap: false }));
      });
      if (!markerByCase.has(entry.row.id)) markerByCase.set(entry.row.id, []);
      markerByCase.get(entry.row.id).push(marker);
      return marker;
    }

    function addMarkerBatch(markers) {
      if (!markers.length) return;
      if (typeof markerLayer.addLayers === "function") markerLayer.addLayers(markers);
      else markers.forEach((marker) => markerLayer.addLayer(marker));
    }

    function fitBoundsForMarkers(markers, pad = 0.12, maxZoom = 7) {
      if (!HAS_LEAFLET || !markers.length) return;
      const bounds = L.featureGroup(markers).getBounds();
      if (bounds.isValid()) map.fitBounds(bounds.pad(pad), { maxZoom, animate: !isMobileExperience() });
    }

    function revealCaseOnMap(id) {
      const markers = markerByCase.get(id) || [];
      if (!markers.length) return false;
      const marker = markers[0];
      const reveal = () => {
        map.panTo(marker.getLatLng(), { animate: !isMobileExperience(), duration: 0.35 });
        window.setTimeout(() => marker.openPopup(), isMobileExperience() ? 80 : 220);
      };
      if (typeof markerLayer.zoomToShowLayer === "function") markerLayer.zoomToShowLayer(marker, reveal);
      else reveal();
      return true;
    }

    function flushPendingMapReveal() {
      if (!pendingMapRevealId) return;
      if (revealCaseOnMap(pendingMapRevealId)) pendingMapRevealId = "";
    }

    function smartFilterMatches(row) {
      if (activeSmartFilter === "active") return row.statusKind === "active";
      if (activeSmartFilter === "favorites") return favoriteIds.has(row.id);
      if (activeSmartFilter === "discovered") return row.isDiscovered;
      if (activeSmartFilter === "world") return row.scopeKind === "world";
      if (activeSmartFilter === "turkey") return row.scopeKind === "turkey";
      return true;
    }

    function matches(row) {
      const query = norm(els.search.value);
      if (query && !row.searchText.includes(query)) return false;
      const explicitStatus = Boolean(els.statusFilter.value);
      if (!explicitStatus && !smartFilterMatches(row)) return false;
      if (els.areaFilter.value && value(row, fields.area) !== els.areaFilter.value) return false;
      if (explicitStatus && value(row, fields.status) !== els.statusFilter.value) return false;
      return true;
    }

    function filteredCases() {
      return cases.filter(matches);
    }

    function filteredPoints() {
      // Harita şimdilik yalnızca Türkiye kayıtlarını gösterir; Dünya kapsamlı
      // kayıtlar mücadele listesinde görünmeye devam eder, haritada pin olarak
      // çıkmaz.
      const visibleIds = new Set(filteredCases().filter((row) => row.scopeKind !== "world").map((row) => row.id));
      return points.filter((entry) => visibleIds.has(entry.row.id));
    }

    function renderMarkers(options = {}) {
      if (!HAS_LEAFLET) return [];
      if (markerRenderHandle) cancelBackgroundTask(markerRenderHandle);
      markerRenderHandle = null;
      const token = ++markerRenderToken;
      markerLayer.clearLayers();
      markerByCase = new Map();
      const entries = filteredPoints();
      const markers = [];
      if (!entries.length) return markers;
      const mobile = isMobileExperience();
      const batchSize = mobile ? 24 : 80;
      let index = 0;
      const now = () => (window.performance && performance.now ? performance.now() : Date.now());
      const drawChunk = (deadline) => {
        if (token !== markerRenderToken) return;
        const started = now();
        const batch = [];
        while (index < entries.length && batch.length < batchSize) {
          batch.push(buildMarker(entries[index]));
          index += 1;
          if (mobile && now() - started > 8) break;
          if (!mobile && deadline && typeof deadline.timeRemaining === "function" && deadline.timeRemaining() < 4) break;
        }
        markers.push(...batch);
        addMarkerBatch(batch);
        flushPendingMapReveal();
        if (index < entries.length) {
          markerRenderHandle = scheduleBackgroundTask(drawChunk);
          return;
        }
        markerRenderHandle = null;
        flushPendingMapReveal();
        if (options.fitBounds !== false) fitBoundsForMarkers(markers, 0.12, 7);
      };
      drawChunk();
      return markers;
    }

    function renderList(rows) {
      if (!rows.length) {
        els.caseList.innerHTML = '<div class="empty"><b>Eşleşen kayıt yok.</b><span>Filtreleri sıfırlayıp diğer direnişleri görebilirsin.</span></div>';
        return;
      }
      els.caseList.innerHTML = rows.map((row) => `
        <button class="case-card item-${row.category}${row.id === selectedId ? " active" : ""}" type="button" data-case-id="${esc(row.id)}">
          <div class="case-card-top">
            <span class="case-status-dot" aria-hidden="true"></span>
            <h2>${esc(value(row, fields.title))}</h2>
          </div>
          <p class="case-location">${esc(value(row, fields.location))}</p>
          <div class="tag-row">
            <span class="tag">${esc(value(row, fields.area))}</span>
            <span class="tag">${esc(value(row, fields.status))}</span>
            ${favoriteIds.has(row.id) ? '<span class="tag">Favori</span>' : ""}
            ${row.isDiscovered ? '<span class="tag">Canlı keşif</span>' : ""}
            ${durationTag(row)}
          </div>
        </button>
      `).join("");
      els.caseList.querySelectorAll("[data-case-id]").forEach((button) => {
        button.addEventListener("click", () => selectCase(button.dataset.caseId));
      });
    }

    function populateFilters() {
      const areas = Array.from(new Set(cases.map((row) => value(row, fields.area)).filter(Boolean))).sort((a, b) => a.localeCompare(b, "tr"));
      const statuses = Array.from(new Set(cases.map((row) => value(row, fields.status)).filter(Boolean))).sort((a, b) => a.localeCompare(b, "tr"));
      const previousArea = els.areaFilter.value;
      const previousStatus = els.statusFilter.value;
      els.areaFilter.innerHTML = '<option value="">Tüm alanlar</option>' + areas.map((area) => `<option value="${esc(area)}">${esc(area)}</option>`).join("");
      els.statusFilter.innerHTML = '<option value="">Tüm durumlar</option>' + statuses.map((status) => `<option value="${esc(status)}">${esc(status)}</option>`).join("");
      if (areas.includes(previousArea)) els.areaFilter.value = previousArea;
      if (statuses.includes(previousStatus)) els.statusFilter.value = previousStatus;
      filtersReady = true;
    }

    function countsBy(rows, getter) {
      return rows.reduce((acc, row) => {
        const key = getter(row) || "Bilinmiyor";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function topKey(counts) {
      return Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || "-";
    }

    function syncSmartFilters() {
      els.smartFilters.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.smartFilter === activeSmartFilter);
      });
      els.statFilters.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.statFilter === activeSmartFilter);
      });
    }

    function resetStandardFilters() {
      els.search.value = "";
      els.areaFilter.value = "";
      els.statusFilter.value = "";
    }

    function setSmartFilter(filter) {
      activeSmartFilter = filter || "all";
      resetStandardFilters();
      const rows = filteredCases();
      if (rows.length) selectedId = rows[0].id;
      else selectedId = null;
      render();
    }

    function renderStats(rows) {
      const allRows = cases;
      els.visibleCount.textContent = `${rows.length} kayıt`;
      els.activeCount.textContent = allRows.filter((row) => row.statusKind === "active").length;
      syncSmartFilters();
    }

    // fitBounds=false: sadece marker'ları/listeyi yeniden çizer, haritanın
    // mevcut yakınlaştırma/kaydırma durumuna dokunmaz. Arka planda veri
    // güncellenirken (geocode kuyruğu, periyodik tablo yenileme) kullanıcı
    // haritada gezinirken görünümün aniden sıfırlanmasını (zoom-out) önler.
    function render(options = {}) {
      if (!filtersReady) populateFilters();
      const rows = filteredCases();
      renderMarkers({ fitBounds: options.fitBounds });
      renderList(rows);
      renderStats(rows);
      if (!selectedId && rows.length) selectedId = rows[0].id;
      renderDetail();
    }

    function claim(label, body) {
      if (!body) return "";
      return `
        <div class="claim">
          <b>${esc(label)}</b>
          <span>${esc(body)}</span>
        </div>
      `;
    }

    // Konum metniyle birlikte, varsa haritadaki gerçek koordinatları da
    // gösterir ve paylaşılabilir hâle getirir (kopyala + haritada aç).
    // Bir satırda birden fazla "Konum" linki olabilir (örn. birden çok
    // şubesi/deposu olan bir direniş) — bu durumda her biri ayrı bir
    // "Haritada aç" satırı olarak gösterilir.
    function locationSection(row) {
      const locationText = value(row, fields.location);
      if (!locationText) return "";
      const directUrls = konumRawUrlsFor(row);
      const points = pointsFor(row).filter((point) => Number.isFinite(point.lat) && Number.isFinite(point.lng));
      const showLabels = points.length > 1 || directUrls.length > 1;
      let coordRows;
      if (directUrls.length) {
        // "Konum" sütunundaki gerçek Google Haritalar link(ler)i —
        // yönlendirme doğrudan bu(nlar) olmalı, koordinattan yeniden
        // türetilmiş bir link değil.
        coordRows = directUrls.map((url, index) => {
          const cached = geocodeCache[norm(url)];
          const label = (cached && cached.label) || (directUrls.length > 1 ? `${locationText} (${index + 1})` : null);
          return `
            <div class="coord-row">
              ${showLabels && label ? `<span class="coord-label">${esc(label)}</span>` : ""}
              <a class="inline-action" href="${esc(url)}" target="_blank" rel="noopener">Haritada aç</a>
            </div>
          `;
        }).join("");
      } else if (points.length) {
        coordRows = points.map((point) => {
          const mapsUrl = `https://www.google.com/maps?q=${point.lat},${point.lng}`;
          return `
            <div class="coord-row">
              ${showLabels ? `<span class="coord-label">${esc(point.label || locationText)}</span>` : ""}
              <a class="inline-action" href="${esc(mapsUrl)}" target="_blank" rel="noopener">Haritada aç</a>
            </div>
          `;
        }).join("");
      } else {
        // Kendi koordinat çözümümüz (Konum sütunu / geocode önbelleği) henüz
        // bir sonuç vermemiş olsa bile, kullanıcı Konum'a bir adres yazdıysa
        // "Haritada aç" linki Google Maps'in KENDİ arama/geocode motoruna
        // yönlendirir — bu, adres metnini bizim pipeline'ımızdan daha
        // güvenilir şekilde çözer, link asla kaybolmaz.
        const addressText = konumTextFor(row) || locationText;
        const searchUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addressText)}`;
        coordRows = `
          <div class="coord-row">
            <a class="inline-action" href="${esc(searchUrl)}" target="_blank" rel="noopener">Haritada aç</a>
          </div>
        `;
      }
      return `
        <div class="claim">
          <b>Yer</b>
          <span>${esc(locationText)}</span>
          <div class="coord-list">${coordRows}</div>
        </div>
      `;
    }

    function selectedCase() {
      return cases.find((row) => row.id === selectedId) || cases[0];
    }

    function setPanelOpen(open) {

    function syncTabs() {

    function selectCase(id, options = {}) {

      if (!options.keepTab) activeTab = "summary";

      els.caseTitle.textContent = value(row, fields.title);

    function searchQueryText(text) {
      return String(text || "")
        .replace(/&/g, " ")
        .replace(/[()"'“”‘’]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function liveQuery(row) {
      const title = searchQueryText(value(row, fields.title).replace(/\s*\/\s*/g, " "));
      const place = value(row, fields.location)
        .replace(/Türkiye geneli.*/i, "")
        .replace(/hattı|ve çevresi|ve ilçeleri|mağaza önleri/gi, "")
        .replace(/&/g, " ")
        .trim();
      return [title, place].filter(Boolean).join(" ");
    }

    function urlsFor(row) {
      const query = liveQuery(row);
      const encoded = encodeURIComponent(query);
      const imageQuery = encodeURIComponent(`${query} fotoğraf`);
      const videoQuery = encodeURIComponent(`${query} video`);
      return {
        query,
        googleNews: `https://news.google.com/search?q=${encoded}&hl=tr&gl=TR&ceid=TR%3Atr`,
        googleImages: `https://www.google.com/search?tbm=isch&q=${imageQuery}`,
        googleWeb: `https://www.google.com/search?q=${encoded}`,
        duckImages: `https://duckduckgo.com/?q=${imageQuery}&iax=images&ia=images`,
        youtube: `https://www.youtube.com/results?search_query=${videoQuery}`,
        googleVideos: `https://www.google.com/search?tbm=vid&q=${videoQuery}`
      };
    }

    // YouTube arama sonucundan gerçek video ID'lerini çıkar (proxy zinciriyle).
    // listType=search embed 2020'de kaldırıldığı için ID'yi bulup /embed/ID gömeriz.
    const youtubeIdCache = new Map();
    async function fetchYoutubeVideoIds(query, limit = 3) {
      const key = norm(query);
      if (youtubeIdCache.has(key)) return youtubeIdCache.get(key);
      const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`,
        `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(searchUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`,
        `https://thingproxy.freeboard.io/fetch/${searchUrl}`
      ];
      for (const proxy of proxies) {
        try {
          const response = await fetchWithTimeout(proxy, {}, 9000);
          if (!response.ok) continue;
          const html = await response.text();
          if (!html) continue;
          // YouTube sonuç sayfasında videoId'ler "videoId":"XXXXXXXXXXX" biçiminde geçer.
          const ids = [];
          const seen = new Set();
          const re = /"videoId":"([a-zA-Z0-9_-]{11})"/g;
          let m;
          while ((m = re.exec(html)) && ids.length < limit) {
            if (!seen.has(m[1])) { seen.add(m[1]); ids.push(m[1]); }
          }
          if (ids.length) { youtubeIdCache.set(key, ids); return ids; }
        } catch {
          // sıradaki proxy
        }
      }
      youtubeIdCache.set(key, []);
      return [];
    }

    function videoItemsFor(row) {
      const urls = urlsFor(row);
      const title = value(row, fields.title);
      // Önce arama linki fallback'i; gerçek gömülü videolar hydrateVideos ile eklenir.
      return [
        {
          kind: "action",
          title: `${title} · video`,
          text: "Bu başlıkla ilgili videolar yükleniyor…",
          url: urls.youtube,
          action: "YouTube'da aç"
        }
      ];
    }

    // Bir kart için gerçek YouTube videolarını bulup gömülü slide'lara çevir.
    function decodeYoutubeText(text) {
      try {
        return JSON.parse(`"${String(text || "").replace(/"/g, '\"')}"`);
      } catch {
        return String(text || "").replace(/\u0026/g, "&");
      }
    }

    function youtubeCandidatesFromHtml(html) {
      const seen = new Set();
      const videos = [];
      const re = /"videoId":"([a-zA-Z0-9_-]{11})"/g;
      let match;
      while ((match = re.exec(html)) && videos.length < 16) {
        const id = match[1];
        if (seen.has(id)) continue;
        seen.add(id);
        const chunk = html.slice(Math.max(0, match.index - 500), Math.min(html.length, match.index + 1600));
        const title = chunk.match(/"title":\{"runs":\[\{"text":"([^"]{8,180})"/)?.[1]
          || chunk.match(/"title":\{"simpleText":"([^"]{8,180})"/)?.[1]
          || "";
        videos.push({ id, title: decodeYoutubeText(title) });
      }
      return videos;
    }

    async function fetchYoutubeVideos(query, row, limit = 2) {
      const key = `${row.id}:${norm(query)}`;
      if (youtubeIdCache.has(key)) return youtubeIdCache.get(key);
      const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`,
        `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(searchUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`,
        `https://thingproxy.freeboard.io/fetch/${searchUrl}`
      ];
      for (const proxy of proxies) {
        try {
          const response = await fetchWithTimeout(proxy, {}, 9000);
          if (!response.ok) continue;
          const html = await response.text();
          const videos = youtubeCandidatesFromHtml(html)
            .filter((video) => video.title && isRelatedText(row, `${video.title} ${query}`))
            .slice(0, limit)
            .map((video, index) => ({
              kind: "video",
              videoId: video.id,
              title: video.title || `${value(row, fields.title)} · video ${index + 1}`,
              text: "",
              url: `https://www.youtube.com/watch?v=${video.id}`,
              mediaType: "video",
              reliability: "strong"
            }));
          if (videos.length) { youtubeIdCache.set(key, videos); return videos; }
        } catch {}
      }
      youtubeIdCache.set(key, []);
      return [];
    }

    async function hydrateVideoEmbeds(row) {
      const title = value(row, fields.title).replace(/\s*\/\s*/g, " ");
      const location = value(row, fields.location).replace(/Türkiye geneli.*/i, "").replace(/hattı|mağaza önleri/gi, "").trim();
      const query = `"${title}" ${location} grev direniş işçi video`.replace(/\s+/g, " ").trim();
      return fetchYoutubeVideos(query, row, 2);
    }

    function svgEscape(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

          <rect x="56" y="56" width="848" height="428" rx="28" fill="#ffffff" opacity="0.88"/>

          <text x="96" y="218" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">${title}</text>
          <text x="96" y="292" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850"> </text>
          <text x="96" y="422" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">${source}</text>
          <text x="744" y="422" fill="${accent}" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Direniş Haritası</text>
        </svg>

    function posterPhotosFromNews(row, news) {
      return [];
    }

    function mediaItemsFor(row, photos, mediaType = "all") {
      const imageItems = (photos || []).filter((item) => isStrictlyRelatedImage(row, item, item.sourceNews || {})).slice(0, 8).map((item) => ({
        kind: "image",
        title: item.displayTitle || item.title,
        text: item.source || "Doğrulanmış haber görseli",
        src: item.thumb,
        url: item.url,
        mediaType: "photo",
        hideKey: mediaKeyForItem({ ...item, mediaType: "photo" })
      }));
      if (mediaType === "photo") return imageItems;
      if (mediaType === "video") return videoItemsFor(row);
      if (mediaType === "news") return [];
      if (mediaType === "social_post") return [];
      return [...imageItems, ...videoItemsFor(row)];
    }

    function renderMediaSlide(item, index) {
      const active = index === 0 ? " active" : "";
      let media;
      if (item.kind === "image") {
        media = `
          <figure class="media-figure">
            <img src="${esc(item.src)}" alt="${esc(item.title)}" loading="eager" decoding="async">
            <figcaption class="media-caption">
              <b>${esc(item.title)}</b>
              <span>${esc(item.text || "")}</span>
              <div class="news-card-footer">
                ${item.url ? `<a class="live-link" href="${esc(item.url)}" target="_blank" rel="noopener">Kaynağı aç</a>` : ""}
                ${item.hideKey ? `<button class="inline-action" type="button" data-hide-media="${esc(item.hideKey)}">Bu karta ait değil</button>` : ""}
              </div>
            </figcaption>
          </figure>
        `;
      } else if (item.kind === "video" && item.videoId) {
        media = `<div class="media-video"><iframe src="https://www.youtube-nocookie.com/embed/${esc(item.videoId)}?rel=0&modestbranding=1" title="${esc(item.title)}" loading="lazy" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
      } else {
        media = `
          <div class="media-placeholder">
            <div class="media-placeholder-inner">
              <h4>${esc(item.title)}</h4>
              <p>${esc(item.text || "")}</p>
              ${item.url ? `<a class="live-link" href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.action || "Dışarıda aç")}</a>` : ""}
            </div>
          </div>
        `;
      }
      return `
        <article class="media-slide${active}" data-media-slide>
          ${media}
        </article>
      `;
    }

    function renderMediaGallery(items, title, subtitle) {
      const safeItems = items.length ? items : [{
        kind: "action",

    function wireMediaGallery(root = document) {

        if (!slides.length) return;
        let index = 0;
        const show = (next) => {
          index = (next + slides.length) % slides.length;
          slides.forEach((slide, itemIndex) => slide.classList.toggle("active", itemIndex === index));
          dots.forEach((dot, itemIndex) => dot.classList.toggle("active", itemIndex === index));
        };
        gallery.querySelector("[data-media-prev]")?.addEventListener("click", () => show(index - 1));
        gallery.querySelector("[data-media-next]")?.addEventListener("click", () => show(index + 1));
        dots.forEach((dot) => dot.addEventListener("click", () => show(Number(dot.dataset.mediaDot || 0))));
      });
    }

    function extractYoutubeId(url) {
      try {
        const parsed = new URL(url);
        const host = parsed.hostname.replace(/^www\./, "").replace(/^m\./, "");
        if (host === "youtu.be") return parsed.pathname.slice(1).split("/")[0] || null;
        if (host === "youtube.com") {
          if (parsed.pathname === "/watch") return parsed.searchParams.get("v");
          const match = parsed.pathname.match(/^\/(?:live|embed|shorts)\/([^/]+)/);
          if (match) return match[1];
        }
      } catch {}
      return null;
    }

        if (youtubeId) {
          return { url: clean, youtubeId, label: "YouTube videosu", image: `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg` };
        }
        const searchMatch = clean.match(/[?&]s=([^&]+)/);
        if (searchMatch) {
          return { url: clean, isSearch: true, label: `Umut-Sen'de ara: ${decodeURIComponent(searchMatch[1])}` };
        }
        const slug = clean.replace(/\/+$/, "").split("/").pop() || clean;
        const label = slug
          .replace(/[-_]+/g, " ")
          .trim()
          .replace(/\b\w/g, (letter) => letter.toLocaleUpperCase("tr-TR"));
        return { url: clean, label: label || clean };

    function extractOgImage(html) {
      if (!html) return "";
      const patterns = [
        /<meta[^>]+property=["']og:image(?::secure_url)?["'][^>]+content=["']([^"']+)["']/i,
        /<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image(?::secure_url)?["']/i,
        /<meta[^>]+name=["']twitter:image(?::src)?["'][^>]+content=["']([^"']+)["']/i,
        /<meta[^>]+content=["']([^"']+)["'][^>]+name=["']twitter:image(?::src)?["']/i
      ];
      for (const pattern of patterns) {
        const match = html.match(pattern);
        if (match && match[1]) return match[1].replace(/&amp;/g, "&");
      }
      return "";
    }

    function extractOgTitle(html) {
      if (!html) return "";
      const ogMatch = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
        || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i);
      const titleMatch = !ogMatch && html.match(/<title[^>]*>([^<]+)<\/title>/i);
      const raw = ogMatch?.[1] || titleMatch?.[1] || "";
      if (!raw) return "";
      return stripHtml(raw).replace(/\s*[-|–]\s*Umut-Sen.*$/i, "").trim();

        const step = first.getBoundingClientRect().width + 10;
        const atEnd = list.scrollLeft + list.clientWidth >= list.scrollWidth - 4;
        list.scrollLeft = atEnd ? 0 : list.scrollLeft + step;
      }, 4500);

      await Promise.all(links.map(async (link, index) => {
        const card = cards[index];

        if (!thumb) return;
        if (link.youtubeId) {

          if (token !== pressImageRequestToken || !meta) return;
          if (meta.title) setCardLabel(card, meta.title);
          if (meta.thumbnail_url) setThumbImage(thumb, meta.thumbnail_url, meta.title || link.label);
          return;

        if (link.isSearch) return;
        try {
          const html = await fetchArticlePage(link.url, { background: false });
          if (token !== pressImageRequestToken) return;
          const image = extractOgImage(html);

    // Kullanıcının o an baktığı kartın haber/medya isteği HİÇBİR ZAMAN kuyrukta
    // beklemez — doğrudan ateşlenir. Eş zamanlılık kapısı (gatedFetch) yalnızca
    // kullanıcının görmediği arka plan ön-yükleme ve toplu "Canlı Tarama"
    // isteklerinde kullanılır, böylece paylaşılan proxy'ler o kısımlarda
    // korunurken açık kart asla gecikmez.
    async function fetchWithTimeout(url, options = {}, timeoutMs = 5500, { background = false } = {}) {
      const run = async () => {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          window.clearTimeout(timer);
        }
      };
      return background ? gatedFetch(run) : run();
    }

    function formatDate(dateText) {
      if (!dateText) return "";
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function parseNewsDateText(text) {
      const raw = String(text || "");
      const direct = Date.parse(raw);
      if (Number.isFinite(direct)) return direct;
      const normalized = norm(raw);
      const now = Date.now();
      const relative = normalized.match(/(\d{1,3})\s*(dakika|dk|saat|sa|gun|gün|hafta|ay)\s*(once|önce)/);
      if (relative) {
        const amount = Number(relative[1]);
        const unit = relative[2];
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;
        if (unit === "dakika" || unit === "dk") return now - amount * minute;
        if (unit === "saat" || unit === "sa") return now - amount * hour;
        if (unit === "gun" || unit === "gün") return now - amount * day;
        if (unit === "hafta") return now - amount * 7 * day;
        if (unit === "ay") return now - amount * 30 * day;
      }
      if (normalized.includes("bugun") || normalized.includes("bugün")) return now;
      if (normalized.includes("dun") || normalized.includes("dün")) return now - 24 * 60 * 60 * 1000;
      const monthMap = {
        ocak: 0, subat: 1, şubat: 1, mart: 2, nisan: 3, mayis: 4, mayıs: 4, haziran: 5,
        temmuz: 6, agustos: 7, ağustos: 7, eylul: 8, eylül: 8, ekim: 9, kasim: 10, kasım: 10, aralik: 11, aralık: 11
      };
      const named = normalized.match(/(\d{1,2})\s+(ocak|subat|şubat|mart|nisan|mayis|mayıs|haziran|temmuz|agustos|ağustos|eylul|eylül|ekim|kasim|kasım|aralik|aralık)\s+(\d{4})/);
      if (named) return new Date(Number(named[3]), monthMap[named[2]], Number(named[1])).getTime();
      const numeric = normalized.match(/(\d{1,2})[./-](\d{1,2})[./-](\d{2,4})/);
      if (numeric) {
        const year = Number(numeric[3].length === 2 ? `20${numeric[3]}` : numeric[3]);
        return new Date(year, Number(numeric[2]) - 1, Number(numeric[1])).getTime();
      }
      return 0;
    }

    function newsPublishedAt(item) {
      const candidates = [
        item.timestamp,
        parseNewsDateText(item.pubDate),
        parseNewsDateText(item.date),
        parseNewsDateText(`${item.title || ""} ${item.summary || ""}`)
      ].map((value) => Number(value) || 0).filter(Boolean);
      const now = Date.now();
      return candidates.find((value) => value <= now + 24 * 60 * 60 * 1000) || 0;
    }

    function compareNewsNewestFirst(a, b) {
      const at = newsPublishedAt(a);
      const bt = newsPublishedAt(b);
      if (Boolean(bt) !== Boolean(at)) return Boolean(bt) - Boolean(at);
      if (bt !== at) return bt - at;
      return (b.relevanceScore || 0) - (a.relevanceScore || 0);
    }

    function sortNewsNewestFirst(items) {
      return [...items].sort(compareNewsNewestFirst);
    }

    function keywordAnalysis(news) {
      const stop = new Set("ve veya ile için gibi kadar sonra önce ama fakat bir bu şu o da de ki en çok az daha ise her son yeni haber haberleri son dakika direniş direnişi grev grevi işçi işçileri".split(" "));
      const words = news
        .flatMap((item) => `${item.title} ${item.summary}`.split(/\s+/))
        .map((word) => norm(word).replace(/[^a-z0-9çğıöşü-]/g, ""))
        .filter((word) => word.length > 3 && word.length < 19 && !stop.has(word));
      const counts = words.reduce((acc, word) => {
        acc[word] = (acc[word] || 0) + 1;
        return acc;
      }, {});
      return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 7).map(([word]) => word);
    }

      return `

    function cleanNewsTitle(rawTitle) {

    function localeForCode(code) {
