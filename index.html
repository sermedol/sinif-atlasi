    async function fetchSearchCandidateFeed(row, { background = false } = {}) {
      const queries = newsQueriesFor(row).slice(0, 2);
      const results = await Promise.allSettled(queries.map(async (query) => {
        const searchUrl = `https://duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
        const response = await fetchWithTimeout(jinaReaderUrl(searchUrl), {}, background ? 5500 : 9000, { background });
        if (!response.ok) return [];
        const markdown = await response.text();
        return searchResultCandidates(markdown)
          .filter((candidate) => isUsableArticleUrl(candidate.url))
          .filter((candidate) => isRelatedText(row, `${candidate.title} ${candidate.url}`))
          .slice(0, 6)
          .map((candidate, index) => ({
            id: `${row.id}-search-${index}-${slugify(candidate.title)}`,
            title: candidate.title,
            link: candidate.url,
            canonicalUrl: normalizeMediaUrl(candidate.url),
            source: articleHost(candidate.url) || "Web kaynağı",
            sourceName: articleHost(candidate.url) || "Web kaynağı",
            summary: candidate.title,
            timestamp: 0,
            date: "",
            locale: row.scopeKind === "world" ? "Çok dilli" : "Türkçe",
            mediaType: "news",
            capturedAt: new Date().toISOString(),
            rawQuery: query
          }));
      }));
      return results.flatMap((result) => result.status === "fulfilled" ? result.value : []);
    }

    function compactSignal(text) {
      return norm(text).replace(/[^a-z0-9çğıöşü]/g, "");
    }

    function signalTerms(text, minLength = 3) {
      const stop = new Set("grev grevi direnis direnişi direnisci direnişçi protesto isci işçi emek sendika sendikasi sendikası ve veya ile icin için gibi kadar sonra once önce haber haberleri son dakika canli canlı genel turkiye türkiye dunya dünya".split(" "));
      return Array.from(new Set(norm(text)
        .split(/[^a-z0-9çğıöşü&]+/i)
        .map((item) => item.trim())
        .filter((item) => item.length >= minLength && !stop.has(item))));
    }

    function rowSignals(row) {
      const title = value(row, fields.title);
      const cleanTitle = title.replace(/\b(grevi|grev|direnişi|direniş|protestosu|protesto)\b/gi, " ");
      const compactTitle = compactSignal(cleanTitle);
      return {
        titleTerms: signalTerms(cleanTitle, 3),
        titleCompact: compactTitle.length >= 4 ? compactTitle : "",
        locationTerms: signalTerms(value(row, fields.location), 4).slice(0, 4),
        actorTerms: signalTerms(value(row, fields.actors), 4).slice(0, 5)
      };
    }

    function hasStruggleContext(text) {
      const haystack = norm(text);
      return STRICT_STRUGGLE_CONTEXT_KEYWORDS.some((keyword) => keywordInText(haystack, keyword)) || isLaborSafetyText(haystack);
    }

    function hasActorSignal(text) {
      const haystack = norm(text);
      return ACTOR_SIGNAL_KEYWORDS.some((keyword) => keywordInText(haystack, keyword));
    }

    function rowIdentityMatch(row, text) {
      const signals = rowSignals(row);
      const haystack = norm(text);
      const compactHaystack = compactSignal(text);
      const titleHits = signals.titleTerms.filter((term) => keywordInText(haystack, term));
      const exactTitleHit = Boolean(signals.titleCompact && compactHaystack.includes(signals.titleCompact));
      const locationHits = signals.locationTerms.filter((term) => keywordInText(haystack, term));
      const actorHits = signals.actorTerms.filter((term) => keywordInText(haystack, term));
      return {
        exactTitleHit,
        titleHits,
        locationHits,
        actorHits,
        hasSpecificTitle: exactTitleHit || titleHits.length >= 1,
        hasSpecificIdentity: exactTitleHit || titleHits.length >= 1 || actorHits.length >= 1 || locationHits.length >= 1
      };
    }

    function isRelatedText(row, text, options = {}) {
      const match = rowIdentityMatch(row, text);
      const contextHit = hasStruggleContext(text);
      const actorHit = hasActorSignal(text) || match.actorHits.length > 0;
      const requireContext = options.requireContext !== false;
      if (!match.hasSpecificIdentity) return false;
      if (requireContext && !contextHit) return false;
      if (match.exactTitleHit) return true;
      if (match.titleHits.length >= 2) return true;
      if (match.titleHits.length >= 1 && (match.locationHits.length || match.actorHits.length || actorHit)) return true;
      if (match.locationHits.length && (match.actorHits.length || actorHit)) return true;
      if (match.actorHits.length && contextHit) return true;
      return false;
    }

    function filterRelatedNews(row, items) {
      return items.filter((item) => isRelatedText(row, `${item.title} ${item.summary} ${item.source} ${item.link || ""}`));
    }

    function uniqueItems(items) {
      return Array.from(new Set(items.map((item) => String(item || "").trim()).filter(Boolean)));
    }

    function mediaEntityKeywords(text) {
      const cleaned = String(text || "")
        .replace(/\b(grevi|grev|direnişi|direniş|mücadelesi|mücadele|protestosu|protesto|işçileri|iscileri|işçi|isci)\b/gi, " ")
        .replace(/[“”"']/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      const phraseParts = cleaned
        .split(/\s*[/,;|]\s*|\s+-\s+/)
        .map((part) => part.trim())
        .filter((part) => part.length >= 2 && part.length <= 48);
      const termParts = signalTerms(cleaned, 2).filter((term) => !["as", "ve", "ile"].includes(term));
      const aliases = [];
      if (/p\s*&\s*g|procter/i.test(text)) aliases.push("P&G", "Procter & Gamble", "Procter Gamble");
      return uniqueItems([...phraseParts, ...termParts, ...aliases]).slice(0, 12);
    }

    function mediaRelevanceProfile(row) {
      const companyKeywords = mediaEntityKeywords(value(row, fields.title));
      const locationKeywords = signalTerms(value(row, fields.location), 4).slice(0, 8);
      const actorKeywords = signalTerms(value(row, fields.actors), 3).slice(0, 12);
      const unionKeywords = actorKeywords.filter((term) => /sendika|iş|is|lastik|metal|emek|sen|disk|türk|turk|birleşik|birlesik|teksif|petrol|nakliyat|tek-gida|tekgida/i.test(term));
      const identityAnchors = uniqueItems([
        ...companyKeywords,
        ...actorKeywords.filter((term) => term.length >= 3),
        ...locationKeywords.filter((term) => term.length >= 4)
      ]).slice(0, 20);
      const requiredAnyGroups = [];
      if (identityAnchors.length) requiredAnyGroups.push(identityAnchors);
      requiredAnyGroups.push(STRICT_STRUGGLE_CONTEXT_KEYWORDS);
      return {
        row,
        struggleId: row.id,
        requiredAnyGroups,
        requiredAllKeywords: [],
        optionalKeywords: uniqueItems([...STRICT_STRUGGLE_CONTEXT_KEYWORDS, ...ACTOR_SIGNAL_KEYWORDS, ...actorKeywords]).slice(0, 24),
        strongKeywords: STRICT_STRUGGLE_CONTEXT_KEYWORDS,
        actorSignalKeywords: ACTOR_SIGNAL_KEYWORDS,
        identityAnchors,
        locationKeywords,
        companyKeywords,
        unionKeywords,
        personKeywords: [],
        negativeKeywords: NEGATIVE_MEDIA_KEYWORDS,
        minAutoAttachScore: identityAnchors.length ? 85 : 90,
        minReviewScore: 75
      };
    }

    function keywordInText(text, keyword) {
      const needle = norm(keyword);
      if (!needle) return false;
      const haystack = norm(text);
      if (haystack.includes(needle)) return true;
      const compactNeedle = compactSignal(keyword);
      return compactNeedle.length >= 4 && compactSignal(text).includes(compactNeedle);
    }

    function matchedKeywords(text, keywords) {
      return uniqueItems((keywords || []).filter((keyword) => keywordInText(text, keyword)));
    }

    function sourceTrustScore(item) {
      const sourceText = norm(`${item.source || ""} ${item.sourceName || ""} ${item.link || ""} ${item.url || ""}`);
      return TRUSTED_SOURCE_HINTS.some((hint) => sourceText.includes(norm(hint))) ? 10 : 0;
    }

    function normalizeMediaUrl(url) {
      try {
        const parsed = new URL(url);
        ["utm_source", "utm_medium", "utm_campaign", "utm_term", "utm_content", "fbclid", "gclid"].forEach((key) => parsed.searchParams.delete(key));
        parsed.hash = "";
        return parsed.toString().replace(/\/$/, "");
      } catch {
        return String(url || "").trim();
      }
    }

    function mediaCandidateKey(item) {
      const url = normalizeMediaUrl(item.canonicalUrl || item.sourceUrl || item.link || item.url || "");
      const title = norm(item.title || "").replace(/\s+/g, " ").slice(0, 120);
      const source = norm(item.source || item.sourceName || "").slice(0, 60);
      const day = item.timestamp ? new Date(item.timestamp).toISOString().slice(0, 10) : "";
      return url || `${title}|${source}|${day}`;
    }

    function dedupeMediaCandidates(items) {
      const seen = new Set();
      return (items || []).filter((item) => {
        const key = mediaCandidateKey(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        item.canonicalUrl = normalizeMediaUrl(item.canonicalUrl || item.sourceUrl || item.link || item.url || "");
        return true;
      });
    }

    function reliabilityForScore(score, trusted) {
      if (score >= 95 && trusted) return "verified";
      if (score >= 80) return "strong";
      return "single_source";
    }

    function evaluateMediaRelevance(item, profile) {
      const text = [item.title, item.summary, item.description, item.source, item.sourceName, item.contentText, item.link, item.url].join(" ");
      const titleText = item.title || "";
      let score = 0;
      const matched = [];
      const negativeMatches = [];
      const identityMatches = matchedKeywords(text, profile.identityAnchors || []);
      const contextMatches = matchedKeywords(text, STRICT_STRUGGLE_CONTEXT_KEYWORDS);
      const actorMatches = matchedKeywords(text, ACTOR_SIGNAL_KEYWORDS);

      if (!identityMatches.length && profile.row && !isRelatedText(profile.row, text, { requireContext: false })) {
        return { score: 0, matchedKeywords: [], negativeMatches, decision: "reject", reason: "specific_identity_missing" };
      }
      if (!contextMatches.length && !isLaborSafetyText(text)) {
        return { score: 0, matchedKeywords: identityMatches, negativeMatches, decision: "reject", reason: "struggle_context_missing" };
      }
      if (!actorMatches.length && !matchedKeywords(text, [...profile.companyKeywords, ...profile.unionKeywords]).length && !isLaborSafetyText(text)) {
        return { score: 0, matchedKeywords: identityMatches, negativeMatches, decision: "reject", reason: "actor_signal_missing" };
      }

      matched.push(...identityMatches, ...contextMatches, ...actorMatches);
      score += Math.min(40, identityMatches.length * 18);
      score += Math.min(30, contextMatches.length * 12);
      score += Math.min(20, actorMatches.length * 8);

      const companyMatches = matchedKeywords(text, profile.companyKeywords);
      matched.push(...companyMatches);
      score += companyMatches.length ? 35 : 0;

      const locationMatches = matchedKeywords(text, profile.locationKeywords);
      matched.push(...locationMatches);
      score += locationMatches.length ? 12 : 0;

      const unionMatches = matchedKeywords(text, profile.unionKeywords);
      matched.push(...unionMatches);
      score += unionMatches.length ? 15 : 0;

      const titleStrong = matchedKeywords(titleText, [...profile.companyKeywords, ...profile.unionKeywords, ...STRICT_STRUGGLE_CONTEXT_KEYWORDS]);
      if (titleStrong.length >= 2) score += 20;
      else if (titleStrong.length) score += 10;

      profile.negativeKeywords.forEach((keyword) => {
        if (keywordInText(text, keyword)) {
          negativeMatches.push(keyword);
          score -= 55;
        }
      });

      const trustedScore = sourceTrustScore(item);
      score += trustedScore;
      score = Math.max(0, Math.min(100, score));

      if (negativeMatches.length) {
        return { score, matchedKeywords: uniqueItems(matched), negativeMatches, decision: "reject", reason: "negative_keyword_match" };
      }
      if (profile.row && !isRelatedText(profile.row, text)) {
        return { score: 0, matchedKeywords: uniqueItems(matched), negativeMatches, decision: "reject", reason: "strict_relation_failed" };
      }
      if (score >= profile.minAutoAttachScore) {
        return { score, matchedKeywords: uniqueItems(matched), negativeMatches, decision: "auto_attach", reason: "high_relevance", reliability: reliabilityForScore(score, trustedScore > 0) };
      }
      if (score >= profile.minReviewScore) {
        return { score, matchedKeywords: uniqueItems(matched), negativeMatches, decision: "needs_review", reason: "medium_relevance", reliability: "needs_review" };
      }
      return { score, matchedKeywords: uniqueItems(matched), negativeMatches, decision: "reject", reason: "low_relevance" };
    }

    function evaluateNewsCandidates(row, candidates) {
      const profile = mediaRelevanceProfile(row);
      const published = [];
      const reviewNews = [];
      let rejectedCount = 0;
      dedupeMediaCandidates(candidates).forEach((item, index) => {
        const result = evaluateMediaRelevance(item, profile);
        const enriched = {
          ...item,
          id: item.id || `${row.id}-media-${index}`,
          mediaType: item.mediaType || "news",
          relevanceScore: result.score,
          matchedKeywords: result.matchedKeywords || [],
          negativeMatches: result.negativeMatches || [],
          reliability: result.reliability || "single_source"
        };
        if (result.decision === "auto_attach") published.push(enriched);
        else if (result.decision === "needs_review") reviewNews.push({ ...enriched, reliability: "needs_review" });
        else rejectedCount += 1;
        console.debug("Direniş Haritası medya kararı", {
          struggleId: row.id,
          title: item.title,
          score: result.score,
          decision: result.decision,
          reason: result.reason
        });
      });
      return {
        published: dedupeNews(published),
        reviewNews: dedupeNews(reviewNews),
        rejectedCount
      };
    }

    function dedupeNews(items) {
      const seen = new Set();
      return items
        .filter((item) => {
          const key = norm(item.title).slice(0, 120) || item.link;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort(compareNewsNewestFirst)
        .slice(0, 14);
    }

    async function fetchGoogleNews(row, { background = false } = {}) {
      const seeded = (row.__seedNews || []).map((item) => ({
        ...item,
        mediaType: item.mediaType || "news",
        capturedAt: item.capturedAt || new Date().toISOString()
      }));
      const profiles = alertProfilesFor(row).filter((profile) => profile.enabled && profile.status === "active");
      const locale = localeForCode(row.scopeKind === "world" ? "en" : "tr");
      const bingQueries = newsQueriesFor(row).slice(0, 2);
      const [rssResults, searchResults, bingResults] = await Promise.all([
        Promise.allSettled(profiles.map((profile) => fetchAlertFeed(profile, { background }))),
        fetchSearchCandidateFeed(row, { background }).catch(() => []),
        Promise.allSettled(bingQueries.map((query) => fetchBingNews(query, locale, { background })))
          .then((results) => results.flatMap((result) => result.status === "fulfilled" ? result.value : []))
      ]);
      const candidates = [
        ...seeded,
        ...bingResults,
        ...rssResults.flatMap((result) => result.status === "fulfilled" ? result.value : []),
        ...searchResults
      ];
      return evaluateNewsCandidates(row, candidates);
    }

    function categoryPhotoQuery(row) {
      return "";
    }

    function photoQueriesFor(row) {
      const title = searchQueryText(value(row, fields.title));
      const place = searchQueryText(value(row, fields.location));
      const actors = searchQueryText(value(row, fields.actors));
      return Array.from(new Set([
        `${title} ${place} fotoğraf grev direniş`,
        actors.length > 4 ? `${title} ${actors} fotoğraf` : ""
      ].map((item) => item.replace(/\s+/g, " ").trim()).filter((item) => item.length > 4))).slice(0, 2);
    }

    async function fetchCommonsPhotos(query) {
      const apiUrl = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&prop=imageinfo&iiprop=url|mime|extmetadata&iiurlwidth=360&format=json&origin=*`;
      const response = await fetchWithTimeout(apiUrl);
      if (!response.ok) throw new Error("photos");
      const data = await response.json();
      return Object.values(data.query?.pages || {})
        .map((page) => {
          const image = page.imageinfo?.[0];
          return image ? {
            title: page.title?.replace(/^File:/, "") || "Görsel",
            thumb: image.thumburl || image.url,
            url: image.descriptionurl || image.url,
            source: "Wikimedia Commons",
            mime: image.mime || ""
          } : null;
        })
        .filter((item) => item && (!item.mime || item.mime.startsWith("image/")) && !/\.pdf$/i.test(item.title))
        .slice(0, 6);
    }

    async function fetchOpenversePhotos(query) {
      const apiUrl = `https://api.openverse.engineering/v1/images/?q=${encodeURIComponent(query)}&page_size=8`;
      const response = await fetchWithTimeout(apiUrl);
      if (!response.ok) throw new Error("openverse");
      const data = await response.json();
      return (data.results || [])
        .map((item) => ({
          title: item.title || "Görsel",
          thumb: item.thumbnail || item.url,
          url: item.foreign_landing_url || item.url,
          source: item.provider || "Openverse"
        }))
        .filter((item) => item.thumb)
        .slice(0, 6);
    }

    function photosFromNews(news, row = null) {
      const seen = new Set();
      return (news || [])
        .filter((item) => item.image)
        .map((item) => ({
          // Haber başlığını görselin kendi başlığına yazma. Yoksa site logosu
          // haber başlığı yüzünden ilgili sanılıp galeriye düşebilir.
          title: item.imageAlt || item.imageTitle || item.source || "Haber görseli",
          displayTitle: item.title,
          thumb: item.image,
          url: item.link,
          source: item.source ? `Haber görseli: ${item.source}` : "Haber görseli",
          // ownLabel: yalnızca görselin KENDİ alt metni varsa doludur — haber
          // başlığı/kaynağı buraya asla sızmaz (bkz. imageOwnTextBundle).
          ownLabel: item.imageAlt || item.imageTitle || "",
          // RSS kaynağı (Bing Haberler vb.) görseli haberin kendi alanı olarak
          // açıkça belirttiyse (enclosure/News:Image), og:image ile aynı
          // güven seviyesindedir.
          fromMeta: true,
          sourceNews: item,
          mediaType: "photo",
          reliability: item.reliability || "single_source"
        }))
        .filter((item) => {
          const key = item.thumb || item.url;
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .filter((item) => !row || isStrictlyRelatedImage(row, item, item.sourceNews))
        .slice(0, 6);
    }

    function jinaReaderUrl(url) {
      return `https://r.jina.ai/${url}`;
    }

    // Makale sayfasını önce kendi worker'ımızdan (ham HTML, hızlı ve güvenilir),
    // o başarısız olursa r.jina.ai'den (markdown) çekmeyi dener.
    async function fetchArticlePage(url, { background = false } = {}) {
      try {
        const response = await fetchWithTimeout(ownProxyUrl(url), {}, background ? 5000 : 8000, { background });
        if (response.ok) {
          const text = await response.text();
          if (text && text.length > 200) return text;
        }
      } catch {}
      try {
        const response = await fetchWithTimeout(jinaReaderUrl(url), {}, background ? 5500 : 4000, { background });
        if (response.ok) return await response.text();
      } catch {}
      return "";
    }

    function decodeResultUrl(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("duckduckgo.com") && parsed.pathname.startsWith("/l/")) {
          return parsed.searchParams.get("uddg") || url;
        }
      } catch {
        return url;
      }
      return url;
    }

    function searchResultCandidates(markdown) {
      const seen = new Set();
      const candidates = [];
      const patterns = [
        /^##\s+\[([^\]]+)\]\((https?:\/\/[^)]+)\)/gm,
        /\[([^\]]{8,180})\]\((https?:\/\/[^)]+)\)/g
      ];
      patterns.forEach((pattern) => {
        Array.from(String(markdown || "").matchAll(pattern)).forEach((match) => {
          const title = stripHtml(match[1] || "").replace(/\s+/g, " ").trim();
          const url = decodeResultUrl(match[2] || "");
          if (!title || !url || seen.has(url)) return;
          seen.add(url);
          candidates.push({ title, url });
        });
      });
      return candidates;
    }

    function articleHost(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return "";
      }
    }

    function isUsableArticleUrl(url) {
      const host = articleHost(url);
      if (!host) return false;
      return !/(duckduckgo|google|youtube|youtu\.be|facebook|instagram|twitter|x\.com|linkedin|pinterest|whatsapp|telegram)\./i.test(host);
    }

    async function fetchArticleCandidates(row, item, { background = false } = {}) {
      const direct = item.link && isUsableArticleUrl(item.link)
        ? [{ title: item.title, url: item.link }]
        : [];
      const query = searchQueryText(`${item.title} ${item.source || ""}`).slice(0, 190);
      if (!query) return direct;
      try {
        const searchUrl = `https://duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
        const response = await fetchWithTimeout(jinaReaderUrl(searchUrl), {}, background ? 5500 : 4000, { background });
        if (!response.ok) return direct;
        const markdown = await response.text();
        const found = searchResultCandidates(markdown)
          .filter((candidate) => isUsableArticleUrl(candidate.url))
          .filter((candidate) => isRelatedText(row, `${candidate.title} ${candidate.url}`))
          .slice(0, 3);
        return [...direct, ...found].filter((candidate, index, list) => (
          list.findIndex((match) => match.url === candidate.url) === index
        )).slice(0, 3);
      } catch {
        return direct;
      }
    }

    function imageAssetText(url, label = "") {
      const raw = String(url || "").replace(/&amp;/g, "&");
      let decoded = raw;
      try { decoded = decodeURIComponent(raw); } catch {}
      return norm(`${raw} ${decoded.replace(/[_-]+/g, " ")} ${label}`);
    }

    function isLikelyContentImage(url, label = "") {
      const raw = String(url || "").replace(/&amp;/g, "&");
      const combined = imageAssetText(raw, label);
      if (!/^https?:\/\//i.test(raw)) return false;
      if (!/\.(jpe?g|png|webp)(\?|#|$)/i.test(raw)) return false;
      if (/\.(svg|gif|ico)(\?|#|$)/i.test(raw)) return false;
      if (/external-content\.duckduckgo\.com\/ip3|googleusercontent\.com\/proxy|gstatic\.com\/images/i.test(raw)) return false;
      if (IMAGE_BLOCKLIST_KEYWORDS.some((keyword) => combined.includes(norm(keyword)))) return false;
      if (/(^|[^0-9])(1x1|16x16|24x24|32x32|48x48|64x64|80x80|90x90|120x60)([^0-9]|$)/i.test(combined)) return false;
      return true;
    }

    // DİKKAT: Burada yalnızca görselin KENDİ bilgisi kullanılır — image.source
    // ve image.url (bizim kodumuzun görsele iliştirdiği "bu görsel şu haberden"
    // etiketi/makale adresi) kasıtlı olarak DIŞARIDA bırakılır. Bir haber sayfası
    // karta ilgili kabul edildiğinde, o sayfadaki İLGİSİZ kenar çubuğu/diğer
    // haberler görselleri de "sayfa ilgiliydi" diye onaylanabiliyordu (ör. P&G
    // grevi haberinin sayfasındaki alakasız bir "Çin'de sıcak" görseli).
    // Görselin gerçekten ilgili olup olmadığı yalnızca kendi alt metni/başlığı
    // (ownLabel) ve kendi dosya yoluna bakılarak anlaşılabilir.
    function imageOwnTextBundle(image) {
      const url = image.thumb || image.src || image.image || "";
      return [image.ownLabel || "", url].join(" ");
    }

    function isLikelyBrandOrSiteAsset(url, label = "") {
      const raw = String(url || "").replace(/&amp;/g, "&");
      const text = imageAssetText(raw, label);
      const assetPattern = /(\/|^)(assets?|static|tema|theme|themes|img|image|images|wp-content\/themes|wp-includes|uploads?\/logo|files\/logo)(\/|\b)/i;
      const brandPattern = /(logo|site\s*logo|header\s*logo|footer\s*logo|favicon|avatar|brandmark|logotype|masthead|gazetemiz|kurumsal|corporate|reklam|advert|banner|sponsor)/i;
      if (brandPattern.test(text)) return true;
      if (assetPattern.test(raw) && !hasStruggleContext(text)) return true;
      return false;
    }

    function imageHasOwnRelation(row, image) {
      const ownText = imageOwnTextBundle(image);
      const match = rowIdentityMatch(row, ownText);
      const contextHit = hasStruggleContext(ownText);
      const actorHit = hasActorSignal(ownText) || match.actorHits.length > 0;
      if ((match.exactTitleHit || match.titleHits.length >= 1 || match.actorHits.length >= 1) && (contextHit || actorHit)) return true;
      if (contextHit && (actorHit || match.locationHits.length > 0)) return true;
      return false;
    }

    function isStrictlyRelatedImage(row, image, sourceNews = {}) {
      const url = image.thumb || image.src || image.image || image.url || "";
      const ownText = imageOwnTextBundle(image);
      if (!isLikelyContentImage(url, ownText)) return false;
      if (isLikelyBrandOrSiteAsset(url, ownText)) return false;
      const newsText = [sourceNews.title, sourceNews.summary, sourceNews.source, sourceNews.link].join(" ");
      const hasSourceNews = Boolean(sourceNews && sourceNews.title);
      const sourceDecision = hasSourceNews ? evaluateMediaRelevance(sourceNews, mediaRelevanceProfile(row)).decision : "";
      if (hasSourceNews && sourceDecision !== "auto_attach") return false;

      // Görselin kendi URL/alt/caption bilgisi seçili karta bağlanmıyorsa,
      // sadece haber başlığına dayanarak logo veya site görseli göstermeyiz.
      if (imageHasOwnRelation(row, image)) return true;

      // Bazı gerçek haber görsellerinde alt metin yoktur ama dosya yolu
      // işyeri/sendika/direniş adını taşır. Bunu ayrı kontrol et.
      const urlMatch = rowIdentityMatch(row, url);
      if ((urlMatch.exactTitleHit || urlMatch.titleHits.length >= 1 || urlMatch.actorHits.length >= 1) && hasStruggleContext(newsText)) return true;

      // Haber otomatik ilgili kabul edildiyse VE görsel o makalenin kendi
      // og:image/twitter:image etiketinden geldiyse (sayfanın HERHANGİ bir
      // yerinden değil, sitenin bizzat "bu sayfanın görseli budur" diye
      // işaretlediği görselden), içerik görseli gibi görünüp logo/banner
      // olmadığı sürece kullanılabilir. "fromMeta" olmayan görseller (sayfadaki
      // rastgele <img> etiketleri) için bu güven uygulanmaz — çünkü haber
      // portalları sayfaya "çok okunanlar" gibi tamamen alakasız haberlerin
      // görsellerini de gömüyor; bu yüzden Galatasaray/futbolcu gibi alakasız
      // görseller "haber sayfası ilgiliydi" gerekçesiyle sızabiliyordu.
      if (hasSourceNews && sourceDecision === "auto_attach" && image.fromMeta) {
        const assetText = imageAssetText(url, ownText);
        const looksLikeUpload = /(uploads?|files?|content|haber|news|wp-content|media|images?)\//i.test(url) || /\/(20\d{2})\/(0?[1-9]|1[0-2])\//.test(url);
        const hasBadGeneric = /\b(logo|favicon|avatar|header|footer|banner|sponsor|reklam|advert|placeholder|default|gazetemiz|masthead|kurumsal|corporate)\b/i.test(assetText);
        if (looksLikeUpload && !hasBadGeneric) return true;
      }

      return false;
    }

    function isRelatedImage(row, url, label = "") {
      return isStrictlyRelatedImage(row, { thumb: url, title: label, ownLabel: label }, {});
    }

    function imagesFromArticleMarkdown(markdown, row, item, articleUrl) {
      const seen = new Set();
      const images = [];
      const articleTitle = item.title || "";
      const sourceNews = { ...item, link: item.link || articleUrl };
      const metaPatterns = [
        /<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["'][^>]*>/gi,
        /<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["'][^>]*>/gi,
        /"image"\s*:\s*"(https?:\/\/[^"]+)"/gi
      ];
      metaPatterns.forEach((pattern) => {
        Array.from(String(markdown || "").matchAll(pattern)).forEach((match) => {
          const imageUrl = (match[1] || "").replace(/\\\//g, "/").replace(/&amp;/g, "&");
          // Bu görsel sayfanın og:image/twitter:image/JSON-LD "image" etiketinden
          // geldi — site bunu "bu sayfanın görseli budur" diye kendisi işaretledi,
          // bu yüzden güvenilirliği sayfadaki rastgele bir <img>'den yüksektir.
          const image = { title: item.source || articleHost(articleUrl) || "Haber görseli", displayTitle: articleTitle, thumb: imageUrl, url: articleUrl, source: item.source ? `Haber görseli: ${item.source}` : `Haber görseli: ${articleHost(articleUrl)}`, sourceNews, fromMeta: true, ownLabel: "" };
          if (!isStrictlyRelatedImage(row, image, sourceNews) || seen.has(imageUrl)) return;
          seen.add(imageUrl);
          images.push(image);
        });
      });
      const imagePattern = /!\[([^\]]*)\]\((https?:\/\/[^)\s]+)\)/g;
      Array.from(String(markdown || "").matchAll(imagePattern)).forEach((match) => {
        const label = stripHtml(match[1] || "").replace(/^Image\s+\d+:\s*/i, "").trim();
        const imageUrl = (match[2] || "").replace(/&amp;/g, "&");
        const image = {
          title: label || item.source || articleHost(articleUrl) || "Haber görseli",
          displayTitle: label || articleTitle,
          thumb: imageUrl,
          url: articleUrl,
          source: item.source ? `Haber görseli: ${item.source}` : `Haber görseli: ${articleHost(articleUrl)}`,
          sourceNews,
          ownLabel: label
        };
        if (!isStrictlyRelatedImage(row, image, sourceNews) || seen.has(imageUrl)) return;
        seen.add(imageUrl);
        images.push(image);
      });
      const rawPattern = /(https?:\/\/[^\s)"']+\.(?:jpe?g|png|webp)(?:\?[^\s)"']*)?)/gi;
      Array.from(String(markdown || "").matchAll(rawPattern)).forEach((match) => {
        const imageUrl = (match[1] || "").replace(/&amp;/g, "&");
        const image = {
          title: item.source || articleHost(articleUrl) || "Haber görseli",
          displayTitle: articleTitle,
          thumb: imageUrl,
          url: articleUrl,
          source: item.source ? `Haber görseli: ${item.source}` : `Haber görseli: ${articleHost(articleUrl)}`,
          sourceNews,
          ownLabel: ""
        };
        if (!isStrictlyRelatedImage(row, image, sourceNews) || seen.has(imageUrl)) return;
        seen.add(imageUrl);
        images.push(image);
      });
      return images.slice(0, 4);
    }

    async function fetchArticleImages(row, news, { background = false } = {}) {
      const selectedNews = (news || []).filter((item) => evaluateMediaRelevance(item, mediaRelevanceProfile(row)).decision === "auto_attach").slice(0, 3);
      const tasks = selectedNews.map(async (item) => {
        const candidates = await fetchArticleCandidates(row, item, { background });
        const articleResults = await Promise.allSettled(candidates.map(async (candidate) => {
          const markdown = await fetchArticlePage(candidate.url, { background });
          if (!markdown) return [];
          return imagesFromArticleMarkdown(markdown, row, item, candidate.url);
        }));
        return articleResults.flatMap((result) => result.status === "fulfilled" ? result.value : []);
      });
      const results = await Promise.allSettled(tasks);
      const seen = new Set();
      return results
        .flatMap((result) => result.status === "fulfilled" ? result.value : [])
        .filter((item) => {
          const key = item.thumb || item.url;
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .filter((item) => isStrictlyRelatedImage(row, item, item.sourceNews || {}))
        .slice(0, 10);
    }

    async function fetchAllPhotos(row) {
      // Genel açık görsel aramaları stok/temsili sonuç üretebildiği için otomatik galeride kullanılmıyor.
      // Gerçek görsel yalnızca seçili karta ait doğrulanmış haber sayfalarından alınır.
      return [];
    }

    function newsVisualFallback(row, item) {
      const title = value(row, fields.title) || item.title || "Mücadele haberi";
      const source = item.source || "İlgili haber";
      return `
        <div class="news-visual news-visual-fallback" aria-label="Görsel bulunamadı">
          <span>${esc(source)}</span>
          <strong>${esc(title)}</strong>
        </div>
      `;
    }

    function validatedNewsImage(row, item) {
      if (item.displayImage) return item.displayImage;
      const candidate = item.image ? {
        title: item.imageAlt || item.imageTitle || item.source || item.title,
        displayTitle: item.title,
        thumb: item.image,
        url: item.link,
        source: item.source ? `Haber görseli: ${item.source}` : "Haber görseli",
        sourceNews: item,
        mediaType: "photo",
        reliability: item.reliability || "single_source"
      } : null;
      if (candidate && isStrictlyRelatedImage(row, candidate, item)) return candidate.thumb;
      return "";
    }

    function newsVisualMarkup(row, item) {
      const image = validatedNewsImage(row, item);
      if (!image) return newsVisualFallback(row, item);
      return `
        <a class="news-visual" href="${esc(item.link)}" target="_blank" rel="noopener" aria-label="Haberi görselle aç">
          <img src="${esc(image)}" alt="${esc(item.title)}" loading="lazy" decoding="async">
        </a>
      `;
    }

    function attachImagesToNews(row, news = [], photos = []) {
      const usablePhotos = (photos || []).filter((photo) => isStrictlyRelatedImage(row, photo, photo.sourceNews || {}));
      return sortNewsNewestFirst(news).map((item) => {
        if (validatedNewsImage(row, item)) return item;
        const itemUrl = normalizeMediaUrl(item.link || item.url || "");
        const itemTitle = norm(item.title || "").slice(0, 90);
        const matchedPhoto = usablePhotos.find((photo) => {
          const source = photo.sourceNews || {};
          const sourceUrl = normalizeMediaUrl(source.link || source.url || photo.url || "");
          const sourceTitle = norm(source.title || photo.displayTitle || photo.title || "").slice(0, 90);
          return (itemUrl && sourceUrl && itemUrl === sourceUrl) || (itemTitle && sourceTitle && itemTitle === sourceTitle);
        });
        return matchedPhoto ? { ...item, displayImage: matchedPhoto.thumb } : item;
      });
    }

    function renderNewsInto(target, news, row, compact = false) {
      const sortedNews = sortNewsNewestFirst(news || []);
      if (!sortedNews.length) {
        target.innerHTML = '<div class="empty">Bu karta ait görselli haber bulunamadı.</div>';
        return;
      }
      const items = compact ? sortedNews.slice(0, 3) : sortedNews;
      target.innerHTML = items.map((item) => {
        const mediaKey = mediaKeyForItem(item);
        const preview = newsPreview(item, compact ? 88 : 120);
        return `
          <article class="news-card" data-media-key="${esc(mediaKey)}">
            ${newsVisualMarkup(row, item)}
            <b>${esc(item.title)}</b>
            <div class="news-source-line">
              ${item.source ? `<span>${esc(item.source)}</span>` : ""}
              ${item.date ? `<span>${esc(item.date)}</span>` : ""}
            </div>
            ${preview ? `<p class="news-preview">${esc(preview)}</p>` : ""}
            <div class="news-card-footer">
              <a href="${esc(item.link)}" target="_blank" rel="noopener">Haberi aç</a>
              ${compact ? "" : `<button class="inline-action" type="button" data-hide-media="${esc(mediaKey)}">Bu karta ait değil</button>`}
            </div>
          </article>
        `;
      }).join("");
    }

    function wireNewsActions(row, target, news) {
      if (!target) return;
      const byKey = new Map(news.map((item) => [mediaKeyForItem(item), item]));
      target.querySelectorAll("[data-hide-media]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = byKey.get(button.dataset.hideMedia);
          if (item) hideMediaItem(row, item);
        });
      });
    }

    function renderNewsResults(news, row) {
      const liveTarget = document.getElementById("liveNews");
      const summaryTarget = document.getElementById("summaryNews");
      if (liveTarget) {
        renderNewsInto(liveTarget, news, row);
        wireNewsActions(row, liveTarget, news);
      }
      if (summaryTarget) renderNewsInto(summaryTarget, news, row, true);
    }

    function summaryNewsItems(row, bundle = {}) {
      return (bundle.news || [])
        .filter((item) => !isHiddenMedia(row, item))
        .filter((item) => (item.relevanceScore || 0) >= 80 || filterRelatedNews(row, [item]).length)
        .sort(compareNewsNewestFirst)
        .slice(0, 3);
    }

    function renderSummaryNews(row, bundle = {}) {
      const target = document.getElementById("summaryNews");
      if (!target) return;
      const items = attachImagesToNews(row, summaryNewsItems(row, bundle), bundle.photos || []);
      renderNewsInto(target, items, row, true);
      const meta = document.getElementById("summaryNewsMeta");
      if (meta) {
        const scannedAt = bundle.updatedAt ? liveTime(bundle.updatedAt) : "";
        meta.textContent = items.length
          ? `${items.length} haber${scannedAt ? " · " + scannedAt : ""}`
          : "Bu karta ait haber bekleniyor";
      }
    }

    async function hydrateSummaryNews(row) {
      const target = document.getElementById("summaryNews");
      if (!target) return;
      const token = ++summaryRequestToken;
      const cached = mediaCacheFor(row);
      if (cached?.news?.length) {
        renderSummaryNews(row, cached);
        return;
      }
      target.innerHTML = '<div class="loading">Bu direnişe ait son haberler taranıyor...</div>';
      try {
        const evaluatedNews = await fetchGoogleNews(row);
        if (token !== summaryRequestToken || selectedCase()?.id !== row.id || activeTab !== "summary") return;
        const existing = liveCache.get(row.id) || {};
        const bundle = {
          news: evaluatedNews.published || [],
          reviewNews: evaluatedNews.reviewNews || [],
          rejectedCount: evaluatedNews.rejectedCount || 0,
          photos: existing.photos || [],
          updatedAt: Date.now()
        };
        liveCache.set(row.id, bundle);
        persistMediaCache();
        renderSummaryNews(row, mediaCacheFor(row) || bundle);
      } catch {
        if (token !== summaryRequestToken) return;
        target.innerHTML = '<div class="empty">Bu karta ait güncel haber şu an alınamadı.</div>';
        const meta = document.getElementById("summaryNewsMeta");
        if (meta) meta.textContent = "Canlı akış daha sonra yeniden denenir";
      }
    }

    function renderPhotosInto(target, photos, row, compact = false) {
      const visiblePhotos = (photos || []).filter((item) => !isHiddenMedia(row, { ...item, mediaType: "photo" }) && isStrictlyRelatedImage(row, item, item.sourceNews || {}));
      if (!visiblePhotos.length) {
        target.innerHTML = '<div class="empty">Bu kayıt için doğrulanmış ilgili görsel bulunamadı.</div>';
        return;
      }
      if (!compact) {
        const items = mediaItemsFor(row, visiblePhotos, "photo");
        target.innerHTML = renderMediaGallery(items, "Görsel slaytı", `${items.length} doğrulanmış ilgili görsel`);
        wireMediaGallery(target);
        wireMediaHideActions(row, target, items);
        return;
      }
      const items = visiblePhotos.slice(0, 4);
      target.innerHTML = items.map((item) => {
        const mediaKey = mediaKeyForItem({ ...item, mediaType: "photo" });
        return `
        <article class="photo-card" data-media-key="${esc(mediaKey)}">
          <img src="${esc(item.thumb)}" alt="${esc(item.displayTitle || item.title)}" loading="eager" decoding="async">
          <span>${esc(item.displayTitle || item.title)}</span>
          <div class="news-card-footer">
            <a href="${esc(item.url)}" target="_blank" rel="noopener">Görseli aç</a>
          </div>
        </article>
      `;
      }).join("");
    }

    function renderPhotoResults(photos, row) {
      const liveTarget = document.getElementById("livePhotos");
      const summaryTarget = document.getElementById("summaryPhotos");
      const bannerTarget = document.getElementById("photoGalleryBanner");
      if (liveTarget) renderPhotosInto(liveTarget, photos, row);
      if (summaryTarget) renderPhotosInto(summaryTarget, photos, row, true);
      if (bannerTarget) {
        bannerTarget.innerHTML = renderMediaGallery(
          mediaItemsFor(row, photos),
          "Görsel galerisi",
          photos.length ? `${photos.length} açık kaynak görsel bulundu; bağlantılar yalnız kullanıcı isterse açılır.` : "Görsel kaynağı bekleniyor; dış arama yalnız kullanıcı isterse açılır."
        );
        wireMediaGallery(bannerTarget);
      }
    }

    function updateMediaStatus(text) {
      // Teknik canlı tarama durum satırı arayüzden kaldırıldı.
    }

    function mediaCacheFor(row) {
      const cached = liveCache.get(row.id);
      if (!cached) return null;
      return {
        news: sortNewsNewestFirst((cached.news || [])
          .filter((item) => !isHiddenMedia(row, item))
          .filter((item) => evaluateMediaRelevance(item, mediaRelevanceProfile(row)).decision === "auto_attach")),
        reviewNews: cached.reviewNews || [],
        rejectedCount: cached.rejectedCount || 0,
        photos: (cached.photos || [])
          .filter((item) => !isHiddenMedia(row, { ...item, mediaType: "photo" }))
          .filter((item) => isStrictlyRelatedImage(row, item, item.sourceNews || item.news || {})),
        updatedAt: cached.updatedAt || 0
      };
    }

    function mediaCacheFresh(row, maxAge = MEDIA_REFRESH_MS) {
      const cached = mediaCacheFor(row);
      if (!cached?.updatedAt) return false;
      const hasContent = (cached.news || []).length || (cached.photos || []).length;
      return hasContent && Date.now() - cached.updatedAt < maxAge;
    }

    function mediaRowsToWarm(rows = filteredCases(), limit = MEDIA_PREFETCH_LIMIT) {
      const byId = new Map();
      const add = (row) => {
        if (row?.id && !byId.has(row.id)) byId.set(row.id, row);
      };
      add(selectedCase());
      // Henüz taranmamış/güncel olmayan kartlar önce sıraya girer — böylece her
      // yenileme döngüsünde hep aynı ilk birkaç kart değil, liste ilerledikçe
      // farklı kartlar ısınır ve zamanla listenin tamamı kart açılmadan hazır olur.
      rows.filter((row) => row.statusKind === "active" && !mediaCacheFresh(row)).slice(0, Math.ceil(limit / 2)).forEach(add);
      rows.filter((row) => !mediaCacheFresh(row)).slice(0, limit).forEach(add);
      rows.slice(0, limit).forEach(add);
      return Array.from(byId.values()).slice(0, limit);
    }

    function renderWarmedMediaIfVisible(row, bundle) {
      const current = selectedCase();
      if (!current || current.id !== row.id || !els.detailPanel.classList.contains("open")) return;
      if (activeTab === "media") renderLiveBundle(row, mediaCacheFor(row) || bundle);
      if (activeTab === "summary") renderSummaryNews(row, mediaCacheFor(row) || bundle);
    }

    function scheduleMediaWarmup(rows = filteredCases(), options = {}) {
      if (navigator.onLine === false) return;
      const targets = mediaRowsToWarm(rows, options.limit || MEDIA_PREFETCH_LIMIT);
      if (!targets.length) return;
      mediaWarmQueue = targets;
      if (mediaWarmTimer) window.clearTimeout(mediaWarmTimer);
      mediaWarmTimer = window.setTimeout(() => {
        warmMediaQueue({ force: Boolean(options.force) });
      }, options.delay ?? MEDIA_PREFETCH_DELAY_MS);
    }

    async function warmMediaQueue(options = {}) {
      if (mediaWarmBusy || navigator.onLine === false) return;
      mediaWarmBusy = true;
      try {
        const queue = mediaWarmQueue.splice(0);
        for (const row of queue) {
          if (!cases.some((item) => item.id === row.id)) continue;
          if (!options.force && mediaCacheFresh(row)) continue;
          try {
            const bundle = await fetchLiveBundle(row, { background: true });
            renderWarmedMediaIfVisible(row, bundle);
          } catch {
            // Background warming is best-effort; visible hydrate keeps its own fallback.
          }
          await new Promise((resolve) => window.setTimeout(resolve, 120));
        }
      } finally {
        mediaWarmBusy = false;
        if (mediaWarmQueue.length) warmMediaQueue(options);
      }
    }

    function startMediaAutoRefresh() {
      if (mediaAutoRefreshTimer) window.clearInterval(mediaAutoRefreshTimer);
      mediaAutoRefreshTimer = window.setInterval(() => {
        scheduleMediaWarmup(filteredCases(), { delay: 80, limit: MEDIA_PREFETCH_LIMIT });
      }, MEDIA_REFRESH_MS);
    }

    function renderLiveBundle(row, bundle) {
      const view = filterMediaBundle(row, bundle);
      const newsWithImages = attachImagesToNews(row, view.news || [], view.photos || []);
      renderMediaBanner(row, newsWithImages, view.photos || [], view.activeType || "all");
      renderResistanceSummary(row, newsWithImages, view.photos || []);
      renderNewsResults(newsWithImages, row);
      renderPhotoResults(view.photos || [], row);
    }

    async function fetchLiveBundle(row, { background = false } = {}) {
      // Ön plan (kullanıcının açtığı kart) ve arka plan (görünmeyen ön-yükleme)
      // istekleri ayrı anahtarlarla izlenir; böylece arka planda süren yavaş/
      // kademeli bir tarama, kullanıcının o an açtığı kartın hızlı isteğini
      // asla bekletmez.
      const dedupeKey = `${row.id}:${background ? "bg" : "fg"}`;
      if (mediaFetchPromises.has(dedupeKey)) return mediaFetchPromises.get(dedupeKey);
      const request = (async () => {
        const previous = mediaCacheFor(row);
        const evaluatedNews = await fetchGoogleNews(row, { background });
        const news = evaluatedNews.published || [];
        const quickPhotos = ((previous?.photos || []).length ? previous.photos : photosFromNews(news, row)).map((item) => ({
          ...item,
          mediaType: "photo",
          reliability: item.reliability || "single_source"
        })).slice(0, 10);
        const quickBundle = {
          news: attachImagesToNews(row, sortNewsNewestFirst(news), quickPhotos),
          reviewNews: sortNewsNewestFirst(evaluatedNews.reviewNews || []),
          rejectedCount: evaluatedNews.rejectedCount || 0,
          photos: quickPhotos,
          updatedAt: Date.now()
        };
        liveCache.set(row.id, quickBundle);
        renderWarmedMediaIfVisible(row, quickBundle);
        // Sadece BU direnişin haberlerinden çıkan görseller — stok/arşiv görsel
        // kaynakları (Openverse/Commons) alakasız generic sonuç verdiği için atlanır.
        const photoResult = await Promise.allSettled([
          fetchArticleImages(row, news, { background })
        ]);
        const articlePhotos = photoResult[0]?.status === "fulfilled" ? photoResult[0].value : [];
        const mergedPhotos = [...quickPhotos, ...photosFromNews(news, row), ...articlePhotos].map((item) => ({
          ...item,
          mediaType: "photo",
          reliability: item.reliability || "single_source"
        })).filter((item, index, list) => (
          list.findIndex((candidate) => (candidate.thumb || candidate.url) === (item.thumb || item.url)) === index
        )).filter((item, index, list) => (
          // Aynı görsel farklı ufak URL varyantlarıyla (kırpma/boyut parametresi)
          // birden fazla kez gelebiliyor — başlık aynıysa yine de tekilleştir.
          list.findIndex((candidate) => norm(candidate.displayTitle || candidate.title || "") === norm(item.displayTitle || item.title || "")) === index
        )).slice(0, 10);
        const bundle = {
          news: attachImagesToNews(row, sortNewsNewestFirst(news), mergedPhotos),
          reviewNews: sortNewsNewestFirst(evaluatedNews.reviewNews || []),
          rejectedCount: evaluatedNews.rejectedCount || 0,
          photos: mergedPhotos,
          updatedAt: Date.now()
        };
        liveCache.set(row.id, bundle);
        persistMediaCache();
        return bundle;
      })();
      mediaFetchPromises.set(dedupeKey, request);
      try {
        return await request;
      } finally {
        mediaFetchPromises.delete(dedupeKey);
      }
    }

    function liveTime(timestamp) {
      if (!timestamp) return "";
      return new Date(timestamp).toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
    }

    function stopMediaRefresh() {
      if (mediaRefreshTimer) window.clearInterval(mediaRefreshTimer);
      mediaRefreshTimer = null;
      mediaRefreshRowId = null;
    }

    function ensureMediaRefresh(row) {
      if (!row) {
        stopMediaRefresh();
        return;
      }
      if (mediaRefreshTimer && mediaRefreshRowId === row.id) return;
      stopMediaRefresh();
      mediaRefreshRowId = row.id;
      mediaRefreshTimer = window.setInterval(() => {
        const current = selectedCase();
        if (!current || current.id !== mediaRefreshRowId || activeTab !== "media" || !els.detailPanel.classList.contains("open")) {
          stopMediaRefresh();
          return;
        }
        hydrateLive(current, { force: true, background: true });
      }, MEDIA_REFRESH_MS);
    }

    async function hydrateLive(row, options = {}) {
      const button = document.querySelector(`[data-open-live="${row.id}"]`);
      if (button) button.addEventListener("click", () => openLiveTabs(row));
      const token = ++liveRequestToken;
      const cached = mediaCacheFor(row);
      if (cached) {
        renderLiveBundle(row, cached);
        if (!options.force && mediaCacheFresh(row)) return;
      } else {
        renderMediaBanner(row, [], []);
        renderResistanceSummary(row, [], []);
        const liveTarget = document.getElementById("liveNews");
        if (liveTarget) liveTarget.innerHTML = '<div class="loading">Bu direnişe ait haberler taranıyor...</div>';
        renderPhotoResults([], row);
        updateMediaScanMeta(row, {});
      }
      if (mediaRefreshBusy && options.background) return;
      mediaRefreshBusy = true;
      try {
        const bundle = await fetchLiveBundle(row, { background: Boolean(options.background) });
        if (token !== liveRequestToken) return;
        renderLiveBundle(row, bundle);
      } catch {
        if (token !== liveRequestToken) return;
        if (!cached) {
          renderMediaBanner(row, [], []);
          renderResistanceSummary(row, [], []);
          renderNewsResults([], row);
          renderPhotoResults([], row);
          updateMediaScanMeta(row, {});
        }
      } finally {
        mediaRefreshBusy = false;
      }
    }

    function openLiveTabs(row) {
      const urls = urlsFor(row);
      [urls.googleNews, urls.googleImages, urls.googleWeb, urls.youtube].forEach((url) => {
        window.open(url, "_blank", "noopener");
      });
    }

    function persistFavorites() {
      preferences.favorites = Array.from(favoriteIds);
      savePreferences();
    }

    function toggleSelectedFavorite() {
      const row = selectedCase();
      if (!row) return;
      if (favoriteIds.has(row.id)) favoriteIds.delete(row.id);
      else favoriteIds.add(row.id);
      persistFavorites();
      renderList(filteredCases());
      renderDetail();
      renderStats(filteredCases());
    }

    function selectedPayload(row) {
      return {
        id: row.id,
        baslik: value(row, fields.title),
        alan: value(row, fields.area),
        konum: value(row, fields.location),
        aktorler: value(row, fields.actors),
        talep: value(row, fields.reason),
        zaman: value(row, fields.time),
        yontem: value(row, fields.method),
        durum: value(row, fields.status),
        sonGelisme: value(row, fields.latest),
        teyit: row.verification.reason,
        iliskiliKayitlar: relationData(row).relations.slice(0, 8).map((item) => ({
          baslik: value(item.row, fields.title),
          puan: item.score,
          nedenler: item.reasons
        }))
      };
    }

    function downloadSelectedCase() {
      const row = selectedCase();
      if (!row) return;
      const blob = new Blob([JSON.stringify(selectedPayload(row), null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${row.slug || "sinif-atlasi-kart"}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function copySelectedCaseLink() {
      const row = selectedCase();
      if (!row) return;
      const url = `${location.origin}${location.pathname}#${encodeURIComponent(row.id)}`;
      history.replaceState(null, "", `#${encodeURIComponent(row.id)}`);
      try {
        await navigator.clipboard.writeText(url);
        els.copyCaseLink.textContent = "Kopyalandı";
      } catch {
        els.copyCaseLink.textContent = "Bağlantı Hazır";
      }
      window.setTimeout(() => { els.copyCaseLink.textContent = "Bağlantı Kopyala"; }, 1400);
    }

    function isLaborSafetyText(text) {
      const normalized = norm(text);
      return /is cinayet|is kazasi|isci sagligi|is guvenligi|meslek hastaligi|isig|hayatini kaybet|yasamini yitir|calisirken old|çalisirken old|yaralan|gocuk|patlama|santiye|tersane|maden kazasi|yangin|katliam/.test(normalized);
    }

    function isBadDirectMarkdown(markdown) {
      const normalized = norm(markdown);
      return !normalized.trim() || normalized.includes("service unavailable") || normalized.includes("access denied") || normalized.includes("captcha");
    }

    function mergeRows(preserveSelection = true) {
      const previousId = selectedId;
      cases = decorateRows(baseRows);
      rebuildPoints();
      filtersReady = false;
      const hashId = decodeURIComponent(location.hash.replace(/^#/, ""));
      if (hashId && cases.some((row) => row.id === hashId)) {
        selectedId = hashId;
      } else if (!preserveSelection || !cases.some((row) => row.id === previousId)) {
        selectedId = cases[0]?.id || null;
      }
      render();
    }

    function renderOverview(row) {
      return `
        <div class="detail-section">
          ${claim("Konum", value(row, fields.location))}
          ${claim("Aktörler", value(row, fields.actors))}
          ${claim("Neden / talep", value(row, fields.reason))}
          ${claim("Eylem biçimi", value(row, fields.method))}
          ${claim("Son gelişme", value(row, fields.latest))}
        </div>
      `;
    }

    function relationTokens(text) {
      const stop = new Set("ve veya ile için gibi kadar sonra önce ama fakat bir bu şu o da de ki en çok az daha ise her son yeni haber haberleri güncel mücadele direniş direnişi grev grevi işçi işçileri türkiye turkiye dünya dunya canlı canli keşif kesif genel".split(" "));
      return Array.from(new Set(norm(text)
        .split(/[^a-z0-9çğıöşü]+/i)
        .map((item) => item.trim())
        .filter((item) => item.length > 3 && !stop.has(item))));
    }

    function overlap(a, b) {
      const set = new Set(b);
      return a.filter((item) => set.has(item));
    }

    function relationFor(row, other) {
      const reasons = [];
      let score = 0;
      if (value(row, fields.area) && value(row, fields.area) === value(other, fields.area)) {
        score += 28;
        reasons.push("Aynı alan");
      } else if (row.category === other.category) {
        score += 14;
        reasons.push("Yakın alan");
      }
      const sharedOrgs = overlap(row.organizations.map(norm), other.organizations.map(norm));
      if (sharedOrgs.length) {
        score += Math.min(30, 16 + sharedOrgs.length * 5);
        reasons.push("Ortak aktör");
      }
      const locationMatch = overlap(relationTokens(value(row, fields.location)), relationTokens(value(other, fields.location)));
      if (locationMatch.length) {
        score += Math.min(24, 12 + locationMatch.length * 4);
        reasons.push("Coğrafi yakınlık");
      }
      if (row.statusKind === other.statusKind && row.statusKind !== "unknown") {
        score += 9;
        reasons.push("Benzer durum");
      }
      const rowDemand = relationTokens([value(row, fields.reason), value(row, fields.method), value(row, fields.latest), value(row, fields.title)].join(" "));
      const otherDemand = relationTokens([value(other, fields.reason), value(other, fields.method), value(other, fields.latest), value(other, fields.title)].join(" "));
      const sharedTerms = overlap(rowDemand, otherDemand);
      if (sharedTerms.length) {
        score += Math.min(22, sharedTerms.length * 5);
        reasons.push("Benzer talep / yöntem");
      }
      if (row.isDiscovered && other.isDiscovered) {
        score += 6;
        reasons.push("Canlı keşif ağı");
      }
      return {
        row: other,
        score,
        reasons: Array.from(new Set(reasons)),
        sharedTerms: sharedTerms.slice(0, 5),
        sharedOrgs: sharedOrgs.slice(0, 4)
      };
    }

    function relationData(row) {
      const relations = cases
        .filter((other) => other.id !== row.id)
        .map((other) => relationFor(row, other))
        .filter((item) => item.score >= 12)
        .sort((a, b) => b.score - a.score)
        .slice(0, 12);
      return {
        relations,
        topScore: relations[0]?.score || 0,
        sharedActorCount: relations.filter((item) => item.reasons.includes("Ortak aktör")).length,
        geoCount: relations.filter((item) => item.reasons.includes("Coğrafi yakınlık")).length
      };
    }

    function fitFiltered() {
      if (!HAS_LEAFLET) return;
      const markers = [];
      markerByCase.forEach((items) => markers.push(...items));
      if (!markers.length) return;
      const bounds = L.featureGroup(markers).getBounds();
      if (bounds.isValid()) map.fitBounds(bounds.pad(0.16), { maxZoom: 8 });
    }

    function useRows(rawRows, sourceLabel) {
      baseRows = rawRows;
      mergeRows(false);
    }

    function parseGvizResponse(response) {
      if (!response || response.status === "error" || !response.table) throw new Error("Sheet yanıtı okunamadı.");
      const matrix = (response.table.rows || []).map((row) => (row.c || []).map((cell) => cell ? String(cell.f ?? cell.v ?? "") : ""));
      const headerIndex = matrix.findIndex((row) => norm(row[0]) === "alan" && norm(row[1]) === "ne");
      if (headerIndex === -1) throw new Error("Başlık satırı okunamadı.");
      const headers = matrix[headerIndex].map((header) => String(header || "").trim());
      return matrix.slice(headerIndex + 1).map((row) => {
        const item = {};
        headers.forEach((header, index) => {
          if (header) item[header] = row[index] == null ? "" : String(row[index]).trim();
        });
        return item;
      }).filter((item) => item[fields.area] && item[fields.title]);
    }

    function loadGoogleSheet() {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const cleanup = () => {
          script.remove();
          clearTimeout(timer);
        };
        window.google = window.google || {};
        window.google.visualization = window.google.visualization || {};
        window.google.visualization.Query = window.google.visualization.Query || {};
        const previous = window.google.visualization.Query.setResponse;
        window.google.visualization.Query.setResponse = (response) => {
          try {
            const rows = parseGvizResponse(response);
            cleanup();
            window.google.visualization.Query.setResponse = previous;
            resolve(rows);
          } catch (error) {
            cleanup();
            window.google.visualization.Query.setResponse = previous;
            reject(error);
          }
        };
        const timer = window.setTimeout(() => {
          cleanup();
          window.google.visualization.Query.setResponse = previous;
          reject(new Error("Timeout"));
        }, 8000);
        script.onerror = () => {
          cleanup();
          window.google.visualization.Query.setResponse = previous;
          reject(new Error("Script error"));
        };
        const params = new URLSearchParams({ tqx: "out:json", headers: "0", cacheBust: String(Date.now()) });
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?${params.toString()}`;
        document.head.appendChild(script);
      });
    }

    async function refreshOnlineSources() {
      updateOnlineState();
      if (navigator.onLine === false) return;
      try {
        const rows = await loadGoogleSheet();
        useRows(rows, "Çevrimiçi");
      } catch {
        // Çevrimiçi tabloya ulaşılamadı; yerel kayıtlar korunur.
      }
      const row = selectedCase();
      if (row && activeTab === "media") hydrateSocialMedia(row);
      scheduleMediaWarmup(filteredCases(), { delay: 120, force: true });
    }

    function configureRefresh() {
      if (refreshTimer) window.clearInterval(refreshTimer);
      const ms = Number(preferences.refreshMs || 0);
      if (ms > 0) refreshTimer = window.setInterval(refreshOnlineSources, ms);
    }

    els.search.addEventListener("input", () => {
      const rows = filteredCases();
      if (rows.length && els.search.value.trim().length > 2) selectedId = rows[0].id;
      render();
    });
    [els.areaFilter, els.statusFilter].forEach((el) => el.addEventListener("change", render));
    els.fitFiltered.addEventListener("click", fitFiltered);
    els.focusTurkey.addEventListener("click", () => map.fitBounds([[35.7, 25.4], [42.2, 45.0]]));
    els.togglePanel.addEventListener("click", () => {
      const shouldOpen = !els.detailPanel.classList.contains("open");
      if (shouldOpen && !selectedId && cases.length) selectedId = cases[0].id;
      setPanelOpen(shouldOpen);
      renderDetail();
    });
    els.closePanel.addEventListener("click", () => setPanelOpen(false));
    els.themeToggle.addEventListener("click", () => applyTheme(preferences.theme === "dark" ? "light" : "dark"));
    els.smartFilters.forEach((button) => {
      button.addEventListener("click", () => setSmartFilter(button.dataset.smartFilter));
    });
    els.statFilters.forEach((button) => {
      button.addEventListener("click", () => setSmartFilter(
        activeSmartFilter === button.dataset.statFilter ? "active" : button.dataset.statFilter
      ));
    });
    els.favoriteCase.addEventListener("click", toggleSelectedFavorite);
    els.downloadCase.addEventListener("click", downloadSelectedCase);
    els.copyCaseLink.addEventListener("click", copySelectedCaseLink);
    window.addEventListener("online", () => {
      updateOnlineState();
      refreshOnlineSources();
    });
    window.addEventListener("offline", updateOnlineState);
    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        activeTab = button.dataset.tab;
        syncTabs();
        renderDetail();
      });
    });

    applyTheme(preferences.theme);
    applyDensity("comfortable");
    applyFocusMode(false);
    configureRefresh();
    startMediaAutoRefresh();
    updateOnlineState();
    useRows(FALLBACK_ROWS, "Yerel");
    loadGoogleSheet()
      .then((rows) => useRows(rows, "Çevrimiçi"))
      .catch(() => useRows(FALLBACK_ROWS, "Yerel"));
  </script>
</body>
</html>
