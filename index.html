    // Çoklu tile kaynağı: biri erişilemezse (ör. OSM engelli) diğerine geç.
    const TILE_SOURCES = [
      { url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", sub: "abc", attr: '&copy; OpenStreetMap' },
      { url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png", sub: "abcd", attr: '&copy; OpenStreetMap, &copy; CARTO' },
      { url: "https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png", sub: "", attr: '&copy; OpenStreetMap, Wikimedia' }
    ];
    function addResilientTiles(mapObj) {
      // İlk kaynağı ekle; tile hataları çok olursa sıradaki kaynağa geç.
      let idx = 0;
      let layer = null;
      function place() {
        const src = TILE_SOURCES[idx];
        const opts = { maxZoom: 19, attribution: src.attr };
        if (src.sub) opts.subdomains = src.sub;
        layer = L.tileLayer(src.url, opts);
        let errCount = 0;
        layer.on("tileerror", function () {
          errCount += 1;
          // Bu kaynaktan çok tile başarısızsa (erişim engeli) sıradakine geç.
          if (errCount === 6 && idx < TILE_SOURCES.length - 1) {
            idx += 1;
            mapObj.removeLayer(layer);
            place();
          }
        });
        layer.addTo(mapObj);
      }
      place();
    }

      const mapEl = document.getElementById("map");
      if (mapEl && !mapEl.querySelector(".map-fallback-msg")) {
        mapEl.innerHTML = '<div class="map-fallback-msg" style="display:flex;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5">Harita katmanı yüklenemedi (ağ/CDN erişimi engellenmiş olabilir).<br>Mücadele kayıtları ve tüm veriler soldaki listede ve panelde görüntülenmeye devam ediyor.</div>';
      }
    }

    // Leaflet hazır olunca gerçek haritayı kur ve yeniden çiz.
    function upgradeToRealMap() {
      if (HAS_LEAFLET) return;
      if (!(typeof L !== "undefined" && L && typeof L.map === "function")) { showMapUnavailable(); return; }
      HAS_LEAFLET = true;
      const mapEl = document.getElementById("map");
      if (mapEl) mapEl.innerHTML = "";
      // Harita şimdilik yalnızca Türkiye sınırları içinde çalışır — dünya
      // görünümüne kaydırma/yakınlaştırma engellenir.
      map = L.map("map", {
        zoomControl: true,
        worldCopyJump: false,
        maxBounds: [[33, 20], [45, 48]],
        maxBoundsViscosity: 1,
        minZoom: 5
      }).setView([39, 35], 6);
      addResilientTiles(map);
      markerLayer = (typeof L.markerClusterGroup === "function")
        ? L.markerClusterGroup({ showCoverageOnHover: false, maxClusterRadius: 44 })
        : L.layerGroup();
      map.addLayer(markerLayer);
      // Veriler zaten yüklendiyse marker'ları çiz ve görünümü sığdır.
      try { if (typeof render === "function" && cases && cases.length) { render(); } } catch (e) {}
    }

    if (window.__leafletReady && typeof window.__leafletReady.then === "function") {
      window.__leafletReady.then(function (ok) {
        if (ok) { upgradeToRealMap(); } else { showMapUnavailable(); }
      });
    } else {
      // Yükleyici yoksa (beklenmedik) yine de dene.
      setTimeout(function () {
        if (typeof L !== "undefined" && L && typeof L.map === "function") upgradeToRealMap();
        else showMapUnavailable();
      }, 3000);
    }

    let cases = [];
    let points = [];
    let markerByCase = new Map();
    let selectedId = null;
    let activeTab = "summary";
    let liveCache = new Map();
    let mediaFilterState = new Map();
    let liveRequestToken = 0;
    let mediaRefreshTimer = null;
    let mediaRefreshRowId = null;
    let mediaRefreshBusy = false;
    let mediaWarmTimer = null;
    let mediaWarmBusy = false;
    let mediaWarmQueue = [];
    let mediaAutoRefreshTimer = null;
    let mediaFetchPromises = new Map();
    let summaryRequestToken = 0;
    let filtersReady = false;
    let baseRows = [];
    let refreshTimer = null;
    // Varsayılan görünüm yalnızca süren (aktif) direnişleri gösterir — tam
    // liste iddiası her zaman eksik kalacağı için "tümü" seçeneği kaldırıldı.
    let activeSmartFilter = "active";

    const FIELD_ALIASES = {
      "Alan": ["Alan", "Kategori", "Başlık alanı", "Baslik alani"],
      "Ne": ["Ne", "Direniş", "Direniş adı", "Direnis", "Direnis adi", "Başlık", "Baslik"],
      "Nerede": ["Nerede", "Konum", "Yer", "Lokasyon", "Şehir", "Sehir"],
      "Kim": ["Kim", "Aktörler", "Aktorler", "Özne", "Ozne"],
      "Neden": ["Neden", "Talep", "Gerekçe", "Gerekce"],
      "Ne zaman / kaçıncı gün": ["Ne zaman / kaçıncı gün", "Güncel zaman/gün", "Guncel zaman/gun", "17 Haz. zaman/gün", "Ne zaman", "Kaçıncı gün", "Kacinci gun", "Tarih", "Süre", "Sure"],
      "Nasıl": ["Nasıl", "Nasil", "Eylem biçimi", "Eylem bicimi", "Yöntem", "Yontem"],
      "Durum / sonuç": ["Durum / sonuç", "Durum / sonuc", "Durum 24 Haz.", "Durum 17 Haz.", "Durum", "Sonuç", "Sonuc", "Status"],
      "Son gelişme": ["Son gelişme", "Son gelisme", "Son gelişme 24 Haz.", "Son gelisme 24 Haz.", "Son gelişme 17 Haz.", "Son gelisme 17 Haz.", "Gelişme", "Gelisme", "Son durum", "Latest"]
    };

    function keyNorm(text) {
      return String(text || "")
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ı/g, "i")
        .replace(/[^a-z0-9]+/g, "");
    }

    function value(row, key) {
      const aliases = FIELD_ALIASES[key] || [key];
      for (const candidate of [key, ...aliases]) {
        if (row[candidate] != null && String(row[candidate]).trim()) return String(row[candidate]).trim();
      }
      const normalizedAliases = new Set([key, ...aliases].map(keyNorm));
      const target = keyNorm(key);
      const scored = Object.keys(row || {}).map((candidate) => {
        const normalized = keyNorm(candidate);
        const cellValue = row[candidate] == null ? "" : String(row[candidate]).trim();
        if (!cellValue) return { candidate, score: -100 };
        let score = normalizedAliases.has(normalized) ? 100 : 0;
        normalizedAliases.forEach((alias) => {
          if (!alias) return;
          if (normalized.startsWith(alias)) score = Math.max(score, 76);
          else if (normalized.includes(alias)) score = Math.max(score, 48);
        });
        if (normalized.includes("guncel")) score += 12;
        if (normalized.includes("24haz")) score += 10;
        if (normalized.includes("17haz")) score += 4;
        if (normalized.includes("teyit") && !target.includes("teyit")) score -= 55;
        return { candidate, score };
      }).sort((a, b) => b.score - a.score);
      const best = scored[0];
      return best && best.score > 0 ? String(row[best.candidate]).trim() : "";
    }

    function norm(text) {
      return String(text || "")
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ı/g, "i");
    }

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function shortText(text, max = 110) {
      const cleaned = String(text || "").replace(/\s+/g, " ").trim();
      if (cleaned.length <= max) return cleaned;
      return `${cleaned.slice(0, max).replace(/\s+\S*$/, "")}...`;
    }

    function escapeRegExp(text) {
      return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function newsPreview(item, max = 110) {
      let summary = stripHtml(item.summary || "").replace(/\s+/g, " ").trim();
      [item.title, item.source, item.sourceName].filter(Boolean).forEach((part) => {
        summary = summary.replace(new RegExp(escapeRegExp(part), "gi"), " ");
      });
      summary = summary.replace(/\s*[-–—|]\s*/g, " ").replace(/\s+/g, " ").trim();
      if (!summary || summary.length < 24) return "";
      const titleText = norm(item.title || "");
      const summaryText = norm(summary);
      if (titleText && (summaryText.includes(titleText.slice(0, 42)) || titleText.includes(summaryText.slice(0, 42)))) return "";
      return shortText(summary, max);
    }

    function readPreferences() {
      try {
        return {
          theme: "light",
          density: "comfortable",
          focusMode: false,
          refreshMs: 900000,
          discoveryCollapsed: false,
          favorites: [],
          ...JSON.parse(localStorage.getItem(PREF_KEY) || "{}")
        };
      } catch {
        return { theme: "light", density: "comfortable", focusMode: false, refreshMs: 900000, discoveryCollapsed: false, favorites: [] };
      }
    }

    const preferences = readPreferences();
    let favoriteIds = new Set(preferences.favorites || []);
    let hiddenMedia = readHiddenMedia();
    loadPersistedMediaCache();

    function savePreferences() {
      localStorage.setItem(PREF_KEY, JSON.stringify(preferences));
    }

    function readHiddenMedia() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HIDDEN_MEDIA_KEY) || "{}");
        return Object.fromEntries(Object.entries(parsed).map(([key, values]) => [key, new Set(values || [])]));
      } catch {
        return {};
      }
    }

    function saveHiddenMedia() {
      const serializable = Object.fromEntries(Object.entries(hiddenMedia).map(([key, values]) => [key, Array.from(values)]));
      localStorage.setItem(HIDDEN_MEDIA_KEY, JSON.stringify(serializable));
    }

    // Sayfa yenilendiğinde haber/görsel taramasını sıfırdan tekrar başlatmamak için
    // canlı medya sonuçlarını tarayıcıda kısa süreliğine saklıyoruz. Bu hem
    // paylaşılan proxy'lere yükü azaltır hem de kart açıldığında içerik anında görünür.
    function loadPersistedMediaCache() {
      try {
        const parsed = JSON.parse(localStorage.getItem(MEDIA_CACHE_KEY) || "{}");
        const now = Date.now();
        Object.entries(parsed).forEach(([rowId, bundle]) => {
          if (bundle && now - (bundle.updatedAt || 0) < MEDIA_CACHE_MAX_AGE_MS) {
            liveCache.set(rowId, bundle);
          }
        });
      } catch {
        // Bozuk önbellek varsa sessizce yok say, canlı tarama sıfırdan doldurur.
      }
    }

    let mediaCachePersistTimer = null;
    function persistMediaCache() {
      if (mediaCachePersistTimer) return;
      mediaCachePersistTimer = window.setTimeout(() => {
        mediaCachePersistTimer = null;
        try {
          const now = Date.now();
          const serializable = {};
          liveCache.forEach((bundle, rowId) => {
            if (bundle && now - (bundle.updatedAt || 0) < MEDIA_CACHE_MAX_AGE_MS) {
              serializable[rowId] = bundle;
            }
          });
          localStorage.setItem(MEDIA_CACHE_KEY, JSON.stringify(serializable));
        } catch {
          // Depolama dolu/erişilemez olabilir; sessizce vazgeç.
        }
      }, 1000);
    }

    function mediaKeyForItem(item) {
      const type = item.mediaType || item.kind || (item.thumb || item.src ? "photo" : "news");
      if (type === "photo" || type === "image") {
        return `photo:${normalizeMediaUrl(item.thumb || item.src || "")}|${normalizeMediaUrl(item.url || item.link || "")}|${norm(item.title || "").slice(0, 80)}`;
      }
      if (type === "video" && item.videoId) return `video:${item.videoId}`;
      return mediaCandidateKey(item);
    }

    function isHiddenMedia(row, item) {
      if (!row || !item) return false;
      return Boolean(hiddenMedia[row.id]?.has(mediaKeyForItem(item)));
    }

    function hideMediaItem(row, item) {
      if (!row || !item) return;
      if (!hiddenMedia[row.id]) hiddenMedia[row.id] = new Set();
      hiddenMedia[row.id].add(mediaKeyForItem(item));
      saveHiddenMedia();
      const cached = mediaCacheFor(row);
      if (cached) renderLiveBundle(row, cached);
    }

    function applyTheme(theme) {
      preferences.theme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = preferences.theme;
      els.themeToggle.textContent = preferences.theme === "dark" ? "Aydınlık" : "Karanlık";
      savePreferences();
    }

    function applyDensity(density) {
      preferences.density = density === "compact" ? "compact" : "comfortable";
      document.documentElement.dataset.density = preferences.density;
      savePreferences();
    }

    function applyFocusMode(enabled) {
      preferences.focusMode = Boolean(enabled);
      document.documentElement.dataset.focus = preferences.focusMode ? "map" : "standard";
      window.setTimeout(() => map.invalidateSize(), 220);
      savePreferences();
    }

    function updateOnlineState() {
      return navigator.onLine !== false;
    }

    function slugify(text) {
      return norm(text).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 70) || "case";
    }

    function category(area) {
      const text = norm(area);
      if (text.includes("dunya")) return "dunya";
      if (text.includes("ekoloji")) return "ekoloji";
      if (text.includes("adalet")) return "adalet";
      if (text.includes("emek")) return "emek";
      return text.includes("/") ? "karma" : "karma";
    }

    function scopeKindFor(row) {
      const area = norm(value(row, fields.area));
      const location = norm(value(row, fields.location));
      const title = norm(value(row, fields.title));
      if (row.__discovered && (area.includes("dunya") || location.includes("dunya"))) return "world";
      if (area.includes("dunya") || location.includes("dunya") || title.match(/world|global|international|huelga|grève|greve|streik/)) return "world";
      return "turkey";
    }

    function statusKind(status) {
      const text = norm(status);
      if (text.match(/kazan|won|sonuclandi|sonuclandi|anlasma|bitti|bitirildi|tamamlandi/)) return "won";
      if (text.match(/bekle|baslayacak|oylama|askida|hazirlik|planlanan/)) return "watch";
      if (text.includes("teyit") || text.includes("belirsiz")) return "needs_verification";
      if (text.match(/devam|suruyor|suren|aktif|active|grev|direnis|nobet|takip|kampanya/)) return "active";
      return "unknown";
    }

    function verificationFor(row) {
      const combined = norm([value(row, fields.time), value(row, fields.status), value(row, fields.latest), value(row, fields.location)].join(" "));
      if (combined.includes("teyit") || combined.includes("belirsiz")) {
        return { key: "weak", label: "Teyit bekliyor", score: 38, reason: "Kayıtta teyit bekleyen veya belirsiz alan var." };
      }
      if (combined.includes("devam ediyor") || combined.includes("kazan") || combined.includes("sonuclandi")) {
        return { key: "single", label: "İzleniyor", score: 58, reason: "Kayıt izlenebilir durumda." };
      }
      return { key: "unverified", label: "Bilgi sınırlı", score: 25, reason: "Bilgi düzeyi sınırlı." };
    }

    function priorityFor(row, verification, geoPoints) {
      const combined = norm([value(row, fields.status), value(row, fields.latest), value(row, fields.time), value(row, fields.reason)].join(" "));
      let score = 30;
      const kind = statusKind(value(row, fields.status));
      if (kind === "active") score += 26;
      if (kind === "watch") score += 16;
      if (kind === "needs_verification") score += 18;
      if (verification.key === "weak") score += 12;
      if (value(row, fields.latest)) score += 10;
      if (geoPoints.length > 1) score += 8;
      if (combined.match(/grev|direnis|protesto|nobet|is birak|kampanya|canli|devam/)) score += 8;
      if (combined.match(/kazan|sonuclandi/)) score -= 10;
      return Math.max(10, Math.min(100, score));
    }

    function explicitPoint(row) {
      const keys = Object.keys(row).reduce((acc, key) => {
        acc[norm(key)] = key;
        return acc;
      }, {});
      const latKey = keys.enlem || keys.lat || keys.latitude;
      const lngKey = keys.boylam || keys.lng || keys.lon || keys.longitude;
      if (!latKey || !lngKey) return null;
      const lat = Number(String(row[latKey]).replace(",", "."));
      const lng = Number(String(row[lngKey]).replace(",", "."));
      return Number.isFinite(lat) && Number.isFinite(lng) ? [{ label: value(row, fields.location), lat, lng }] : null;
    }

    function pointsFor(row) {
      return explicitPoint(row) || LOCATION_POINTS[value(row, fields.location)] || [];
    }

    function organizations(row) {
      const actorText = value(row, fields.actors);
      const parts = actorText
        .split(/,| ve | \/ |;|\|/i)
        .map((part) => part.trim())
        .filter((part) => part.length > 2);
      return Array.from(new Set(parts)).slice(0, 8);
    }

    function decorateRows(rawRows) {
      return rawRows
        .filter((row) => value(row, fields.area) && value(row, fields.title))
        .map((row, index) => {
          const verification = verificationFor(row);
          const geoPoints = pointsFor(row);
          const priorityScore = priorityFor(row, verification, geoPoints);
          const item = {
            ...row,
            id: row.__atlasId || `case-${index + 1}`,
            index: Number(row.__atlasIndex || index + 1),
            slug: slugify(value(row, fields.title)),
            category: category(value(row, fields.area)),
            scopeKind: scopeKindFor(row),
            statusKind: statusKind(value(row, fields.status)),
            verification,
            priorityScore,
            organizations: organizations(row),
            sourceCount: Number(row.__sourceCount || 1),
            isDiscovered: Boolean(row.__discovered),
            pointCount: geoPoints.length,
            searchText: norm(Object.values(row).join(" "))
          };
          return item;
        });
    }

    function rebuildPoints() {
      markerByCase = new Map();
      points = cases.flatMap((row) => pointsFor(row).map((point, index) => ({ id: `${row.id}-p${index}`, row, point })));
    }

    function iconFor(row) {
      return L.divIcon({
        className: "",
        html: `<span class="pin pin-${row.category}" aria-hidden="true"></span>`,
        iconSize: [26, 26],
        iconAnchor: [13, 24],
        popupAnchor: [0, -23]
      });
    }

    function popupFor(entry) {
      return `
        <article class="popup-mini">
          <h3>${esc(value(entry.row, fields.title))}</h3>
          <div class="tag-row">
            <span class="tag">${esc(value(entry.row, fields.area))}</span>
            <span class="tag">${esc(value(entry.row, fields.status))}</span>
          </div>
          <p>${esc(entry.point.label || value(entry.row, fields.location))}</p>
          <button type="button" data-open-case="${esc(entry.row.id)}">Kartı aç</button>
        </article>
      `;
    }

    function buildMarker(entry) {
      const marker = L.marker([entry.point.lat, entry.point.lng], {
        icon: iconFor(entry.row),
        title: value(entry.row, fields.title)
      }).bindPopup(popupFor(entry));
      marker.on("popupopen", () => {
        const button = document.querySelector(`[data-open-case="${entry.row.id}"]`);
        if (button) button.addEventListener("click", () => selectCase(entry.row.id, { focusMap: false }));
      });
      if (!markerByCase.has(entry.row.id)) markerByCase.set(entry.row.id, []);
      markerByCase.get(entry.row.id).push(marker);
      return marker;
    }

    function smartFilterMatches(row) {
      if (activeSmartFilter === "active") return row.statusKind === "active";
      if (activeSmartFilter === "favorites") return favoriteIds.has(row.id);
      if (activeSmartFilter === "discovered") return row.isDiscovered;
      if (activeSmartFilter === "world") return row.scopeKind === "world";
      if (activeSmartFilter === "turkey") return row.scopeKind === "turkey";
      return true;
    }

    function matches(row) {
      const query = norm(els.search.value);
      if (query && !row.searchText.includes(query)) return false;
      if (!smartFilterMatches(row)) return false;
      if (els.areaFilter.value && value(row, fields.area) !== els.areaFilter.value) return false;
      if (els.statusFilter.value && value(row, fields.status) !== els.statusFilter.value) return false;
      return true;
    }

    function filteredCases() {
      return cases.filter(matches);
    }

    function filteredPoints() {
      // Harita şimdilik yalnızca Türkiye kayıtlarını gösterir; Dünya kapsamlı
      // kayıtlar mücadele listesinde görünmeye devam eder, haritada pin olarak
      // çıkmaz.
      const visibleIds = new Set(filteredCases().filter((row) => row.scopeKind !== "world").map((row) => row.id));
      return points.filter((entry) => visibleIds.has(entry.row.id));
    }

    function renderMarkers() {
      if (!HAS_LEAFLET) return [];
      markerLayer.clearLayers();
      markerByCase = new Map();
      const markers = filteredPoints().map(buildMarker);
      if (markers.length) markerLayer.addLayers(markers);
      return markers;
    }

    function renderList(rows) {
      if (!rows.length) {
        els.caseList.innerHTML = '<div class="empty"><b>Eşleşen kayıt yok.</b><span>Filtreleri sıfırlayıp diğer direnişleri görebilirsin.</span></div>';
        return;
      }
      els.caseList.innerHTML = rows.map((row) => `
        <button class="case-card item-${row.category}${row.id === selectedId ? " active" : ""}" type="button" data-case-id="${esc(row.id)}">
          <div class="case-card-top">
            <span class="case-status-dot" aria-hidden="true"></span>
            <h2>${esc(value(row, fields.title))}</h2>
          </div>
          <p class="case-location">${esc(value(row, fields.location))}</p>
          <div class="tag-row">
            <span class="tag">${esc(value(row, fields.area))}</span>
            <span class="tag">${esc(value(row, fields.status))}</span>
            ${favoriteIds.has(row.id) ? '<span class="tag">Favori</span>' : ""}
            ${row.isDiscovered ? '<span class="tag">Canlı keşif</span>' : ""}
            <span class="tag">${row.pointCount ? `${row.pointCount} nokta` : "haritasız"}</span>
          </div>
        </button>
      `).join("");
      els.caseList.querySelectorAll("[data-case-id]").forEach((button) => {
        button.addEventListener("click", () => selectCase(button.dataset.caseId));
      });
    }

    function populateFilters() {
      const areas = Array.from(new Set(cases.map((row) => value(row, fields.area)).filter(Boolean))).sort((a, b) => a.localeCompare(b, "tr"));
      const statuses = Array.from(new Set(cases.map((row) => value(row, fields.status)).filter(Boolean))).sort((a, b) => a.localeCompare(b, "tr"));
      els.areaFilter.innerHTML = '<option value="">Tüm alanlar</option>' + areas.map((area) => `<option value="${esc(area)}">${esc(area)}</option>`).join("");
      els.statusFilter.innerHTML = '<option value="">Tüm durumlar</option>' + statuses.map((status) => `<option value="${esc(status)}">${esc(status)}</option>`).join("");
      filtersReady = true;
    }

    function countsBy(rows, getter) {
      return rows.reduce((acc, row) => {
        const key = getter(row) || "Bilinmiyor";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function topKey(counts) {
      return Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || "-";
    }

    function syncSmartFilters() {
      els.smartFilters.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.smartFilter === activeSmartFilter);
      });
      els.statFilters.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.statFilter === activeSmartFilter);
      });
    }

    function resetStandardFilters() {
      els.search.value = "";
      els.areaFilter.value = "";
      els.statusFilter.value = "";
    }

    function setSmartFilter(filter) {
      activeSmartFilter = filter || "active";
      resetStandardFilters();
      render();
      const rows = filteredCases();
      if (rows.length) selectedId = rows[0].id;
      renderList(rows);
      renderDetail();
      fitFiltered();
    }

    function renderStats(rows) {
      const allRows = cases;
      els.visibleCount.textContent = `${rows.length} kayıt`;
      els.activeCount.textContent = allRows.filter((row) => row.statusKind === "active").length;
      syncSmartFilters();
    }

    function render() {
      if (!filtersReady) populateFilters();
      const rows = filteredCases();
      const markers = renderMarkers();
      renderList(rows);
      renderStats(rows);
      if (!selectedId && rows.length) selectedId = rows[0].id;
      renderDetail();
      scheduleMediaWarmup(rows);
      if (HAS_LEAFLET && markers.length) {
        const bounds = L.featureGroup(markers).getBounds();
        if (bounds.isValid()) map.fitBounds(bounds.pad(0.12), { maxZoom: 7 });
      }
    }

    function claim(label, body) {
      if (!body) return "";
      return `
        <div class="claim">
          <b>${esc(label)}</b>
          <span>${esc(body)}</span>
        </div>
      `;
    }

    // Konum metniyle birlikte, varsa haritadaki gerçek koordinatları da

    function locationSection(row) {
      const locationText = value(row, fields.location);

      const points = pointsFor(row).filter((point) => Number.isFinite(point.lat) && Number.isFinite(point.lng));
      const coordRows = points.map((point) => {
        const coordText = `${point.lat.toFixed(5)}, ${point.lng.toFixed(5)}`;
        const mapsUrl = `https://www.google.com/maps?q=${point.lat},${point.lng}`;
        return `
          <div class="coord-row">
            <span class="coord-label">${esc(point.label || locationText)}</span>
            <span class="coord-value">${esc(coordText)}</span>
            <button class="inline-action" type="button" data-copy-coord="${esc(coordText)}">Koordinatı kopyala</button>
            <a class="inline-action" href="${esc(mapsUrl)}" target="_blank" rel="noopener">Haritada aç</a>
          </div>
        `;
      }).join("");
      return `
        <div class="claim">
          <b>Nerede</b>
          <span>${esc(locationText)}</span>
          ${coordRows ? `<div class="coord-list">${coordRows}</div>` : ""}

    function wireCoordActions(root) {
      if (!root) return;
      root.querySelectorAll("[data-copy-coord]").forEach((button) => {

          try {

            button.textContent = "Kopyalandı";
          } catch {

    function searchQueryText(text) {

        .replace(/&/g, " ")

    function liveQuery(row) {

      return [title, place].filter(Boolean).join(" ");
    }

    function urlsFor(row) {
      const query = liveQuery(row);
      const encoded = encodeURIComponent(query);
      const imageQuery = encodeURIComponent(`${query} fotoğraf`);
      const videoQuery = encodeURIComponent(`${query} video`);
      return {
        query,
        googleNews: `https://news.google.com/search?q=${encoded}&hl=tr&gl=TR&ceid=TR%3Atr`,
        googleImages: `https://www.google.com/search?tbm=isch&q=${imageQuery}`,
        googleWeb: `https://www.google.com/search?q=${encoded}`,
        duckImages: `https://duckduckgo.com/?q=${imageQuery}&iax=images&ia=images`,
        youtube: `https://www.youtube.com/results?search_query=${videoQuery}`,
        googleVideos: `https://www.google.com/search?tbm=vid&q=${videoQuery}`
      };

    // YouTube arama sonucundan gerçek video ID'lerini çıkar (proxy zinciriyle).
    // listType=search embed 2020'de kaldırıldığı için ID'yi bulup /embed/ID gömeriz.
    const youtubeIdCache = new Map();
    async function fetchYoutubeVideoIds(query, limit = 3) {
      const key = norm(query);
      if (youtubeIdCache.has(key)) return youtubeIdCache.get(key);
      const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`,
        `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(searchUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`,
        `https://thingproxy.freeboard.io/fetch/${searchUrl}`
      ];
      for (const proxy of proxies) {
        try {
          const response = await fetchWithTimeout(proxy, {}, 9000);
          if (!response.ok) continue;
          const html = await response.text();
          if (!html) continue;
          // YouTube sonuç sayfasında videoId'ler "videoId":"XXXXXXXXXXX" biçiminde geçer.
          const ids = [];
          const seen = new Set();
          const re = /"videoId":"([a-zA-Z0-9_-]{11})"/g;
          let m;
          while ((m = re.exec(html)) && ids.length < limit) {
            if (!seen.has(m[1])) { seen.add(m[1]); ids.push(m[1]); }
          }
          if (ids.length) { youtubeIdCache.set(key, ids); return ids; }
        } catch {
          // sıradaki proxy
        }
      }
      youtubeIdCache.set(key, []);
      return [];
    }

    function videoItemsFor(row) {
      const urls = urlsFor(row);
      const title = value(row, fields.title);
      // Önce arama linki fallback'i; gerçek gömülü videolar hydrateVideos ile eklenir.
      return [
        {
          kind: "action",
          title: `${title} · video`,
          text: "Bu başlıkla ilgili videolar yükleniyor…",
          url: urls.youtube,
          action: "YouTube'da aç"
        }
      ];
    }

    // Bir kart için gerçek YouTube videolarını bulup gömülü slide'lara çevir.
    function decodeYoutubeText(text) {
      try {
        return JSON.parse(`"${String(text || "").replace(/"/g, '\"')}"`);
      } catch {
        return String(text || "").replace(/\u0026/g, "&");
      }
    }

    function youtubeCandidatesFromHtml(html) {
      const seen = new Set();
      const videos = [];
      const re = /"videoId":"([a-zA-Z0-9_-]{11})"/g;
      let match;
      while ((match = re.exec(html)) && videos.length < 16) {
        const id = match[1];
        if (seen.has(id)) continue;
        seen.add(id);
        const chunk = html.slice(Math.max(0, match.index - 500), Math.min(html.length, match.index + 1600));
        const title = chunk.match(/"title":\{"runs":\[\{"text":"([^"]{8,180})"/)?.[1]
          || chunk.match(/"title":\{"simpleText":"([^"]{8,180})"/)?.[1]
          || "";
        videos.push({ id, title: decodeYoutubeText(title) });
      }
      return videos;
    }

    async function fetchYoutubeVideos(query, row, limit = 2) {
      const key = `${row.id}:${norm(query)}`;
      if (youtubeIdCache.has(key)) return youtubeIdCache.get(key);
      const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`,
        `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(searchUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`,
        `https://thingproxy.freeboard.io/fetch/${searchUrl}`
      ];
      for (const proxy of proxies) {
        try {
          const response = await fetchWithTimeout(proxy, {}, 9000);
          if (!response.ok) continue;
          const html = await response.text();
          const videos = youtubeCandidatesFromHtml(html)
            .filter((video) => video.title && isRelatedText(row, `${video.title} ${query}`))
            .slice(0, limit)
            .map((video, index) => ({
              kind: "video",
              videoId: video.id,
              title: video.title || `${value(row, fields.title)} · video ${index + 1}`,
              text: "",
              url: `https://www.youtube.com/watch?v=${video.id}`,
              mediaType: "video",
              reliability: "strong"
            }));
          if (videos.length) { youtubeIdCache.set(key, videos); return videos; }
        } catch {}
      }
      youtubeIdCache.set(key, []);
      return [];
    }

    async function hydrateVideoEmbeds(row) {

      const query = `"${title}" ${location} grev direniş işçi video`.replace(/\s+/g, " ").trim();

    }

    function wireMediaGallery(root = document) {
      root.querySelectorAll("[data-media-gallery]").forEach((gallery) => {
        const slides = Array.from(gallery.querySelectorAll("[data-media-slide]"));
        const dots = Array.from(gallery.querySelectorAll("[data-media-dot]"));
        if (!slides.length) return;
        let index = 0;
        const show = (next) => {
          index = (next + slides.length) % slides.length;
          slides.forEach((slide, itemIndex) => slide.classList.toggle("active", itemIndex === index));
          dots.forEach((dot, itemIndex) => dot.classList.toggle("active", itemIndex === index));
        };
        gallery.querySelector("[data-media-prev]")?.addEventListener("click", () => show(index - 1));
        gallery.querySelector("[data-media-next]")?.addEventListener("click", () => show(index + 1));
        dots.forEach((dot) => dot.addEventListener("click", () => show(Number(dot.dataset.mediaDot || 0))));
      });
    }

      if (!root) return;

    // Bu direnişe özgü arama terimi: @umutsendikasi_ hesabından bu başlık/
    // konuyla ilgili paylaşımları arar.
    function umutSenSearchQuery(row) {
      const title = searchQueryText(value(row, fields.title).replace(/\s*\/\s*/g, " "));
      const place = searchQueryText(value(row, fields.location)
        .replace(/Türkiye geneli.*/i, "")
        .replace(/hattı|ve çevresi|ve ilçeleri|mağaza önleri/gi, "")
        .trim());
      return [title, place].filter(Boolean).join(" ");
    }

    let twitterWidgetsPromise = null;
    function loadTwitterWidgets() {
      if (window.twttr && window.twttr.widgets) return Promise.resolve(window.twttr);
      if (twitterWidgetsPromise) return twitterWidgetsPromise;
      twitterWidgetsPromise = new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "https://platform.twitter.com/widgets.js";
        script.async = true;
        script.onload = () => resolve(window.twttr || null);
        script.onerror = () => resolve(null);
        document.head.appendChild(script);
      });
      return twitterWidgetsPromise;
    }

    // Umut-Sen'in X paylaşımlarını bu direnişle ilgili arama sorgusuyla gömer.
    // X'in ücretsiz gömme servisi zaman zaman rate-limit'e takılabildiği için,
    // birkaç saniye içinde gerçek içerik oluşmazsa otomatik olarak "X'te ara"
    // bağlantısına düşer — kullanıcı asla boş/bozuk bir kutuyla baş başa kalmaz.
    async function hydrateSocialMedia(row) {
      const container = document.getElementById("socialEmbedX");
      const fallback = document.getElementById("socialXFallback");
      if (!container) return;
      const token = ++liveRequestToken;
      const query = umutSenSearchQuery(row);
      const searchUrl = `https://twitter.com/search?q=${encodeURIComponent(`from:umutsendikasi_ ${query}`.trim())}`;
      if (fallback) fallback.href = searchUrl;
      container.innerHTML = '<div class="loading">Umut-Sen paylaşımları yükleniyor...</div>';
      const twttr = await loadTwitterWidgets();
      if (token !== liveRequestToken) return;
      if (!twttr) {
        container.innerHTML = "";
        if (fallback) fallback.hidden = false;
        return;
      }
      container.innerHTML = "";
      const anchor = document.createElement("a");
      anchor.className = "twitter-timeline";
      anchor.setAttribute("data-widget-type", "search");
      anchor.setAttribute("data-height", "420");
      anchor.href = searchUrl;
      anchor.textContent = "Umut-Sen paylaşımları";
      container.appendChild(anchor);
      twttr.widgets.load(container);
      window.setTimeout(() => {
        if (token !== liveRequestToken) return;
        const iframe = container.querySelector("iframe");
        const rendered = iframe && iframe.getBoundingClientRect().height > 40;
        if (!rendered) {
          container.innerHTML = "";
          if (fallback) fallback.hidden = false;
        }
      }, 4500);
    }

    function mediaFiltersFor(row) {
      return {
        type: "all",
        reliability: "all",
        verifiedOnly: false,
        ...(mediaFilterState.get(row.id) || {})
      };
    }

    function setMediaFilters(row, patch) {
      mediaFilterState.set(row.id, { ...mediaFiltersFor(row), ...patch });
    }

    function itemReliability(item) {
      return item.reliability || (item.relevanceScore >= 90 ? "verified" : item.relevanceScore >= 80 ? "strong" : "single_source");
    }

    function isVerifiedMediaItem(item) {
      return ["verified", "strong"].includes(itemReliability(item));
    }

    function mediaItemMatchesFilters(item, filters) {
      const type = item.mediaType || "news";
      const reliability = itemReliability(item);
      if (filters.type !== "all" && type !== filters.type) return false;
      if (filters.reliability !== "all" && reliability !== filters.reliability) return false;
      if (filters.verifiedOnly && !isVerifiedMediaItem(item)) return false;
      return true;
    }

        .filter((item) => !isHiddenMedia(row, item))

      const photos = (bundle.photos || []).filter((item) => {
        const photoItem = { ...item, mediaType: "photo", reliability: item.reliability || "single_source" };
        if (isHiddenMedia(row, photoItem)) return false;

        return true;
      });
      return { ...bundle, news, photos, activeType: "all" };

    function stripHtml(text) {
      const div = document.createElement("div");
      div.innerHTML = text || "";
      return div.textContent || div.innerText || "";
    }

    // Kullanıcının o an baktığı kartın haber/medya isteği HİÇBİR ZAMAN kuyrukta
    // beklemez — doğrudan ateşlenir. Eş zamanlılık kapısı (gatedFetch) yalnızca
    // kullanıcının görmediği arka plan ön-yükleme ve toplu "Canlı Tarama"
    // isteklerinde kullanılır, böylece paylaşılan proxy'ler o kısımlarda
    // korunurken açık kart asla gecikmez.
    async function fetchWithTimeout(url, options = {}, timeoutMs = 5500, { background = false } = {}) {
      const run = async () => {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          window.clearTimeout(timer);
        }
      };
      return background ? gatedFetch(run) : run();
    }

    function formatDate(dateText) {
      if (!dateText) return "";
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function parseNewsDateText(text) {
      const raw = String(text || "");
      const direct = Date.parse(raw);
      if (Number.isFinite(direct)) return direct;
      const normalized = norm(raw);
      const now = Date.now();
      const relative = normalized.match(/(\d{1,3})\s*(dakika|dk|saat|sa|gun|gün|hafta|ay)\s*(once|önce)/);
      if (relative) {
        const amount = Number(relative[1]);
        const unit = relative[2];
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;
        if (unit === "dakika" || unit === "dk") return now - amount * minute;
        if (unit === "saat" || unit === "sa") return now - amount * hour;
        if (unit === "gun" || unit === "gün") return now - amount * day;
        if (unit === "hafta") return now - amount * 7 * day;
        if (unit === "ay") return now - amount * 30 * day;
      }
      if (normalized.includes("bugun") || normalized.includes("bugün")) return now;
      if (normalized.includes("dun") || normalized.includes("dün")) return now - 24 * 60 * 60 * 1000;
      const monthMap = {
        ocak: 0, subat: 1, şubat: 1, mart: 2, nisan: 3, mayis: 4, mayıs: 4, haziran: 5,
        temmuz: 6, agustos: 7, ağustos: 7, eylul: 8, eylül: 8, ekim: 9, kasim: 10, kasım: 10, aralik: 11, aralık: 11
      };
      const named = normalized.match(/(\d{1,2})\s+(ocak|subat|şubat|mart|nisan|mayis|mayıs|haziran|temmuz|agustos|ağustos|eylul|eylül|ekim|kasim|kasım|aralik|aralık)\s+(\d{4})/);
      if (named) return new Date(Number(named[3]), monthMap[named[2]], Number(named[1])).getTime();
      const numeric = normalized.match(/(\d{1,2})[./-](\d{1,2})[./-](\d{2,4})/);
      if (numeric) {
        const year = Number(numeric[3].length === 2 ? `20${numeric[3]}` : numeric[3]);
        return new Date(year, Number(numeric[2]) - 1, Number(numeric[1])).getTime();
      }
      return 0;
    }

    function newsPublishedAt(item) {
      const candidates = [
        item.timestamp,
        parseNewsDateText(item.pubDate),
        parseNewsDateText(item.date),
        parseNewsDateText(`${item.title || ""} ${item.summary || ""}`)
      ].map((value) => Number(value) || 0).filter(Boolean);
      const now = Date.now();
      return candidates.find((value) => value <= now + 24 * 60 * 60 * 1000) || 0;
    }

    function compareNewsNewestFirst(a, b) {
      const at = newsPublishedAt(a);
      const bt = newsPublishedAt(b);
      if (Boolean(bt) !== Boolean(at)) return Boolean(bt) - Boolean(at);
      if (bt !== at) return bt - at;
      return (b.relevanceScore || 0) - (a.relevanceScore || 0);
    }

    function sortNewsNewestFirst(items) {
      return [...items].sort(compareNewsNewestFirst);
    }

    function keywordAnalysis(news) {
      const stop = new Set("ve veya ile için gibi kadar sonra önce ama fakat bir bu şu o da de ki en çok az daha ise her son yeni haber haberleri son dakika direniş direnişi grev grevi işçi işçileri".split(" "));
      const words = news
        .flatMap((item) => `${item.title} ${item.summary}`.split(/\s+/))
        .map((word) => norm(word).replace(/[^a-z0-9çğıöşü-]/g, ""))
        .filter((word) => word.length > 3 && word.length < 19 && !stop.has(word));
      const counts = words.reduce((acc, word) => {
        acc[word] = (acc[word] || 0) + 1;
        return acc;
      }, {});
      return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 7).map(([word]) => word);
    }

    function cleanNewsTitle(rawTitle) {
      const title = stripHtml(rawTitle || "").replace(/\s+/g, " ").trim();
      const parts = title.split(" - ");
      if (parts.length < 2) return { title, source: "" };
      return { title: parts.slice(0, -1).join(" - "), source: parts.at(-1) };
    }

    function localeForCode(code) {
      const normalized = norm(code || "");
      return NEWS_LOCALES.find((locale) => norm(locale.label).startsWith(normalized) || norm(locale.hl).startsWith(normalized)) || NEWS_LOCALES[0];
    }

    function googleNewsRssUrl(query, locale) {
      return `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${encodeURIComponent(locale.hl)}&gl=${encodeURIComponent(locale.gl)}&ceid=${encodeURIComponent(locale.ceid)}`;
    }

    // --- Kendi Cloudflare Worker proxy'miz + Bing Haberler ---
    // Ücretsiz paylaşılan proxy'ler ve Google Haberler/DuckDuckGo sık sık
    // bizim (ya da diğer kullanıcıların) isteklerini engelliyordu. Kendi
    // worker'ımız üzerinden Bing Haberler RSS'i çekmek çok daha güvenilir
    // sonuç veriyor ve makalenin GERÇEK adresini doğrudan veriyor (Google'ın
    // çözülemeyen yönlendirme linklerinin aksine), bu da görsel taramasını
    // da hızlandırıyor.
    const OWN_PROXY_BASE = "https://sinif-atlasi.feyzakayaalti.workers.dev/?url=";
    function ownProxyUrl(url) {
      return OWN_PROXY_BASE + encodeURIComponent(url);
    }

    function bingNewsRssUrl(query) {
      return `https://www.bing.com/news/search?q=${encodeURIComponent(query)}&format=rss`;
    }

    // Bing'in RSS linki "bing.com/news/apiclick.aspx?...&url=GERÇEK_ADRES&..."
    // biçiminde bir yönlendirmedir; GERÇEK_ADRES doğrudan çözülebilir.
    function decodeBingLink(url) {
      try {
        const parsed = new URL(url);
        const real = parsed.searchParams.get("url");
        return real ? decodeURIComponent(real) : url;
      } catch {
        return url;
      }
    }

    function parseBingRssItems(xmlText, locale) {
      const xml = new DOMParser().parseFromString(xmlText, "text/xml");
      return Array.from(xml.querySelectorAll("item")).map((item) => {
        const cleaned = cleanNewsTitle(item.querySelector("title")?.textContent || "");
        const pubDate = item.querySelector("pubDate")?.textContent || "";
        const rawLink = item.querySelector("link")?.textContent || "";
        const link = decodeBingLink(rawLink);
        const source = item.getElementsByTagName("News:Source")[0]?.textContent
          || articleHost(link) || cleaned.source || "Bing Haberler";
        const image = item.getElementsByTagName("News:Image")[0]?.textContent || "";
        return {
          title: cleaned.title,
          link,
          date: formatDate(pubDate),
          timestamp: Date.parse(pubDate) || 0,
          summary: stripHtml(item.querySelector("description")?.textContent || "").replace(/\s+/g, " ").slice(0, 220),
          source,
          sourceName: source,
          locale: locale.label,
          mediaType: "news",
          image,
          sourceUrl: rawLink
        };
      }).filter((item) => item.title && item.link && isUsableArticleUrl(item.link));
    }

    async function fetchBingNews(query, locale, { background = false } = {}) {
      try {
        const response = await fetchWithTimeout(ownProxyUrl(bingNewsRssUrl(query)), {}, background ? 5500 : 8000, { background });
        if (!response.ok) return [];
        const text = await response.text();
        return parseBingRssItems(text, locale);
      } catch {
        return [];
      }
    }

    function parseGoogleNewsItems(items, locale) {
      return (items || []).map((item) => {
        const cleaned = cleanNewsTitle(item.title || "");
        return {
          title: cleaned.title,
          link: item.link || "",
          date: formatDate(item.pubDate),
          timestamp: Date.parse(item.pubDate || "") || 0,
          summary: stripHtml(item.description || "").replace(/\s+/g, " ").slice(0, 220),
          source: item.author || cleaned.source || "Google News",
          sourceName: item.author || cleaned.source || "Google News",
          locale: locale.label,
          mediaType: "news",
          image: item.thumbnail || extractImageUrl(item.description),
          sourceUrl: item.enclosure?.link || item.guid || ""
        };
      }).filter((item) => item.title && item.link);
    }

    function parseRssXml(xmlText, locale) {
      const xml = new DOMParser().parseFromString(xmlText, "text/xml");
      return Array.from(xml.querySelectorAll("item")).map((item) => {
        const cleaned = cleanNewsTitle(item.querySelector("title")?.textContent || "");
        const pubDate = item.querySelector("pubDate")?.textContent || "";
        const source = item.querySelector("source");
        return {
          title: cleaned.title,
          link: item.querySelector("link")?.textContent || "",
          date: formatDate(pubDate),
          timestamp: Date.parse(pubDate) || 0,
          summary: stripHtml(item.querySelector("description")?.textContent || "").replace(/\s+/g, " ").slice(0, 220),
          source: source?.textContent || cleaned.source || "Google News",
          sourceName: source?.textContent || cleaned.source || "Google News",
          locale: locale.label,
          mediaType: "news",
          image: extractRssImage(item),
          sourceUrl: source?.getAttribute("url") || ""
        };
      }).filter((item) => item.title && item.link);
    }

    function extractImageUrl(html) {
      const src = String(html || "").match(/<img[^>]+src=["']([^"']+)["']/i)?.[1] || "";
      return src.replace(/&amp;/g, "&");
    }

    function extractRssImage(item) {
      const enclosure = item.querySelector("enclosure")?.getAttribute("url") || "";
      if (enclosure) return enclosure;
      const media = Array.from(item.getElementsByTagName("*")).find((node) => (
        ["content", "thumbnail"].includes(node.localName) && (node.getAttribute("url") || node.getAttribute("src"))
      ));
      return media?.getAttribute("url") || media?.getAttribute("src") || extractImageUrl(item.querySelector("description")?.textContent || "");
    }

    // Tek bir proxy adayını dener; geçerli haber listesi dönerse onu verir.
    async function tryNewsProxy(proxyUrl, rssUrl, locale, { background = false } = {}) {
      // Bing Haberler (kendi worker'ımız üzerinden) artık ana ve güvenilir
      // kaynak olduğu için, bu paylaşılan/sık tıkanan yedek proxy zincirini
      // ön planda bile uzun süre beklemeye gerek yok — kısa sürede vazgeçilir.
      const response = await fetchWithTimeout(proxyUrl, {}, background ? 3500 : 3000, { background });
      if (!response.ok) throw new Error("http");
      // rss2json JSON, diğerleri XML/JSON sarmalı olabilir.
      if (proxyUrl.includes("rss2json.com")) {
        const data = await response.json();
        if (data.status !== "ok" || !data.items || !data.items.length) throw new Error("empty");
        const items = parseGoogleNewsItems(data.items, locale);
        if (!items.length) throw new Error("empty");
        return items;
      }
      const text = await response.text();
      if (!text || isBadDirectMarkdown(text)) throw new Error("bad");
      let items = parseRssXml(text, locale);
      if (!items.length && text.trim().startsWith("{")) {
        try {
          const j = JSON.parse(text);
          if (j.contents) items = parseRssXml(j.contents, locale);
          else if (j.items) items = parseGoogleNewsItems(j.items, locale);
        } catch {}
      }
      if (!items.length) throw new Error("empty");
      return items;
    }

    async function fetchRssFeedUrl(rssUrl, locale, { background = false } = {}) {
      const candidates = [
        `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(rssUrl)}`,
        jinaReaderUrl(rssUrl),
        `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`,
        `https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`,
        `https://proxy.cors.sh/${rssUrl}`,
        `https://thingproxy.freeboard.io/fetch/${rssUrl}`
      ];
      const factories = candidates.map((url) => () => tryNewsProxy(url, rssUrl, locale, { background }));
      try {
        if (!background) {
          // Açık kart bekletilmez: tüm proxy adaylarını hemen ve aynı anda ateşle,
          // ilk cevap veren kazanır.
          return await firstSuccessStaggered(factories, { batchSize: factories.length, staggerMs: 0 });
        }
        // Arka planda (görünmeyen kartlar / toplu tarama) proxy'leri dalgalar
        // hâlinde dene — paylaşılan proxy'leri anında rate-limit'e düşürmemeden,
        // ama Canlı Tarama dakikalarca sürmesin diye dalgalar kısa ve hızlı.
        return await firstSuccessStaggered(factories, { batchSize: 3, staggerMs: 700 });
      } catch {
        return [];
      }
    }

    function newsQueriesFor(row) {
      const title = searchQueryText(value(row, fields.title).replace(/\s*\/\s*/g, " "));
      const place = searchQueryText(value(row, fields.location)
        .replace(/\s*\/\s*/g, " ")
        .replace(/hattı|ve çevresi|ve ilçeleri|mağaza önleri|Türkiye geneli/gi, " "));
      const actors = searchQueryText(value(row, fields.actors).replace(/\s*\/\s*/g, " "));
      const quotedTitle = title.length > 2 ? `"${title}"` : title;
      const items = [
        `${quotedTitle} grev OR direniş OR işçi`,
        `${title} ${place} grev direniş işçi sendika`,
        actors.length > 4 ? `${title} ${actors} grev direniş` : "",
        place ? `${title} ${place} işten çıkarma sendika` : "",
        isLaborSafetyText(`${title} ${actors}`) ? `${title} ${place} iş cinayeti işçi sağlığı` : ""
      ];
      return Array.from(new Set(items.map((item) => item.replace(/\s+/g, " ").trim()).filter((item) => item.length > 4))).slice(0, row.isDiscovered ? 1 : 2);
    }

    function customAlertUrls(row) {
      return Object.keys(row)
        .filter((key) => /google.*alert|alert|rss|feed|medya.*kaynak|haber.*kaynak/i.test(norm(key)))
        .flatMap((key) => String(row[key] || "").split(/[\n,;]+/))
        .map((url) => url.trim())
        .filter((url) => /^https?:\/\//i.test(url));
    }

    function scanFrequencyFor(row) {
      const status = row.statusKind || statusKind(value(row, fields.status));
      if (status === "active") return 60;
      if (status === "won") return 1440;
      if (status === "watch") return 1440;
      return 10080;

    function alertProfilesFor(row) {
      const locale = localeForCode(row.scopeKind === "world" ? "en" : "tr");
      const custom = customAlertUrls(row).map((url, index) => ({
        id: `${row.id}-alert-${index}`,
        struggleId: row.id,
        enabled: true,
        alertName: `Dar kaynak ${index + 1}`,

        query: "",
        language: locale.hl,
        region: locale.gl,
        scanFrequencyMinutes: scanFrequencyFor(row),
        status: "active"
      }));
      if (custom.length) return custom;
      const locales = row.isDiscovered ? NEWS_LOCALES.slice(0, 2) : NEWS_LOCALES.slice(0, row.scopeKind === "world" ? 2 : 1);
      return newsQueriesFor(row).flatMap((query, queryIndex) => (
        locales.slice(0, queryIndex === 0 ? locales.length : 1).map((item, localeIndex) => ({
          id: `${row.id}-generated-${queryIndex}-${localeIndex}`,
          struggleId: row.id,
          enabled: true,
          alertName: `Dar medya kaynağı ${queryIndex + 1}`,
          rssFeedUrl: googleNewsRssUrl(query, item),
          query,
          language: item.hl,
          region: item.gl,
          scanFrequencyMinutes: scanFrequencyFor(row),
          status: "active",
          locale: item
        }))
      ));
    }

    async function fetchAlertFeed(profile, { background = false } = {}) {
      const locale = profile.locale || localeForCode(profile.language || "tr");
      const items = await fetchRssFeedUrl(profile.rssFeedUrl, locale, { background });
      return items.map((item) => ({
        ...item,
        alertProfileId: profile.id,
        capturedAt: new Date().toISOString(),
        canonicalUrl: normalizeMediaUrl(item.sourceUrl || item.link || ""),
        rawQuery: profile.query
      }));
