<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Direniş Haritası</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css'">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css'">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css'">
  <style>
    :root {
      --page: #f3f0ea;
      --panel: #ffffff;
      --panel-strong: #fffdf8;
      --ink: #171717;
      --muted: #667085;
      --line: #d9d0c3;
      --soft: #f0e9df;
      --accent: #c9272d;
      --accent-2: #111111;
      --green: #168a4a;
      --blue: #1f6ed4;
      --amber: #b7791f;
      --violet: #7357c8;
      --paper: #fffaf2;
      --shadow: 0 18px 38px rgba(20, 20, 20, 0.12);
      --shadow-soft: 0 10px 24px rgba(20, 20, 20, 0.08);
    }

    html[data-theme="dark"] {
      --page: #111111;
      --panel: #1b1b1b;
      --panel-strong: #222222;
      --ink: #f3f4f6;
      --muted: #a8b0bd;
      --line: #343a46;
      --soft: #252934;
      --accent: #ff5a60;
      --accent-2: #f6f0e7;
      --green: #34d27d;
      --blue: #74a7ff;
      --amber: #f0b04f;
      --violet: #b59cff;
      --paper: #181818;
      --shadow: 0 22px 44px rgba(0, 0, 0, 0.34);
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(201, 39, 45, 0.08), transparent 34%),
        linear-gradient(180deg, #f8f4ed 0%, var(--page) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] body {
      background:
        radial-gradient(circle at top left, rgba(255, 90, 96, 0.11), transparent 34%),
        linear-gradient(180deg, #171717 0%, var(--page) 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      min-height: 720px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 410px) minmax(260px, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 250, 242, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255,255,255,0.55), 0 8px 22px rgba(20,20,20,0.05);
      z-index: 900;
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: block;
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      padding: 4px;
      object-fit: contain;
      background: #fff;
      border: 1px solid rgba(20, 20, 20, 0.08);
      border-radius: 10px;
      box-shadow: var(--shadow-soft);
    }

    .product {
      min-width: 0;
    }

    .product h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .product p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quote {
      margin-top: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .global-search {
      position: relative;
      min-width: 0;
    }

    .global-search input {
      width: 100%;
      min-width: 0;
      padding: 12px 14px 12px 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: var(--ink);
    }

    .global-search input:focus,
    select:focus {
      border-color: #9aa8bb;
      box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1);
    }

    .global-search::before {
      content: "⌕";
      position: absolute;
      left: 14px;
      top: 50%;
      color: var(--muted);
      transform: translateY(-54%);
      font-size: 23px;
      line-height: 1;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .control-button,
    .control-select {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.05);
    }

    .control-button {
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .control-button.is-active {
      color: #fff;
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .control-button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .control-button.ghost {
      background: rgba(255, 255, 255, 0.82);
    }

    .control-select {
      width: auto;
      max-width: 130px;
      padding: 7px 26px 7px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(22, 138, 74, 0.12);
    }

    .workspace {
      display: grid;
      position: relative;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    html[data-focus="map"] .workspace {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    html[data-focus="map"] .left {
      padding: 0;
      border-width: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    html[data-density="compact"] .topbar {
      padding: 9px 12px;
    }

    html[data-density="compact"] .left {
      gap: 8px;
      padding: 10px;
    }

    html[data-density="compact"] .case-card,
    html[data-density="compact"] .filters,
    html[data-density="compact"] .discovery {
      padding: 8px;
    }

    html[data-density="compact"] .detail {
      padding: 10px 12px 14px;
    }

    html[data-density="compact"] .case-card h2 {
      font-size: 13px;
    }

    .left,
    .right {
      min-width: 0;
      background: rgba(255, 250, 242, 0.98);
      border-color: var(--line);
      border-style: solid;
      z-index: 700;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border-width: 0 1px 0 0;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-gutter: stable;
      transition: opacity 0.18s ease, padding 0.18s ease;
    }

    .right {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(470px, 94vw);
      display: grid;
      grid-template-rows: auto auto 1fr;
      border-width: 0 0 0 1px;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: none !important;
      transition: opacity 0.18s ease, box-shadow 0.22s ease, visibility 0s linear 0.18s;
      box-shadow: none;
      pointer-events: none;
      z-index: 1200;
    }

    .right.open {
      opacity: 1;
      visibility: visible;
      transform: none !important;
      transition-delay: 0s;
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .module-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .smart-filter-bar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .segment-button {
      min-height: 38px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
      text-align: left;
      box-shadow: 0 6px 14px rgba(20, 20, 20, 0.035);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .segment-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(20, 20, 20, 0.08);
    }

    .segment-button.is-active {
      color: #fff;
      border-color: var(--accent);
      background:
        linear-gradient(135deg, rgba(201, 39, 45, 0.94), rgba(32, 38, 50, 0.94));
    }

    .segment-button.is-active {
      box-shadow: 0 14px 28px rgba(201, 39, 45, 0.18);
    }

    .filters {
      display: grid;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      flex: 0 0 auto;
    }

    select,
    .small-input {
      width: 100%;
      min-width: 0;
      padding: 10px;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .list {
      flex: 0 0 auto;
      min-height: 0;
      overflow: visible;
      padding-right: 3px;
    }

    .discovery {
      flex: 0 0 auto;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      min-height: 0;
    }

    .discovery-list {
      display: grid;
      gap: 7px;
      max-height: 300px;
      overflow: auto;
      padding-right: 2px;
    }

    .discovery-card {
      display: grid;
      gap: 5px;
      width: 100%;
      padding: 9px;
      text-align: left;
      color: inherit;
      background: var(--paper);
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      cursor: pointer;
    }

    .discovery-card b {
      font-size: 12px;
      line-height: 1.28;
    }

    .discovery-card span,
    .status-line {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .case-card {
      display: grid;
      gap: 9px;
      width: 100%;
      margin: 0 0 9px;
      padding: 13px 12px 13px 14px;
      text-align: left;
      border: 1px solid var(--line);
      border-left: 7px solid var(--accent);
      border-radius: 8px;
      background: var(--paper);
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(20, 20, 20, 0.035);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .case-card:hover,
    .case-card:focus,
    .case-card.active {
      outline: none;
      border-color: #a9b4c4;
      box-shadow: 0 12px 24px rgba(20, 20, 20, 0.1);
      transform: translateY(-1px);
    }

    .case-card.active {
      background: linear-gradient(180deg, #fff7ed, #ffffff);
      border-color: rgba(201, 39, 45, 0.5);
      box-shadow: 0 0 0 3px rgba(201, 39, 45, 0.13), 0 14px 26px rgba(20, 20, 20, 0.1);
    }

    .case-card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      padding-top: 2px;
    }

    .case-card-top::before {
      content: "";
      width: 32px;
      height: 4px;
      position: absolute;
      left: 0;
      top: -5px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.16;
    }

    .case-card-top h2 {
      min-width: 0;
      flex: 1;
    }

    .case-card h2 {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .case-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      color: #344054;
      background: #f2f5f8;
      border: 1px solid #e1e7ef;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
    }

    .map-stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #dce5ed;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .map-hud {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 650;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100% - 28px);
    }

    .hud-button {
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.08);
      cursor: pointer;
    }

    .map-summary {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 650;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      pointer-events: none;
    }

    .mini-stat {
      display: grid;
      padding: 10px;
      color: inherit;
      text-align: left;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.08);
      min-width: 0;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .mini-stat:hover,
    .mini-stat:focus {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(201, 39, 45, 0.42);
      box-shadow: 0 12px 22px rgba(20, 20, 20, 0.1);
    }

    .mini-stat.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 39, 45, 0.12);
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .case-head {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(201,39,45,0.06), transparent 45%),
        var(--panel);
    }

    .panel-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 21px;
      line-height: 1;
    }

    .panel-close:hover {
      background: var(--soft);
    }

    .case-head h2 {
      margin: 0;
      color: var(--ink);
      font-size: 28px;
      font-weight: 950;
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .case-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .case-action {
      min-height: 32px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .case-action.is-active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      padding: 8px 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      padding: 10px 9px;
      border: 1px solid transparent;
      border-bottom: 3px solid transparent;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      text-align: center;
    }

    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
      background: rgba(201, 39, 45, 0.06);
    }

    .detail {
      min-height: 0;
      overflow: auto;
      padding: 14px 16px 20px;
    }

    .detail-section {
      display: grid;
      gap: 10px;
    }

    .case-snapshot {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .case-snapshot div {
      min-width: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff, var(--soft));
    }

    .case-snapshot span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .case-snapshot strong {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .claim {
      display: grid;
      gap: 6px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .claim b {
      color: #344054;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .claim span,
    .claim p {
      margin: 0;
      color: #2f3a4a;
      font-size: 13px;
      line-height: 1.45;
    }

    .source-note {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
    }

    .score {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .score-bar {
      width: 100%;
      height: 9px;
      overflow: hidden;
      background: #e8edf3;
      border-radius: 999px;
    }

    .score-fill {
      height: 100%;
      width: 0%;
      background: var(--amber);
      border-radius: 999px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .event {
      position: relative;
      padding: 11px 11px 11px 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .event::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 16px;
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--accent);
    }

    .event b {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .event p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .graph-box {
      width: 100%;
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .graph-box svg {
      width: 100%;
      height: 340px;
      display: block;
    }

    .live-grid {
      display: grid;
      gap: 12px;
    }

    .media-flow {
      gap: 14px;
    }

    .media-toolbar {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.04);
    }

    .media-toolbar-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .media-toolbar label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .media-toolbar select {
      width: 100%;
      min-height: 34px;
      padding: 7px 8px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      font-size: 12px;
    }

    .media-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .media-check {
      display: inline-flex !important;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      align-items: center;
      gap: 7px !important;
      color: var(--ink) !important;
      font-size: 12px !important;
      font-weight: 800 !important;
    }

    .media-check input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .scan-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .scan-meta span {
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
    }

    .summary-news-card {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), var(--panel));
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.04);
    }

    .summary-news-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .summary-news-head h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .summary-news-head span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
    }

    .executive-summary {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
    }

    .executive-summary h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    .summary-meter {
      display: grid;
      gap: 6px;
    }

    .summary-meter-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--soft);
    }

    .summary-meter-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--amber), var(--accent));
    }

    .insight-list {
      display: grid;
      gap: 7px;
    }

    .insight-item {
      display: grid;
      gap: 3px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .insight-item b {
      font-size: 12px;
    }

    .insight-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .resistance-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: linear-gradient(180deg, #fffaf2, #ffffff);
      border: 1px solid var(--line);
      border-left: 6px solid var(--accent);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(20, 20, 20, 0.06);
    }

    .resistance-card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .resistance-card p {
      margin: 0;
      color: #2f3a4a;
      font-size: 13px;
      line-height: 1.48;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-fact {
      display: grid;
      gap: 4px;
      padding: 9px;
      background: rgba(240, 233, 223, 0.75);
      border: 1px solid #e4dbcf;
      border-radius: 8px;
    }

    .card-fact b {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-fact span {
      color: var(--ink);
      font-size: 12px;
      line-height: 1.3;
    }

    .keyword-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .live-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .live-button,
    .live-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 38px;
      padding: 9px 10px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      text-align: center;
    }

    .live-button.primary {
      color: #fff;
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .live-button.is-active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .live-section {
      display: grid;
      gap: 9px;
      padding-top: 2px;
    }

    .live-section h3 {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .social-embed {
      min-height: 80px;
      border-radius: 8px;
      overflow: hidden;
    }

    .social-embed .twitter-timeline {
      display: block;
      width: 100%;
    }

    .media-banner,
    .media-gallery {
      display: grid;
      gap: 9px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 250, 242, 0.92), rgba(255, 255, 255, 0.94));
      box-shadow: 0 10px 24px rgba(20, 20, 20, 0.06);
    }

    .media-gallery-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .media-gallery-head h3,
    .media-gallery-head h4 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .media-gallery-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .media-controls {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .media-control {
      min-width: 34px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
    }

    .media-stage {
      position: relative;
      min-height: 300px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
    }

    .media-slide {
      display: none;
      min-height: 300px;
    }

    .media-slide.active {
      display: block;
    }

    .media-figure {
      position: relative;
      min-height: 300px;
      margin: 0;
      overflow: hidden;
      background: #111827;
    }

    .media-slide img {
      display: block;
      width: 100%;
      height: min(52vh, 420px);
      object-fit: contain;
      background: #111827;
    }

    .media-placeholder {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 18px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(201, 39, 45, 0.08), transparent 45%),
        var(--soft);
    }

    .media-placeholder-inner {
      display: grid;
      gap: 10px;
      max-width: 360px;
      justify-items: center;
    }

    .media-placeholder h4 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .media-placeholder p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .media-caption {
      display: grid;
      gap: 3px;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 12px 10px;
      color: #fff;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.82));
      border-top: 0;
    }

    .media-caption b {
      font-size: 12px;
      line-height: 1.25;
    }

    .media-caption span {
      color: rgba(255, 255, 255, 0.82);
      font-size: 11px;
      line-height: 1.3;
    }

    .media-caption .live-link {
      justify-self: start;
      min-height: 28px;
      padding: 5px 8px;
      font-size: 11px;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.32);
    }

    .media-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .media-dot {
      min-width: 24px;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 99px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 800;
    }

    .media-dot.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .live-results {
      display: grid;
      gap: 8px;
    }

    .news-card {
      display: grid;
      gap: 5px;
      padding: 11px;
      color: inherit;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
    }

    .news-card a {
      justify-self: start;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .news-visual {
      width: 100%;
      min-height: 138px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(201, 39, 45, 0.12), rgba(20, 20, 20, 0.08)),
        var(--soft);
    }

    .news-visual img {
      width: 100%;
      height: 168px;
      display: block;
      object-fit: cover;
      background: var(--soft);
    }

    .news-visual-fallback {
      display: grid;
      min-height: 138px;
      align-content: end;
      gap: 5px;
      padding: 12px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 22%, rgba(201, 39, 45, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.88), rgba(240,233,223,0.82));
    }

    .news-visual-fallback strong {
      font-size: 13px;
      line-height: 1.2;
    }

    .news-visual-fallback span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .news-card-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .news-source-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .news-source-line span + span::before {
      content: "·";
      margin-right: 6px;
      color: var(--line);
    }

    .inline-action {
      padding: 5px 7px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 800;
    }

    .inline-action:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .news-card:hover,
    .live-link:hover,
    .live-button:hover {
      border-color: #9aa8bb;
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.07);
    }

    .news-card b {
      font-size: 13px;
      line-height: 1.3;
    }

    .news-card span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .news-card .news-preview {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .media-slide-zone {
      display: grid;
      gap: 8px;
    }

    .media-slide-zone [data-media-gallery] {
      display: grid;
      gap: 9px;
    }

    .photo-card {
      min-width: 0;
      overflow: hidden;
      color: inherit;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
    }

    .photo-card a {
      display: block;
      padding: 0 7px 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .photo-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: var(--soft);
    }

    .photo-card span {
      display: block;
      padding: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .embed-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .embed-panel h4 {
      margin: 0;
      font-size: 13px;
      line-height: 1.25;
    }

    .embed-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .embed-frame {
      width: 100%;
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .photo-grid .embed-panel {
      grid-column: 1 / -1;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      min-height: 220px;
    }

    .video-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .video-thumb {
      display: grid;
      place-items: center;
      min-height: 120px;
      border-radius: 8px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(201, 39, 45, 0.88), rgba(17, 17, 17, 0.88)),
        var(--accent);
      font-size: 34px;
      font-weight: 900;
    }

    .video-card h4 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    .video-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .relation-dashboard {
      display: grid;
      gap: 12px;
    }

    .relation-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .relation-metric {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .relation-metric b {
      font-size: 20px;
      line-height: 1;
    }

    .relation-metric span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .relation-map {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }

    .relation-map svg {
      display: block;
      width: 100%;
      height: 360px;
    }

    .relation-list {
      display: grid;
      gap: 8px;
    }

    .relation-card {
      display: grid;
      gap: 7px;
      width: 100%;
      padding: 11px;
      text-align: left;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      cursor: pointer;
    }

    .relation-card h4 {
      margin: 0;
      font-size: 13px;
      line-height: 1.25;
    }

    .relation-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .loading {
      padding: 12px;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 8px;
      font-size: 13px;
    }

    .empty {
      padding: 16px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
    }

    html[data-theme="dark"] .topbar,
    html[data-theme="dark"] .left,
    html[data-theme="dark"] .right {
      background: rgba(24, 24, 24, 0.98);
    }

    html[data-theme="dark"] .global-search input,
    html[data-theme="dark"] .pill,
    html[data-theme="dark"] .filters,
    html[data-theme="dark"] .case-snapshot div,
    html[data-theme="dark"] .case-card,
    html[data-theme="dark"] .hud-button,
    html[data-theme="dark"] .mini-stat,
    html[data-theme="dark"] .claim,
    html[data-theme="dark"] .score,
    html[data-theme="dark"] .event,
    html[data-theme="dark"] .graph-box,
    html[data-theme="dark"] .resistance-card,
    html[data-theme="dark"] .live-button,
    html[data-theme="dark"] .live-link,
    html[data-theme="dark"] .news-card,
    html[data-theme="dark"] .photo-card,
    html[data-theme="dark"] .embed-panel,
    html[data-theme="dark"] .loading,
    html[data-theme="dark"] .empty,
    html[data-theme="dark"] .panel-close,
    html[data-theme="dark"] .discovery,
    html[data-theme="dark"] .segment-button,
    html[data-theme="dark"] .media-toolbar,
    html[data-theme="dark"] .media-toolbar select,
    html[data-theme="dark"] .scan-meta span,
    html[data-theme="dark"] .media-banner,
    html[data-theme="dark"] .media-gallery,
    html[data-theme="dark"] .video-card,
    html[data-theme="dark"] .executive-summary,
    html[data-theme="dark"] .insight-item,
    html[data-theme="dark"] .relation-metric,
    html[data-theme="dark"] .relation-map,
    html[data-theme="dark"] .relation-card {
      background: var(--panel);
      color: var(--ink);
    }

    html[data-theme="dark"] .resistance-card,
    html[data-theme="dark"] .media-toolbar,
    html[data-theme="dark"] .media-banner,
    html[data-theme="dark"] .media-gallery {
      background-image: none;
    }

    html[data-theme="dark"] .claim b,
    html[data-theme="dark"] .claim span,
    html[data-theme="dark"] .claim p,
    html[data-theme="dark"] .resistance-card p,
    html[data-theme="dark"] .tag,
    html[data-theme="dark"] .pill {
      color: var(--ink);
    }

    html[data-theme="dark"] .tag {
      background: #252934;
      border-color: #3a4250;
    }

    .item-emek { border-left-color: var(--accent); }
    .item-adalet { border-left-color: var(--violet); }
    .item-ekoloji { border-left-color: var(--green); }
    .item-dunya { border-left-color: var(--blue); }
    .item-karma { border-left-color: var(--amber); }

    .pin {
      display: block;
      width: 24px;
      height: 24px;
      border: 3px solid #fff;
      border-radius: 99px 99px 99px 4px;
      box-shadow: 0 6px 16px rgba(20, 20, 20, 0.32);
      transform: rotate(-45deg);
    }

    .pin::after {
      content: "";
      position: absolute;
      inset: 6px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 99px;
    }

    .pin-emek { background: var(--accent); }
    .pin-adalet { background: var(--violet); }
    .pin-ekoloji { background: var(--green); }
    .pin-dunya { background: var(--blue); }
    .pin-karma { background: var(--amber); }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }

    .leaflet-popup-content {
      width: min(340px, 72vw) !important;
      margin: 13px;
    }

    .popup-mini {
      display: grid;
      gap: 7px;
      font-size: 13px;
      line-height: 1.35;
    }

    .popup-mini h3 {
      margin: 0;
      color: var(--ink);
      font-size: 19px;
      font-weight: 900;
      line-height: 1.15;
    }

    .popup-mini p {
      margin: 0;
      color: var(--muted);
    }

    .popup-mini button {
      justify-self: start;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    @media (max-width: 1160px) {
      .workspace {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .right {
        width: min(430px, 92vw);
      }

      .right.open {
        transform: none !important;
      }
    }

    @media (max-width: 780px) {
      .shell {
        min-height: 100vh;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 58vh 42vh;
      }

      .left {
        grid-row: 2;
        border-width: 1px 0 0;
      }

      .map-stage {
        grid-row: 1;
      }

      .map-summary {
        grid-template-columns: 1fr;
      }

      .right {
        width: min(440px, 96vw);
      }
    }

    /* Yeni nesil ürün yüzeyi: veri mantığını koruyan görsel sistem. */
    :root {
      color-scheme: light;
      --page: #eef3f8;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --ink: #0f172a;
      --muted: #65758b;
      --line: rgba(148, 163, 184, 0.32);
      --soft: #eef4fb;
      --accent: #df2336;
      --accent-2: #111827;
      --green: #15935b;
      --blue: #2563eb;
      --amber: #c27803;
      --violet: #7c3aed;
      --paper: rgba(255, 255, 255, 0.92);
      --glass: rgba(255, 255, 255, 0.74);
      --glass-strong: rgba(255, 255, 255, 0.92);
      --ring: rgba(223, 35, 54, 0.16);
      --shadow: 0 28px 70px rgba(15, 23, 42, 0.18);
      --shadow-soft: 0 16px 36px rgba(15, 23, 42, 0.11);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --page: #070b13;
      --panel: rgba(15, 23, 42, 0.86);
      --panel-strong: #111827;
      --ink: #f8fafc;
      --muted: #a6b0c0;
      --line: rgba(148, 163, 184, 0.22);
      --soft: #172033;
      --accent: #ff4d5e;
      --accent-2: #f8fafc;
      --green: #35d07f;
      --blue: #78a8ff;
      --amber: #f1b650;
      --violet: #b69cff;
      --paper: rgba(15, 23, 42, 0.82);
      --glass: rgba(15, 23, 42, 0.7);
      --glass-strong: rgba(17, 24, 39, 0.92);
      --ring: rgba(255, 77, 94, 0.2);
      --shadow: 0 32px 80px rgba(0, 0, 0, 0.46);
      --shadow-soft: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    html,
    body {
      background:
        linear-gradient(120deg, rgba(37, 99, 235, 0.08), transparent 34%),
        linear-gradient(145deg, #f8fafc 0%, #eef3f8 44%, #f8fbff 100%);
      text-rendering: optimizeLegibility;
    }

    html[data-theme="dark"] body {
      background:
        linear-gradient(120deg, rgba(120, 168, 255, 0.12), transparent 34%),
        linear-gradient(145deg, #050814 0%, #0b1220 48%, #070b13 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.5;
      mask-image: linear-gradient(to bottom, #000 0%, transparent 82%);
    }

    html[data-theme="dark"] body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
      opacity: 0.32;
    }

    .sinif-atlasi-root {
      position: relative;
      z-index: 1;
      isolation: isolate;
    }

    .shell {
      height: 100dvh;
      min-height: 680px;
      padding: 12px;
      gap: 12px;
    }

    .topbar {
      grid-template-columns: minmax(300px, 450px) minmax(320px, 1fr) auto;
      gap: 16px;
      min-height: 76px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--glass);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px) saturate(1.2);
    }

    html[data-theme="dark"] .topbar,
    html[data-theme="dark"] .left,
    html[data-theme="dark"] .right {
      background: var(--glass);
    }

    .identity {
      gap: 14px;
    }

    .mark {
      width: 60px;
      height: 60px;
      padding: 5px;
      border-radius: 18px;
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.24);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
    }

    .product h1 {
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.02em;
      text-transform: none;
    }

    .product p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .quote {
      width: fit-content;
      margin-top: 8px;
      padding: 4px 9px;
      color: var(--accent);
      background: rgba(223, 35, 54, 0.08);
      border: 1px solid rgba(223, 35, 54, 0.16);
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 900;
    }

    .global-search input {
      min-height: 50px;
      padding: 13px 16px 13px 46px;
      border-radius: 999px;
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 12px 28px rgba(15, 23, 42, 0.08);
      font-size: 14px;
    }

    .global-search input:focus,
    select:focus,
    .small-input:focus {
      border-color: rgba(223, 35, 54, 0.48);
      box-shadow: 0 0 0 5px var(--ring), 0 14px 30px rgba(15, 23, 42, 0.1);
    }

    .global-search::before {
      left: 17px;
      color: var(--accent);
      font-size: 24px;
      font-weight: 900;
    }

    .top-actions {
      gap: 10px;
    }

    .control-button,
    .control-select,
    .hud-button,
    .case-action,
    .media-control,
    .live-link {
      border-radius: 999px;
    }

    .control-button {
      min-height: 42px;
      padding: 9px 14px;
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      font-size: 12.5px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .control-button:hover,
    .hud-button:hover,
    .case-action:hover,
    .media-control:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.14);
    }

    .control-button.primary,
    .live-button.primary {
      color: #fff;
      background: linear-gradient(135deg, #df2336, #111827 82%);
      border-color: transparent;
      box-shadow: 0 18px 34px rgba(223, 35, 54, 0.24);
    }

    .control-button.ghost {
      background: var(--glass-strong);
    }

    .workspace {
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      padding: 0;
      overflow: hidden;
    }

    html[data-focus="map"] .workspace {
      grid-template-columns: 0 minmax(0, 1fr);
      gap: 0;
    }

    .left,
    .right {
      border: 1px solid var(--line);
      background: var(--glass);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(24px) saturate(1.12);
    }

    .left {
      gap: 14px;
      padding: 14px;
      border-radius: var(--radius-lg);
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 116, 139, 0.45) transparent;
    }

    .left::-webkit-scrollbar,
    .detail::-webkit-scrollbar,
    .discovery-list::-webkit-scrollbar {
      width: 8px;
    }

    .left::-webkit-scrollbar-thumb,
    .detail::-webkit-scrollbar-thumb,
    .discovery-list::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.36);
      border-radius: 999px;
    }

    .filters,
    .discovery {
      padding: 12px;
      border-radius: var(--radius-md);
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.26);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.07);
    }

    .filters {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .module-title {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .module-title span:last-child {
      padding: 3px 8px;
      color: var(--ink);
      background: rgba(15, 23, 42, 0.05);
      border-radius: 999px;
      letter-spacing: 0;
      text-transform: none;
    }

    html[data-theme="dark"] .module-title span:last-child {
      background: rgba(255, 255, 255, 0.08);
    }

    .smart-filter-bar {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.04);
    }

    .segment-button {
      min-height: 34px;
      padding: 8px 9px;
      border-radius: 999px;
      text-align: center;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      font-size: 11.5px;
      letter-spacing: -0.01em;
    }

    .segment-button:hover {
      transform: none;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.7);
    }

    .segment-button.is-active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #111827);
      box-shadow: 0 10px 22px rgba(223, 35, 54, 0.18);
    }

    .filter-grid {
      grid-template-columns: 1fr;
    }

    select,
    .small-input {
      min-height: 42px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.74);
      border-color: rgba(148, 163, 184, 0.26);
      color: var(--ink);
      font-size: 13px;
    }

    html[data-theme="dark"] select,
    html[data-theme="dark"] .small-input {
      background: rgba(15, 23, 42, 0.78);
    }

    .live-button {
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 900;
    }

    .status-line {
      color: var(--muted);
      font-size: 12px;
    }

    .discovery-list {
      max-height: 330px;
      gap: 8px;
    }

    .discovery-card {
      padding: 11px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(148, 163, 184, 0.28);
      border-left-width: 5px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
    }

    html[data-theme="dark"] .discovery-card {
      background: rgba(15, 23, 42, 0.74);
    }

    .list {
      flex: 1 1 auto;
      padding-right: 2px;
    }

    .case-card {
      gap: 10px;
      margin-bottom: 10px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-left: 0;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.82)),
        var(--paper);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      position: relative;
      overflow: hidden;
    }

    .case-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent);
    }

    .case-card::after {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.85), transparent);
      pointer-events: none;
    }

    html[data-theme="dark"] .case-card {
      background:
        linear-gradient(135deg, rgba(17, 24, 39, 0.92), rgba(15, 23, 42, 0.72)),
        var(--paper);
    }

    .case-card:hover,
    .case-card:focus,
    .case-card.active {
      border-color: rgba(223, 35, 54, 0.34);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
      transform: translateY(-2px);
    }

    .case-card.active {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(255, 246, 247, 0.9)),
        var(--paper);
      box-shadow: 0 0 0 4px var(--ring), 0 24px 46px rgba(15, 23, 42, 0.16);
    }

    html[data-theme="dark"] .case-card.active {
      background:
        linear-gradient(135deg, rgba(31, 41, 55, 0.95), rgba(127, 29, 29, 0.22)),
        var(--paper);
    }

    .item-emek::before { background: var(--accent); }
    .item-adalet::before { background: var(--violet); }
    .item-ekoloji::before { background: var(--green); }
    .item-dunya::before { background: var(--blue); }
    .item-karma::before { background: var(--amber); }

    .case-card-top {
      align-items: flex-start;
      justify-content: flex-start;
      gap: 9px;
      padding-top: 0;
    }

    .case-card-top::before {
      display: none;
    }

    .case-status-dot {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(223, 35, 54, 0.11);
    }

    .item-adalet .case-status-dot { background: var(--violet); box-shadow: 0 0 0 5px rgba(124, 58, 237, 0.12); }
    .item-ekoloji .case-status-dot { background: var(--green); box-shadow: 0 0 0 5px rgba(21, 147, 91, 0.12); }
    .item-dunya .case-status-dot { background: var(--blue); box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12); }
    .item-karma .case-status-dot { background: var(--amber); box-shadow: 0 0 0 5px rgba(194, 120, 3, 0.13); }

    .case-card h2 {
      font-size: 17px;
      font-weight: 950;
      line-height: 1.16;
      letter-spacing: -0.012em;
    }

    .case-location {
      padding-left: 19px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .tag-row {
      gap: 5px;
      padding-left: 19px;
    }

    .tag,
    .pill {
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: #334155;
      background: rgba(241, 245, 249, 0.86);
      border-color: rgba(148, 163, 184, 0.24);
      font-size: 11px;
      font-weight: 850;
    }

    html[data-theme="dark"] .tag,
    html[data-theme="dark"] .pill {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .map-stage {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: var(--shadow-soft);
      background: #dbe7f1;
    }

    #map .leaflet-tile {
      filter: saturate(0.92) contrast(0.98);
    }

    html[data-theme="dark"] #map .leaflet-tile {
      filter: brightness(0.62) contrast(1.05) saturate(0.72);
    }

    .map-hud {
      left: 18px;
      top: 18px;
      gap: 9px;
    }

    .hud-button {
      padding: 10px 13px;
      border-color: rgba(148, 163, 184, 0.28);
      background: var(--glass-strong);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.12);
      font-size: 12px;
      font-weight: 900;
    }

    .map-summary {
      left: 18px;
      right: 18px;
      bottom: 18px;
      gap: 10px;
    }

    .mini-stat {
      min-height: 74px;
      padding: 13px 14px;
      border-radius: 18px;
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.28);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.14);
    }

    .mini-stat span {
      font-size: 11.5px;
      font-weight: 850;
    }

    .mini-stat strong {
      margin-top: 7px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .mini-stat.is-active {
      border-color: rgba(223, 35, 54, 0.5);
      box-shadow: 0 0 0 4px var(--ring), 0 18px 38px rgba(15, 23, 42, 0.16);
    }

    .right {
      top: 104px;
      right: 18px;
      bottom: 18px;
      width: min(540px, calc(100vw - 36px));
      border-radius: 26px;
      transform: translateX(28px) scale(0.985) !important;
      transition: opacity 0.2s ease, transform 0.22s ease, box-shadow 0.22s ease, visibility 0s linear 0.2s;
    }

    .right.open {
      transform: translateX(0) scale(1) !important;
      box-shadow: var(--shadow);
    }

    .case-head {
      padding: 18px 18px 16px;
      background:
        linear-gradient(135deg, rgba(223, 35, 54, 0.12), transparent 42%),
        var(--glass-strong);
      border-bottom-color: rgba(148, 163, 184, 0.24);
    }

    .panel-close {
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--glass-strong);
      border-color: rgba(148, 163, 184, 0.28);
      color: var(--muted);
    }

    .panel-close:hover {
      color: var(--ink);
      background: var(--soft);
    }

    .case-head h2 {
      padding-right: 42px;
      font-size: clamp(24px, 2.5vw, 34px);
      font-weight: 950;
      letter-spacing: -0.035em;
    }

    /* "Direniş Kartı / seçili" başlık satırı da kapatma (×) butonunun altına
       girmesin diye aynı sağ boşluk h2 ile aynı hizada uygulanır. */
    .case-head .module-title {
      padding-right: 42px;
    }

    .case-actions {
      gap: 7px;
    }

    .case-action {
      min-height: 34px;
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(148, 163, 184, 0.28);
      font-size: 12px;
    }

    html[data-theme="dark"] .case-action {
      background: rgba(15, 23, 42, 0.76);
    }

    .tabs {
      gap: 7px;
      padding: 10px 14px 0;
      background: var(--glass-strong);
      border-bottom-color: rgba(148, 163, 184, 0.24);
    }

    .tab {
      padding: 11px 10px;
      border-radius: 14px 14px 0 0;
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .tab.active {
      background: rgba(223, 35, 54, 0.1);
      border-bottom-color: var(--accent);
    }

    .detail {
      padding: 16px;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.62), transparent 30%);
    }

    html[data-theme="dark"] .detail {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.54), transparent 30%);
    }

    .case-snapshot {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .case-snapshot div,
    .claim,
    .score,
    .event,
    .graph-box,
    .resistance-card,
    .summary-news-card,
    .media-banner,
    .media-gallery,
    .news-card,
    .photo-card,
    .video-card,
    .loading,
    .empty {
      border-radius: 18px;
      border-color: rgba(148, 163, 184, 0.25);
      background: var(--glass-strong);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.07);
    }

    .case-snapshot div {
      padding: 13px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(241, 245, 249, 0.9));
    }

    html[data-theme="dark"] .case-snapshot div {
      background: rgba(15, 23, 42, 0.78);
    }

    .case-snapshot span,
    .claim b {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .case-snapshot strong {
      font-size: 15px;
    }

    .claim {
      padding: 13px;
      gap: 7px;
    }

    .claim span,
    .claim p {
      color: var(--ink);
      font-size: 13.5px;
    }

    .coord-list {
      display: grid;
      gap: 6px;
      margin-top: 4px;
    }

    .coord-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .coord-label {
      color: var(--muted);
      font-size: 12px;
    }

    .coord-value {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--ink);
      background: var(--soft);
      padding: 2px 7px;
      border-radius: 999px;
    }

    .resistance-card {
      padding: 16px;
      background:
        linear-gradient(135deg, rgba(223, 35, 54, 0.1), transparent 38%),
        var(--glass-strong);
      border-left-width: 0;
    }

    .resistance-card h3 {
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .media-banner,
    .media-gallery {
      padding: 14px;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 40%),
        var(--glass-strong);
    }

    .media-stage {
      border-radius: 18px;
      overflow: hidden;
      background: #0f172a;
    }

    .media-slide img {
      min-height: 260px;
      object-fit: cover;
    }

    .media-caption {
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.78));
    }

    .media-dot {
      width: 28px;
      height: 6px;
      border-radius: 999px;
      text-indent: -999px;
      overflow: hidden;
      background: rgba(100, 116, 139, 0.32);
    }

    .media-dot.active {
      background: var(--accent);
    }

    .news-card {
      padding: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .news-card:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.38);
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.13);
    }

    .news-card b,
    .news-card a {
      font-size: 15px;
      line-height: 1.28;
    }

    .news-card .news-preview {
      color: var(--muted);
      font-size: 13px;
    }

    .photo-card {
      overflow: hidden;
    }

    .photo-card img {
      border-radius: 14px;
    }

    .pin {
      border-width: 4px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.34);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22);
    }

    .popup-mini h3 {
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .popup-mini button {
      border-radius: 999px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    @media (max-width: 1240px) {
      .workspace {
        grid-template-columns: 340px minmax(0, 1fr);
      }

      .smart-filter-bar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        border-radius: 18px;
      }
    }

    @media (max-width: 900px) {
      .shell {
        height: auto;
        min-height: 100dvh;
        overflow: auto;
      }

      .topbar {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 56dvh) minmax(360px, auto);
      }

      .left {
        grid-row: 2;
        min-height: 420px;
        max-height: none;
      }

      .map-stage {
        grid-row: 1;
        min-height: 420px;
      }

      .map-summary {
        grid-template-columns: 1fr;
      }

      .right {
        top: 12px;
        right: 12px;
        bottom: 12px;
        width: calc(100vw - 24px);
      }
    }

    @media (max-width: 560px) {
      .shell {
        padding: 8px;
      }

      .product p {
        white-space: normal;
      }

      .top-actions {
        justify-content: stretch;
      }

      .control-button {
        flex: 1 1 auto;
      }

      .map-hud {
        left: 10px;
        right: 10px;
        top: 10px;
      }

      .hud-button {
        flex: 1 1 auto;
        padding: 9px 10px;
      }

      .map-summary {
        left: 10px;
        right: 10px;
        bottom: 10px;
      }

      .mini-stat {
        min-height: 66px;
      }

      .mini-stat strong {
        font-size: 23px;
      }

      .case-head h2 {
        font-size: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
      }
    }

    /* ============================================================
       RÖTUŞ KATMANI — mevcut cam/mavi kimliği korur, rafine eder.
       Veri mantığına ve DOM'a dokunmaz. Cerrahi dokunuşlar.
       ============================================================ */

    :root {
      --font-display: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
    }

    /* --- TİPOGRAFİ: başlık ve sayılarda ölçülü karakter --- */
    .product h1,
    .case-card h2,
    .case-head h2,
    .mini-stat strong,
    .resistance-card h3,
    .detail-section h3,
    .executive-summary h3,
    .popup-mini h3 {
      font-family: var(--font-display);
    }
    /* sayılar tabular hizalanır — istatistikler zıplamaz */
    .mini-stat strong,
    .module-title span:last-child,
    .score,
    .summary-meter {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }
    .product h1 { letter-spacing: -0.025em; }
    .case-card h2 { letter-spacing: -0.018em; line-height: 1.15; }

    /* --- RENK & KONTRAST: metin okunurluğu (ince) --- */
    :root {
      --muted: #5c6b7e;               /* daha koyu — AA kontrastı */
    }
    html[data-theme="dark"] {
      --muted: #b3bdcc;               /* koyu temada biraz daha parlak */
    }
    .case-location { color: var(--muted); }
    /* aktif kartta sol şerit netleşsin */
    .case-card.active::before { width: 6px; }

    /* --- BOŞLUK & HİZALAMA: nefes payı, kart iç düzen --- */
    .case-card { padding: 15px 15px 14px 18px; }
    .case-card h2 { margin-top: 1px; }
    .tag-row { margin-top: 1px; }
    .mini-stat { padding: 13px 15px; }
    .mini-stat strong { margin-top: 6px; }
    .module-title { align-items: baseline; }
    .detail { padding: 17px; }
    .detail-section { margin-bottom: 4px; }

    /* --- ETKİLEŞİM: yumuşak, tutarlı geçişler --- */
    .case-card,
    .mini-stat,
    .discovery-card,
    .news-card,
    .segment-button,
    .control-button,
    .hud-button {
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.18s cubic-bezier(0.22, 1, 0.36, 1),
                  border-color 0.18s ease,
                  background 0.18s ease;
      will-change: transform;
    }
    .discovery-card { cursor: pointer; }
    .discovery-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.12);
      border-color: rgba(37, 99, 235, 0.4);
    }
    /* butonlara hafif basma geri bildirimi */
    .control-button:active,
    .hud-button:active,
    .segment-button:active,
    .case-action:active { transform: translateY(0) scale(0.97); }
    /* aktif "Canlı Tarama" için nabız */
    @keyframes atlas-pulse {
      0%, 100% { box-shadow: 0 18px 34px rgba(223, 35, 54, 0.22); }
      50% { box-shadow: 0 18px 34px rgba(223, 35, 54, 0.4); }
    }
    .live-button.is-active,
    .control-button.primary.is-active { animation: atlas-pulse 1.6s ease-in-out infinite; }

    /* liste ilk yüklenişte yumuşak beliriş */
    @keyframes atlas-rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .case-card { animation: atlas-rise 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .case-card:nth-child(2) { animation-delay: 0.03s; }
    .case-card:nth-child(3) { animation-delay: 0.06s; }
    .case-card:nth-child(4) { animation-delay: 0.09s; }
    .case-card:nth-child(5) { animation-delay: 0.12s; }
    .case-card:nth-child(n+6) { animation-delay: 0.14s; }

    /* --- BOŞ / YÜKLENİYOR: davet edici, net --- */
    .empty {
      display: grid;
      gap: 6px;
      padding: 22px 16px;
      text-align: center;
      line-height: 1.4;
    }
    .empty::before {
      content: "";
      justify-self: center;
      width: 30px; height: 30px;
      margin-bottom: 2px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(223, 35, 54, 0.16), rgba(37, 99, 235, 0.14));
      border: 1px solid var(--line);
    }

    /* erişilebilir odak halkası (klavye) */
    a:focus-visible, button:focus-visible,
    input:focus-visible, select:focus-visible,
    [tabindex]:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    /* --- TARAMA SONUÇLARI: aç/kapa akordeon --- */
    /* Konteyneri grid'den flex'e al: açılan item'lar blok akışında düzgün büyür,
       grid-track yüksekliği içeriği kırpmaz. */
    .discovery-list {
      display: flex !important;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 3px;
    }
    .discovery-item {
      flex: 0 0 auto;
      margin-bottom: 0;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-left: 5px solid var(--accent);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      transition: box-shadow 0.18s ease, border-color 0.18s ease;
    }
    html[data-theme="dark"] .discovery-item { background: rgba(15, 23, 42, 0.74); }
    .discovery-item.item-ekoloji { border-left-color: var(--green, #168a4a); }
    .discovery-item.item-adalet { border-left-color: var(--violet, #7357c8); }
    .discovery-item.item-dunya { border-left-color: var(--blue, #1f6ed4); }
    .discovery-item.is-open {
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.12);
      border-color: rgba(37, 99, 235, 0.4);
    }
    .discovery-head {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 12px;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: inherit;
      font: inherit;
    }
    .discovery-head-text { display: grid; gap: 2px; flex: 1 1 auto; min-width: 0; }
    .discovery-head-text b {
      font-family: var(--font-display);
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink, #171717);
    }
    .discovery-sub {
      font-size: 11.5px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .discovery-chevron {
      flex: 0 0 auto;
      font-size: 18px;
      line-height: 1;
      color: var(--muted);
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .discovery-item.is-open .discovery-chevron { transform: rotate(180deg); }
    .discovery-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.24s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .discovery-item.is-open .discovery-body { grid-template-rows: 1fr; }
    .discovery-body-inner { min-height: 0; overflow: hidden; }
    .discovery-detail {
      display: grid;
      gap: 7px;
      padding: 2px 12px 10px;
    }
    .discovery-detail-row { display: grid; gap: 1px; }
    .discovery-detail-row span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .discovery-detail-row p {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--ink, #1f2937);
    }
    .discovery-open {
      margin: 0 12px 11px;
      padding: 7px 12px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.6);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    html[data-theme="dark"] .discovery-open { background: rgba(15, 23, 42, 0.5); }
    .discovery-open:hover { background: rgba(223, 35, 54, 0.1); transform: translateX(2px); }

    .discovery { gap: 0; }

    .discovery-headline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .discovery-headline .module-title {
      flex: 1 1 auto;
      min-width: 0;
    }

    .discovery-toggle {
      flex: 0 0 auto;
      min-height: 30px;
      padding: 6px 10px;
      border: 1px solid rgba(148, 163, 184, 0.38);
      border-radius: 9px;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.58);
      font-size: 11.5px;
      font-weight: 850;
      cursor: pointer;
    }

    html[data-theme="dark"] .discovery-toggle {
      background: rgba(15, 23, 42, 0.58);
    }

    .discovery-content {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .discovery-content-inner {
      min-height: 0;
      display: grid;
      gap: 8px;
      overflow: hidden;
      padding-top: 8px;
      transition: padding-top 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .discovery.is-collapsed .discovery-content {
      grid-template-rows: 0fr;
    }

    .discovery.is-collapsed .discovery-content-inner {
      padding-top: 0;
    }

    /* Gömülü video oynatıcı — medya slide içinde 16:9 */
    .media-video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }
    .media-video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ---------- DİRENİŞ BİLDİR: buton + sayfa içi modal ---------- */
    .report-btn {
      color: #fff;
      background: linear-gradient(135deg, #168a4a, #0f6f3a);
      border-color: rgba(15, 111, 58, 0.6);
      font-weight: 700;
    }
    .report-btn:hover {
      background: linear-gradient(135deg, #1a9c54, #128040);
      transform: translateY(-1px);
    }
    html[data-theme="dark"] .report-btn {
      background: linear-gradient(135deg, #1f9e5c, #157a45);
    }

    .report-modal {
      position: fixed;
      inset: 0;
      z-index: 4000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .report-modal[hidden] { display: none; }
    .report-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(9, 14, 24, 0.62);
      backdrop-filter: blur(3px);
      animation: reportFade 0.2s ease;
    }
    @keyframes reportFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes reportRise { from { opacity: 0; transform: translateY(12px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .report-modal-card {
      position: relative;
      z-index: 1;
      width: min(560px, calc(100vw - 32px));
      max-height: min(90dvh, 840px);
      display: flex;
      flex-direction: column;
      background: var(--panel-strong, #fff);
      border: 1px solid var(--line, #d9d0c3);
      border-radius: 18px;
      box-shadow: 0 30px 70px rgba(9, 14, 24, 0.4);
      overflow: hidden;
      animation: reportRise 0.24s cubic-bezier(0.22, 1, 0.36, 1);
    }
    html[data-theme="dark"] .report-modal-card { background: #141b2b; }
    .report-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 6px;
    }
    .report-modal-eyebrow {
      display: block;
      font-family: var(--font-cond, sans-serif);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent, #c9272d);
    }
    .report-modal-head h2 {
      margin: 2px 0 0;
      font-family: var(--font-display, sans-serif);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink, #171717);
    }
    .report-modal-actions { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    .report-modal-close {
      width: 34px; height: 34px;
      border: 1px solid var(--line, #d9d0c3);
      border-radius: 9px;
      background: transparent;
      color: var(--ink, #171717);
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .report-modal-close:hover { background: var(--accent, #c9272d); color: #fff; transform: rotate(90deg); }
    .report-modal-sub {
      margin: 0;
      padding: 0 18px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted, #667085);
    }
    .report-modal-frame {
      position: relative;
      flex: 1 1 auto;
      min-height: 320px;
      background: var(--panel, #fff);
      border-top: 1px solid var(--line, #d9d0c3);
    }
    html[data-theme="dark"] .report-modal-frame { background: #0f1626; }
    .report-modal-frame iframe {
      width: 100%;
      height: 100%;
      min-height: min(62vh, 620px);
      border: 0;
      display: block;
    }
    .report-modal-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--muted, #667085);
      pointer-events: none;
    }
    @media (max-width: 560px) {
      .report-modal { padding: 0; }
      .report-modal-card { width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
    }

    /* ============================================================
       DENETİM DÜZELTMELERİ — küçük, güvenli iyileştirmeler
       ============================================================ */

    /* Kontrast: istatistik etiketleri AA'nın altındaydı (3.86) → koyulaştır */
    .mini-stat span {
      color: #47536a;
    }
    html[data-theme="dark"] .mini-stat span {
      color: #aeb9cc;
    }

    /* Dokunma hedefleri: mobilde segment/hud butonları 44px altındaydı */
    @media (max-width: 780px) {
      .segment-button { min-height: 44px; }
      .hud-button { min-height: 44px; padding-top: 11px; padding-bottom: 11px; }
      .discovery-open { min-height: 40px; }
      .tab { min-height: 44px; }
    }
  </style>
</head>

    // --- Çıkış istekleri için genel eş zamanlılık kapısı ---
    // Ücretsiz CORS proxy'leri (rss2json, corsproxy.io, jina.ai vb.) tek seferde
    // onlarca isteğe maruz kalınca 429/403 ile anında reddediyordu; bu da haber ve
    // görsellerin hiç yüklenmemesine yol açıyordu. Tüm dış istekleri tek bir kuyruktan
    // geçirerek aynı anda gidecek istek sayısını sınırlıyoruz.
    const MAX_CONCURRENT_PROXY_FETCHES = 8;
    let activeProxyFetches = 0;
    const proxyFetchQueue = [];
    function drainProxyQueue() {
      while (proxyFetchQueue.length && activeProxyFetches < MAX_CONCURRENT_PROXY_FETCHES) {
        const run = proxyFetchQueue.shift();
        run();
      }
    }
    function gatedFetch(task) {
      return new Promise((resolve, reject) => {
        const run = () => {
          activeProxyFetches += 1;
          Promise.resolve().then(task).then(
            (value) => { activeProxyFetches -= 1; resolve(value); drainProxyQueue(); },
            (error) => { activeProxyFetches -= 1; reject(error); drainProxyQueue(); }
          );
        };
        if (activeProxyFetches < MAX_CONCURRENT_PROXY_FETCHES) run();
        else proxyFetchQueue.push(run);
      });
    }

    // Bir dizi görev fabrikasını küçük dalgalar halinde başlatır; ilk başarılı
    // olan kazanır. Yedi proxy'yi aynı anda ateşlemek yerine önce 2 tanesini
    // dener, kısa bir süre sonra hâlâ sonuç yoksa sıradaki dalgayı ekler.
    function firstSuccessStaggered(factories, { batchSize = 2, staggerMs = 1200 } = {}) {
      return new Promise((resolve, reject) => {
        let index = 0;
        let failures = 0;
        let done = false;
        const total = factories.length;
        if (!total) { reject(new Error("no candidates")); return; }
        const launchNext = () => {
          if (done || index >= total) return;
          const factory = factories[index++];
          Promise.resolve().then(factory).then(
            (value) => { if (!done) { done = true; resolve(value); } },
            () => {
              failures += 1;
              if (failures === total && !done) { done = true; reject(new Error("all failed")); }
            }
          );
        };
        const launchWave = () => {
          if (done) return;
          const count = Math.min(batchSize, total - index);
          for (let i = 0; i < count; i += 1) launchNext();
          if (index < total) window.setTimeout(launchWave, staggerMs);
        };
        launchWave();
      });
    }
